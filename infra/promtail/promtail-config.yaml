# ════════════════════════════════════════════════════════════════
# Promtail — coletor de logs do Docker → Loki (Onda 2)
# Faz tail dos arquivos JSON em /var/lib/docker/containers/*/*-json.log
# e envia para o Loki com labels úteis (container_name, compose_service).
#
# Plano B documentado: em hosts onde /var/lib/docker não está acessível
# (Docker Desktop em alguns setups), trocar para o logging driver `loki`
# do Docker (configurar daemon.json). README documenta isso.
# ════════════════════════════════════════════════════════════════

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5s
      max_retries: 10

scrape_configs:
  # ── Containers do projeto (filtro: nome começa com `agente_`) ──
  - job_name: agente-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["agente_"]
    relabel_configs:
      # container_name vem como "/agente_app" — strip da barra inicial
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      # compose_service do label oficial do docker-compose
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      # Docker daemon JSON wrap: {"log": "...", "stream": "stdout", "time": "..."}
      - docker: {}
      # ─────────────────────────────────────────────────────────────
      # JSON estruturado da app (Onda Observabilidade — JsonFormatter
      # do app/core/logging_setup.py). Toda linha começa com `{` e
      # contém pelo menos `level`, `logger`, `msg`. Extraímos `level`,
      # `logger` e `event` como LABELS (baixa cardinality) — restante
      # fica acessível via `| json` no LogQL sem custo de index.
      # ─────────────────────────────────────────────────────────────
      - match:
          selector: '{compose_service=~".+"}'
          stages:
            # Tenta parsear JSON; se não for JSON (ex: log do uvicorn raw),
            # `match` com expression vazio segue pro próximo stage sem erro.
            - json:
                expressions:
                  level: level
                  logger: logger
                  event: event
                  trace_id: trace_id
                  request_id: request_id
            - labels:
                level:
                logger:
                event:
                trace_id:
                request_id:
      # ─────────────────────────────────────────────────────────────
      # Retro-compat: extrai trace_id do formato legado do LoggingInstrumentor
      # ("trace_id=abc... span_id=def..."). Só dispara se NÃO veio do JSON acima
      # (que já teria setado o label).
      # ─────────────────────────────────────────────────────────────
      - regex:
          expression: 'trace_id=(?P<otel_trace_id>[0-9a-f]+)'
      - labels:
          otel_trace_id:
      # Retro-compat: severity de logs Python texto ("INFO:logger:msg")
      - regex:
          expression: '^(?P<text_level>DEBUG|INFO|WARNING|ERROR|CRITICAL):'
      - labels:
          text_level:
