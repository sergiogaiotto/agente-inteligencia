[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    slow: testes que demandam mais tempo (excluir em fast loop)
    integration: requer Postgres/Redis/Qdrant rodando
    e2e: testes ponta-a-ponta de interface (Playwright dirigindo o app real)
