name: Tests

# Roda a suite pytest em cada push (qualquer branch) e PR contra main.
# Bloqueia merge se vermelho — protege main de regressão de lógica pura.
#
# 2 jobs:
# - test: 850+ testes unitários mockados (rápido, ~30s, sem deps externas)
# - test-integration: smoke com Postgres pgvector real (mais lento, ~60s)
#
# Custo: GitHub Actions free pra repos privados pessoais (~2000 min/mês).

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
  # Gatilho manual para a camada E2E de interface (job test-e2e abaixo).
  workflow_dispatch:

# Cancela runs antigos quando novo commit chega no mesmo branch — economiza
# minutos de CI e dá feedback rápido. Pra main mantém histórico (no-cancel).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: pytest (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          # Cache de pip por hash do requirements.txt — speedup ~3x em runs
          # subsequentes do mesmo branch.
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (unit only)
        # -x para falhar no primeiro erro (feedback rápido em PR review).
        # -q reduz output (CI logs limpos). --strict-markers já vem do
        # pytest.ini — pega marker typo (ex: @pytest.mark.integraion).
        # -m "not integration and not e2e" → só os mocked (rápido, sem deps).
        # Integração (Postgres real) vai no job test-integration; E2E de
        # interface (browser + app real) vai no job test-e2e (manual).
        run: |
          python -m pytest tests/ -x -q -m "not integration and not e2e"
        env:
          # Suprime logs de arquivo durante testes — CI não tem volume
          # persistente e LOG_FILE_ENABLED=0 evita criar logs/*.log.
          LOG_FILE_ENABLED: "0"
          LOG_CONSOLE_ENABLED: "0"

  test-integration:
    # Smoke tests com Postgres pgvector REAL. Pega bugs que mocks não pegam
    # (coluna ausente, constraint, JSONB encoding, migrations). Bug do PR
    # #151 (data_tables column missing) seria pego aqui automaticamente.
    name: pytest (integration — Postgres real)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Service container Postgres pgvector — mesma imagem que prod usa
    # (docker-compose.yml: pgvector/pgvector:pg16). DDL e migrations rodam
    # idênticas, smoke pega divergências reais.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agente
          POSTGRES_PASSWORD: agente
          POSTGRES_DB: agente_inteligencia_test
        ports:
          - 5432:5432
        # Health check garante Postgres pronto antes do pytest começar.
        options: >-
          --health-cmd "pg_isready -U agente -d agente_inteligencia_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (integration)
        run: |
          python -m pytest tests/integration -v -m integration
        env:
          # Aponta pro service container — não usa DATABASE_URL real.
          TEST_DATABASE_URL: postgresql://agente:agente@localhost:5432/agente_inteligencia_test
          LOG_FILE_ENABLED: "0"
          LOG_CONSOLE_ENABLED: "0"

  test-e2e:
    # Camada E2E de INTERFACE (Playwright dirige o app real num browser).
    # MANUAL (workflow_dispatch) e NÃO-BLOQUEANTE (continue-on-error): subir o
    # stack completo em CI é sensível a env/secrets; mantemos como gate opt-in
    # para não travar merges. O caminho primário de E2E é local, contra
    # `docker compose up` (ver docs/testes-e2e.md). Roda o subconjunto
    # DETERMINÍSTICO (sem `slow`) — a jornada de invocar pipeline depende de LLM.
    name: pytest (e2e — interface, manual)
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agente
          POSTGRES_PASSWORD: agente
          POSTGRES_DB: agente_inteligencia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agente -d agente_inteligencia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Start app (uvicorn em background)
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 7000 &
          echo "Aguardando /api/health..."
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:7000/api/health >/dev/null 2>&1; then
              echo "App de pé."; exit 0
            fi
            sleep 2
          done
          echo "App não subiu a tempo"; exit 1
        env:
          DATABASE_URL: postgresql://agente:agente@localhost:5432/agente_inteligencia
          REDIS_URL: redis://localhost:6379/0
          MAESTRO_SECRET_KEY: ci-e2e-secret-key-not-for-prod
          APP_ENV: development
          # Rate-limit OFF na suíte E2E — ela faz muitas req/min e estouraria os
          # 60/60s (rate-limit é ortogonal ao teste funcional).
          RATE_LIMIT_ENABLED: "false"
          LOG_FILE_ENABLED: "0"
          LOG_CONSOLE_ENABLED: "0"

      - name: Run pytest (e2e — determinístico)
        # Banco vazio → o suite cria o root pelo fluxo real de setup.
        run: |
          python -m pytest tests/e2e -v -m "e2e and not slow"
        env:
          E2E_BASE_URL: http://127.0.0.1:7000
          E2E_USERNAME: e2e_admin
          E2E_PASSWORD: e2e-pass-1234

  docker-smoke:
    # Onda 3 (33.3.0): o CI rodava pip no ubuntu e NUNCA `docker build` — o
    # footgun #533 (pip velho corrompendo wheels de Metadata 2.4 → uvicorn sem
    # `main` → crash-loop → Caddy 502) era EXCLUSIVO do caminho Docker e passou
    # invisível ao CI até quebrar prod. Este job builda a imagem (2 stages),
    # confirma os imports (pega o #533 DIRETO) e sobe o app real contra Postgres+
    # Redis batendo /api/health. Bloqueável — promover a `required` na branch
    # protection quando confirmado verde.
    name: docker build + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agente
          POSTGRES_PASSWORD: agente
          POSTGRES_DB: agente_inteligencia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agente -d agente_inteligencia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build image (multi-stage — builder + runtime)
        run: docker build -t maestro:ci .

      - name: Import smoke (pega corrupção de wheel — footgun #533)
        # Se o wheelhouse corromper (uvicorn/app sem módulo), ISTO falha ANTES de
        # qualquer boot — o sintoma exato do #533, invisível ao pip-no-ubuntu.
        run: docker run --rm maestro:ci python -c "import app.main; import uvicorn; print('imports ok')"

      - name: Boot smoke (uvicorn real + /api/health)
        run: |
          docker run -d --name maestro_app --network host \
            -e DATABASE_URL=postgresql://agente:agente@localhost:5432/agente_inteligencia \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e MAESTRO_SECRET_KEY=ci-smoke-key-not-for-prod \
            -e SECRET_KEY=ci-smoke-secret-not-for-prod \
            -e APP_ENV=development \
            -e LOG_FILE_ENABLED=0 -e LOG_CONSOLE_ENABLED=0 \
            maestro:ci
          echo "Aguardando /api/health (uvicorn + init_db)..."
          ok=0
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:7000/api/health >/dev/null 2>&1; then
              echo "App de pé:"; curl -s http://localhost:7000/api/health; echo; ok=1; break
            fi
            sleep 3
          done
          if [ "$ok" != "1" ]; then
            echo "=== App NÃO subiu a tempo — logs do container ==="
            docker logs maestro_app || true
            exit 1
          fi

      - name: Teardown
        if: always()
        run: docker rm -f maestro_app || true

  lint:
    # ruff ADVISORY (33.3.0): estabelece a linha de base de lint SEM travar merges
    # (continue-on-error no step → job sempre verde). Promover a gate `required`
    # depois de um PR de limpeza (hoje ~61 issues de alto sinal, ~50 auto-fixáveis).
    # Config + ruleset em pyproject.toml.
    name: ruff (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check (advisory — não bloqueia)
        continue-on-error: true
        run: ruff check app/ --output-format=github

  security-audit:
    # pip-audit ADVISORY (33.3.0): varre requirements.txt por CVEs conhecidos.
    # Não-bloqueante — o advisory DB muda no tempo e não queremos travar merge por
    # um CVE publicado hoje. Promover a gate quando o backlog de deps estiver limpo.
    name: pip-audit (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: pip-audit (advisory — não bloqueia)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
