{% extends "layouts/base.html" %}

{% block content %}
<div x-data="agentInvocationsPage('{{ agent_id | default('') }}')" x-init="load()">

    <!-- Header: agent + back -->
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
            <a href="/agents" class="text-surface-400 hover:text-brand-600" title="Voltar para agentes">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
            </a>
            <div>
                <div class="text-[14px] font-semibold text-brand-900" x-text="agent.name || agentId.substring(0,12)+'…'"></div>
                <div class="text-[10px] text-surface-400" x-text="(agent.kind || '').toUpperCase() + ' · ' + total + ' invocação(ões)'"></div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-3 mb-4">
        <select x-model="filterState" @change="currentPage = 0; load()" class="rounded-lg border border-surface-200 bg-white px-2.5 py-1.5 text-[11px] outline-none">
            <option value="">Todos estados</option>
            <option value="LogAndClose">LogAndClose (sucesso)</option>
            <option value="Recommend">Recommend</option>
            <option value="Refuse">Refuse (bloqueado)</option>
            <option value="Escalate">Escalate (humano)</option>
            <option value="Intake">Intake (em curso)</option>
        </select>
        <div class="flex items-center gap-1 text-[10px] text-surface-400 ml-auto">
            <span>Exibir</span>
            <select x-model.number="pageSize" @change="currentPage = 0; load()" class="rounded border border-surface-200 bg-white px-1.5 py-0.5 text-[10px] outline-none">
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
    </div>

    <!-- List -->
    <div class="rounded-lg border border-surface-200 bg-white" x-show="items.length > 0">
        <div class="divide-y divide-surface-50">
            <template x-for="e in items" :key="e.id">
                <div>
                    <div class="group flex items-center gap-3 px-4 py-2 hover:bg-surface-50/50 cursor-pointer" @click="toggle(e)">
                        <span class="flex h-6 w-6 items-center justify-center rounded-full text-[9px] font-bold text-white shrink-0"
                              :class="stateClass(e.state)" x-text="stateIcon(e.state)"></span>
                        <div class="flex-1 min-w-0">
                            <div class="text-[12px] font-medium text-brand-900 truncate" x-text="e.title || e.id.substring(0,16)"></div>
                            <div class="flex items-center gap-2 text-[9px] text-surface-400">
                                <span x-text="e.channel"></span>
                                <span class="rounded-full px-1.5 py-0.5 text-[8px] font-semibold" :class="stateBadgeClass(e.state)" x-text="e.state || '—'"></span>
                                <span x-show="e.journey_id" x-text="'jornada: ' + e.journey_id"></span>
                            </div>
                        </div>
                        <span class="text-[10px] text-surface-400 shrink-0" x-text="tzDateTimeSec(e.started_at || e.created_at)"></span>
                        <svg class="w-3.5 h-3.5 text-surface-300 transition-transform shrink-0" :class="expandedId === e.id ? 'rotate-180' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                    </div>

                    <!-- Drawer com detalhes -->
                    <div x-show="expandedId === e.id" x-transition.duration.150ms class="border-t border-surface-100 bg-surface-50/50 px-4 py-3">
                        <template x-if="!e._detail && !e._loading">
                            <div class="text-[10px] text-surface-400 ml-9">Carregando…</div>
                        </template>
                        <template x-if="e._loading">
                            <div class="text-[10px] text-surface-400 ml-9">Carregando…</div>
                        </template>
                        <template x-if="e._detail">
                            <div class="ml-9 space-y-3">
                                <!-- Meta -->
                                <div class="grid grid-cols-2 lg:grid-cols-4 gap-2 text-[10px]">
                                    <div><span class="text-surface-400 block">ID interação</span><span class="font-mono text-brand-900" x-text="e.id"></span></div>
                                    <div><span class="text-surface-400 block">Iniciado</span><span class="text-brand-900" x-text="tzDateTimeSec(e._detail.interaction.started_at)"></span></div>
                                    <div><span class="text-surface-400 block">Finalizado</span><span class="text-brand-900" x-text="tzDateTimeSec(e._detail.interaction.ended_at) || '—'"></span></div>
                                    <div><span class="text-surface-400 block">Trace</span>
                                        <template x-if="e._detail.tempo_link">
                                            <a :href="e._detail.tempo_link" target="_blank" class="text-brand-500 font-medium hover:underline">Abrir no Tempo →</a>
                                        </template>
                                        <template x-if="!e._detail.tempo_link">
                                            <span class="text-surface-400" x-text="e._detail.trace_id || '—'"></span>
                                        </template>
                                    </div>
                                </div>

                                <!-- Bindings declarativos -->
                                <details class="rounded border border-surface-200 bg-white" :open="(e._detail.binding_executions||[]).length > 0">
                                    <summary class="cursor-pointer px-3 py-2 text-[11px] font-semibold text-brand-900 select-none">
                                        Bindings declarativos <span class="text-surface-400 font-normal" x-text="'(' + (e._detail.binding_executions||[]).length + ')'"></span>
                                    </summary>
                                    <div class="border-t border-surface-100 p-3 space-y-1.5">
                                        <template x-if="(e._detail.binding_executions||[]).length === 0">
                                            <div class="text-[10px] text-surface-400">Nenhum binding executado (modo LLM ou agente sem skill declarativa).</div>
                                        </template>
                                        <template x-for="be in (e._detail.binding_executions||[])" :key="be.id">
                                            <div class="rounded border border-surface-100 bg-surface-50/30 p-2 text-[10px]">
                                                <div class="flex items-center gap-2 flex-wrap">
                                                    <span class="rounded bg-red-100 px-1.5 py-0.5 text-[10px] font-semibold text-red-700 font-mono" x-text="be.binding_id"></span>
                                                    <span class="rounded-full px-1.5 py-0.5 text-[9px] font-semibold"
                                                          :class="be.skipped_by_breaker?'bg-surface-200 text-surface-500':(be.status_code>=200&&be.status_code<300)?'bg-emerald-50 text-emerald-600':be.status_code>=400?'bg-rose-50 text-rose-600':'bg-amber-50 text-amber-600'"
                                                          x-text="be.skipped_by_breaker?'breaker open':(be.status_code||'—')"></span>
                                                    <span x-show="be.is_compensation" class="rounded-full bg-amber-50 px-1.5 py-0.5 text-[9px] font-semibold text-amber-700">compensação</span>
                                                    <span class="text-surface-400" x-text="(be.latency_ms||0).toFixed(0) + ' ms'"></span>
                                                    <span class="text-surface-400" x-show="be.attempts > 1" x-text="be.attempts + ' tentativas'"></span>
                                                    <span class="text-surface-400 ml-auto font-mono text-[9px]" x-show="be.call_id" x-text="'call: ' + be.call_id.substring(0,8)"></span>
                                                </div>
                                                <div x-show="be.error" class="mt-1 text-[10px] text-rose-700 font-mono" x-text="be.error"></div>
                                            </div>
                                        </template>
                                    </div>
                                </details>

                                <!-- Turnos -->
                                <details class="rounded border border-surface-200 bg-white" :open="e._detail.turns.length > 0">
                                    <summary class="cursor-pointer px-3 py-2 text-[11px] font-semibold text-brand-900 select-none">
                                        Turnos <span class="text-surface-400 font-normal" x-text="'(' + e._detail.turns.length + ')'"></span>
                                    </summary>
                                    <div class="border-t border-surface-100 p-3 space-y-2">
                                        <template x-if="e._detail.turns.length === 0">
                                            <div class="text-[10px] text-surface-400">Sem turnos registrados.</div>
                                        </template>
                                        <template x-for="t in e._detail.turns" :key="t.id">
                                            <div class="rounded border border-surface-100 bg-surface-50/30 p-2.5">
                                                <div class="flex items-center gap-2 mb-1">
                                                    <span class="rounded-full bg-brand-100 px-2 py-0.5 text-[8px] font-bold text-brand-600" x-text="'Turno ' + (t.turn_number||'?')"></span>
                                                    <span class="text-[9px] text-surface-400" x-text="(t.latency_ms||0).toFixed(0) + ' ms · ' + (t.tokens_used||0) + ' tok'"></span>
                                                </div>
                                                <div x-show="t.user_text_redacted" class="mb-1.5">
                                                    <div class="text-[9px] text-surface-400">Entrada</div>
                                                    <div class="text-[11px] text-brand-900 bg-brand-50 rounded px-2 py-1 max-h-20 overflow-y-auto whitespace-pre-wrap" x-text="t.user_text_redacted"></div>
                                                </div>
                                                <div x-show="t.output_text_redacted">
                                                    <div class="text-[9px] text-surface-400">Saída</div>
                                                    <div class="text-[11px] text-brand-900 bg-white rounded px-2 py-1 max-h-32 overflow-y-auto whitespace-pre-wrap border border-surface-100" x-text="t.output_text_redacted"></div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </details>

                                <!-- Tool calls -->
                                <details class="rounded border border-surface-200 bg-white" :open="e._detail.tool_calls.length > 0">
                                    <summary class="cursor-pointer px-3 py-2 text-[11px] font-semibold text-brand-900 select-none">
                                        Tool calls <span class="text-surface-400 font-normal" x-text="'(' + e._detail.tool_calls.length + ')'"></span>
                                    </summary>
                                    <div class="border-t border-surface-100 p-3 space-y-2">
                                        <template x-if="e._detail.tool_calls.length === 0">
                                            <div class="text-[10px] text-surface-400">Nenhuma chamada de tool registrada.</div>
                                        </template>
                                        <template x-for="tc in e._detail.tool_calls" :key="tc.id">
                                            <div class="rounded border border-surface-100 bg-surface-50/30 p-2.5">
                                                <div class="flex items-center justify-between mb-1.5">
                                                    <div class="flex items-center gap-2">
                                                        <span class="rounded bg-teal-100 px-1.5 py-0.5 text-[9px] font-semibold text-teal-700" x-text="tc.tool_name || '—'"></span>
                                                        <span class="text-[9px] text-surface-400" x-text="tc.mcp_server || ''"></span>
                                                    </div>
                                                    <div class="flex items-center gap-2 text-[9px]">
                                                        <span class="rounded-full px-1.5 py-0.5 font-semibold"
                                                              :class="tc.status==='completed'?'bg-emerald-50 text-emerald-600':tc.status==='failed'?'bg-rose-50 text-rose-600':'bg-surface-100 text-surface-500'"
                                                              x-text="tc.status"></span>
                                                        <span class="text-surface-400" x-text="(tc.latency_ms||0).toFixed(0) + ' ms'"></span>
                                                        <span class="text-surface-400" x-show="tc.cost_usd" x-text="'$' + (tc.cost_usd||0).toFixed(4)"></span>
                                                    </div>
                                                </div>
                                                <div x-show="tc.input_data" class="mb-1">
                                                    <div class="text-[9px] text-surface-400">Input</div>
                                                    <pre class="rounded bg-brand-950 text-brand-300 p-1.5 text-[9px] font-mono overflow-x-auto whitespace-pre-wrap max-h-24" x-text="fmtJson(tc.input_data)"></pre>
                                                </div>
                                                <div x-show="tc.output_data">
                                                    <div class="text-[9px] text-surface-400">Output</div>
                                                    <pre class="rounded bg-brand-950 text-brand-300 p-1.5 text-[9px] font-mono overflow-x-auto whitespace-pre-wrap max-h-24" x-text="fmtJson(tc.output_data)"></pre>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </details>

                                <!-- API call logs -->
                                <details class="rounded border border-surface-200 bg-white" :open="e._detail.api_call_logs.length > 0">
                                    <summary class="cursor-pointer px-3 py-2 text-[11px] font-semibold text-brand-900 select-none">
                                        Chamadas HTTP <span class="text-surface-400 font-normal" x-text="'(' + e._detail.api_call_logs.length + ')'"></span>
                                    </summary>
                                    <div class="border-t border-surface-100 p-3 space-y-1.5">
                                        <template x-if="e._detail.api_call_logs.length === 0">
                                            <div class="text-[10px] text-surface-400">Nenhuma chamada HTTP nesta janela temporal.</div>
                                        </template>
                                        <template x-for="log in e._detail.api_call_logs" :key="log.id">
                                            <div class="rounded border border-surface-100 bg-surface-50/30 p-2 text-[10px]">
                                                <div class="flex items-center gap-2">
                                                    <span class="rounded bg-surface-200 px-1.5 py-0.5 font-mono text-[9px] font-bold text-brand-900" x-text="log.method"></span>
                                                    <span class="rounded-full px-1.5 py-0.5 text-[9px] font-semibold"
                                                          :class="(log.status_code>=200&&log.status_code<300)?'bg-emerald-50 text-emerald-600':log.status_code>=400?'bg-rose-50 text-rose-600':'bg-amber-50 text-amber-600'"
                                                          x-text="log.status_code"></span>
                                                    <span class="font-mono text-brand-900 truncate flex-1" x-text="log.url"></span>
                                                    <span class="text-surface-400 shrink-0" x-text="(log.latency_ms||0).toFixed(0) + ' ms'"></span>
                                                </div>
                                                <div x-show="log.response_body" class="mt-1">
                                                    <button @click="log._show = !log._show" class="text-[9px] text-brand-500" x-text="log._show ? '▾ Esconder corpo' : '▸ Ver corpo'"></button>
                                                    <pre x-show="log._show" class="mt-1 rounded bg-brand-950 text-brand-300 p-1.5 text-[9px] font-mono overflow-x-auto whitespace-pre-wrap max-h-32" x-text="fmtJson(log.response_body)"></pre>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </details>

                                <!-- Audit (state transitions) -->
                                <details class="rounded border border-surface-200 bg-white">
                                    <summary class="cursor-pointer px-3 py-2 text-[11px] font-semibold text-brand-900 select-none">
                                        Auditoria <span class="text-surface-400 font-normal" x-text="'(' + e._detail.audit_events.length + ')'"></span>
                                    </summary>
                                    <div class="border-t border-surface-100 p-3 space-y-1">
                                        <template x-if="e._detail.audit_events.length === 0">
                                            <div class="text-[10px] text-surface-400">Sem eventos.</div>
                                        </template>
                                        <template x-for="a in e._detail.audit_events" :key="a.id">
                                            <div class="flex items-center gap-2 text-[10px] py-1 border-b border-surface-50 last:border-b-0">
                                                <span class="text-surface-400 shrink-0 w-32 font-mono" x-text="tzTimeSec(a.created_at)"></span>
                                                <span class="rounded-full bg-brand-100 px-1.5 py-0.5 text-[9px] font-mono text-brand-700 shrink-0" x-text="a.action"></span>
                                                <span class="text-surface-500 truncate" x-text="a.actor || a.entity_id?.substring(0,16) || ''"></span>
                                            </div>
                                        </template>
                                    </div>
                                </details>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Empty -->
    <template x-if="!loading && items.length === 0">
        <div class="text-center py-10 text-[12px] text-surface-400">
            Nenhuma invocação registrada para este agente ainda.
        </div>
    </template>

    <!-- Pagination -->
    <div x-show="items.length > 0" class="flex items-center justify-between mt-3">
        <button @click="prevPage()" :disabled="currentPage === 0" class="rounded-lg border border-surface-200 bg-white px-3 py-1.5 text-[11px] text-surface-500 hover:bg-surface-50 disabled:opacity-30">Anterior</button>
        <span class="text-[10px] text-surface-400" x-text="'Página ' + (currentPage + 1) + ' · ' + total + ' total'"></span>
        <button @click="nextPage()" :disabled="(currentPage+1)*pageSize >= total" class="rounded-lg border border-surface-200 bg-white px-3 py-1.5 text-[11px] text-surface-500 hover:bg-surface-50 disabled:opacity-30">Próxima</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function agentInvocationsPage(agentId) {
    return {
        agentId,
        agent: {},
        items: [],
        total: 0,
        loading: true,
        expandedId: null,
        filterState: '',
        pageSize: 20,
        currentPage: 0,

        async load() {
            this.loading = true;
            this.expandedId = null;
            const offset = this.currentPage * this.pageSize;
            const params = new URLSearchParams({ limit: String(this.pageSize), offset: String(offset) });
            if (this.filterState) params.set('state', this.filterState);
            try {
                const data = await api.get(`/api/v1/agents/${this.agentId}/invocations?${params}`);
                this.agent = data.agent || {};
                this.items = (data.invocations || []).map(i => ({ ...i, _detail: null, _loading: false }));
                this.total = data.total || 0;
            } catch (e) {
                this.items = [];
                this.total = 0;
            }
            this.loading = false;
        },

        async toggle(e) {
            if (this.expandedId === e.id) { this.expandedId = null; return; }
            this.expandedId = e.id;
            if (!e._detail && !e._loading) {
                e._loading = true;
                try {
                    e._detail = await api.get(`/api/v1/agents/${this.agentId}/invocations/${e.id}`);
                } catch (err) {
                    e._detail = { interaction: {}, turns: [], tool_calls: [], api_call_logs: [], audit_events: [], trace_id: null, tempo_link: null };
                }
                e._loading = false;
            }
        },

        prevPage() { if (this.currentPage > 0) { this.currentPage--; this.load(); } },
        nextPage() { if ((this.currentPage+1)*this.pageSize < this.total) { this.currentPage++; this.load(); } },

        stateIcon(s) {
            if (s === 'LogAndClose' || s === 'Recommend') return '✓';
            if (s === 'Refuse') return '⚠';
            if (s === 'Escalate') return '↑';
            return '…';
        },
        stateClass(s) {
            if (s === 'LogAndClose' || s === 'Recommend') return 'bg-emerald-500';
            if (s === 'Refuse') return 'bg-amber-500';
            if (s === 'Escalate') return 'bg-rose-500';
            return 'bg-surface-400';
        },
        stateBadgeClass(s) {
            if (s === 'LogAndClose' || s === 'Recommend') return 'bg-emerald-50 text-emerald-600';
            if (s === 'Refuse') return 'bg-amber-50 text-amber-600';
            if (s === 'Escalate') return 'bg-rose-50 text-rose-600';
            return 'bg-surface-100 text-surface-500';
        },
        fmtJson(raw) {
            if (!raw) return '';
            try { return JSON.stringify(JSON.parse(raw), null, 2); }
            catch { return String(raw); }
        },
    }
}
</script>
{% endblock %}
