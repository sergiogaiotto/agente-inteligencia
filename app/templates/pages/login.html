<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AgenteInteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',900:'#1e3a5f'},surface:{50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',400:'#94a3b8',500:'#64748b'}}}}}</script>
</head>
<body class="bg-surface-50 min-h-screen flex items-center justify-center">
<div x-data="loginPage()" class="w-full max-w-sm mx-auto px-4">
    <!-- Setup mode (first user) -->
    <template x-if="isSetup">
        <div class="rounded-2xl bg-white border border-surface-200 shadow-lg p-8">
            <div class="text-center mb-6">
                <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-white text-[18px] font-bold mx-auto mb-3">AI</div>
                <h1 class="text-[18px] font-bold text-brand-900">Criar Usuário Root</h1>
                <p class="text-[12px] text-surface-400 mt-1">Primeiro acesso — crie o administrador principal</p>
            </div>
            <div class="space-y-3">
                <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Usuário *</label>
                <input x-model="form.username" placeholder="admin" class="w-full rounded-lg border border-surface-200 px-3 py-2.5 text-[13px] outline-none focus:border-brand-400"></div>
                <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Nome de exibição</label>
                <input x-model="form.display_name" placeholder="Administrador" class="w-full rounded-lg border border-surface-200 px-3 py-2.5 text-[13px] outline-none focus:border-brand-400"></div>
                <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Email</label>
                <input x-model="form.email" type="email" placeholder="admin@empresa.com" class="w-full rounded-lg border border-surface-200 px-3 py-2.5 text-[13px] outline-none focus:border-brand-400"></div>
                <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Senha *</label>
                <input x-model="form.password" type="password" placeholder="••••••••" class="w-full rounded-lg border border-surface-200 px-3 py-2.5 text-[13px] outline-none focus:border-brand-400"></div>
                <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Confirmar Senha *</label>
                <input x-model="confirmPwd" type="password" placeholder="••••••••" class="w-full rounded-lg border border-surface-200 px-3 py-2.5 text-[13px] outline-none focus:border-brand-400"></div>
                <div x-show="error" class="rounded-lg bg-rose-50 px-3 py-2 text-[11px] text-rose-700" x-text="error"></div>
                <button @click="setupRoot()" :disabled="loading" class="w-full rounded-lg bg-brand-500 py-2.5 text-[13px] font-semibold text-white hover:bg-brand-600 disabled:opacity-50 transition-colors">
                    <span x-text="loading ? 'Criando...' : 'Criar e Entrar'"></span>
                </button>
            </div>
        </div>
    </template>

    <!-- Login mode -->
    <template x-if="!isSetup">
        <div class="rounded-2xl bg-white border border-surface-200 shadow-lg p-8">
            <div class="text-center mb-6">
                <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-white text-[18px] font-bold mx-auto mb-3">AI</div>
                <h1 class="text-[18px] font-bold text-brand-900">AgenteInteligência</h1>
                <p class="text-[12px] text-surface-400 mt-1">AI Mesh Platform</p>
            </div>
            <div class="space-y-3">
                <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Usuário</label>
                <input x-model="form.username" @keydown.enter="login()" placeholder="seu.usuario" class="w-full rounded-lg border border-surface-200 px-3 py-2.5 text-[13px] outline-none focus:border-brand-400"></div>
                <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Senha</label>
                <input x-model="form.password" @keydown.enter="login()" type="password" placeholder="••••••••" class="w-full rounded-lg border border-surface-200 px-3 py-2.5 text-[13px] outline-none focus:border-brand-400"></div>
                <div x-show="error" class="rounded-lg bg-rose-50 px-3 py-2 text-[11px] text-rose-700" x-text="error"></div>
                <button @click="login()" :disabled="loading" class="w-full rounded-lg bg-brand-500 py-2.5 text-[13px] font-semibold text-white hover:bg-brand-600 disabled:opacity-50 transition-colors">
                    <span x-text="loading ? 'Entrando...' : 'Entrar'"></span>
                </button>
            </div>
        </div>
    </template>
</div>
<script>
function loginPage() {
    return {
        isSetup: false, loading: false, error: '',
        form: { username: '', password: '', display_name: '', email: '' },
        confirmPwd: '',
        async init() {
            try {
                const r = await fetch('/api/v1/users/check-setup');
                const d = await r.json();
                this.isSetup = !d.has_users;
            } catch {}
        },
        async setupRoot() {
            if (!this.form.username.trim() || !this.form.password) { this.error = 'Preencha usuário e senha'; return; }
            if (this.form.password !== this.confirmPwd) { this.error = 'Senhas não conferem'; return; }
            if (this.form.password.length < 4) { this.error = 'Senha deve ter pelo menos 4 caracteres'; return; }
            this.loading = true; this.error = '';
            try {
                const r = await fetch('/api/v1/users', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({...this.form, role: 'root'}) });
                if (!r.ok) { const e = await r.json(); this.error = e.detail || 'Erro'; this.loading = false; return; }
                // Auto-login
                await fetch('/api/v1/users/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: this.form.username, password: this.form.password}) });
                window.location.href = '/';
            } catch(e) { this.error = e.message; }
            this.loading = false;
        },
        async login() {
            if (!this.form.username.trim() || !this.form.password) { this.error = 'Preencha usuário e senha'; return; }
            this.loading = true; this.error = '';
            try {
                const r = await fetch('/api/v1/users/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: this.form.username, password: this.form.password}) });
                if (!r.ok) { const e = await r.json(); this.error = e.detail || 'Credenciais inválidas'; this.loading = false; return; }
                window.location.href = '/';
            } catch(e) { this.error = e.message; }
            this.loading = false;
        },
    }
}
</script>
</body>
</html>
