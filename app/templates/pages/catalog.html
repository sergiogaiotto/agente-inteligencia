{% extends "layouts/base.html" %}

{% block content %}
<div x-data="catalogPage()" x-init="load()" class="p-4 lg:p-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-4">
        <div>
            <h2 class="text-[18px] font-bold text-brand-900">Catálogo</h2>
            <p class="text-[12px] text-surface-400 mt-0.5">Agentes, skills, pipelines e mais — publicados na empresa</p>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] text-surface-400" x-text="filtered.length + ' / ' + entries.length"></span>
            <a href="/catalog/publish" class="inline-flex items-center gap-2 rounded-lg bg-brand-500 px-3 py-2 text-[12px] font-semibold text-white hover:bg-brand-600 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                Publicar no Catálogo
            </a>
        </div>
    </div>

    <!-- Busca + Filtros -->
    <div class="rounded-xl border border-surface-200 bg-white p-3 mb-4">
        <div class="flex flex-wrap items-center gap-2">
            <!-- Search -->
            <div class="flex-1 min-w-[200px] relative">
                <svg class="w-4 h-4 absolute left-2.5 top-2.5 text-surface-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
                <input type="text" x-model="search"
                       placeholder="Buscar por nome, descrição ou URN..."
                       class="w-full pl-8 pr-3 py-2 rounded-lg border border-surface-200 text-[12px] outline-none focus:border-brand-400">
            </div>
            <select x-model="filterKind" class="rounded-lg border border-surface-200 bg-white px-2.5 py-2 text-[11px] outline-none">
                <option value="">Todos tipos</option>
                <option value="agent">Agentes</option>
                <option value="skill">Skills</option>
                <option value="recipe">Recipes</option>
                <option value="pipeline">Pipelines</option>
                <option value="application">Aplicações</option>
                <option value="external_platform">Plataformas externas</option>
            </select>
            <select x-model="filterStatus" class="rounded-lg border border-surface-200 bg-white px-2.5 py-2 text-[11px] outline-none">
                <option value="">Todos status</option>
                <option value="draft">Draft</option>
                <option value="submitted">Submitted</option>
                <option value="approved">Approved</option>
                <option value="published">Published</option>
                <option value="deprecated">Deprecated</option>
                <option value="archived">Archived</option>
            </select>
            <input type="text" x-model="filterDomain"
                   placeholder="Domínio..."
                   class="rounded-lg border border-surface-200 px-2.5 py-2 text-[11px] outline-none focus:border-brand-400 w-[140px]">
            <button @click="resetFilters()" x-show="hasFilters()" class="text-[11px] text-surface-500 hover:text-brand-600 px-2 py-2">
                Limpar
            </button>
        </div>
    </div>

    <!-- Loading -->
    <template x-if="loading">
        <div class="text-center py-12 text-[12px] text-surface-400">Carregando catálogo...</div>
    </template>

    <!-- Empty state -->
    <template x-if="!loading && filtered.length === 0 && entries.length === 0">
        <div class="rounded-xl border-2 border-dashed border-surface-200 bg-white p-12 text-center">
            <div class="h-12 w-12 rounded-full bg-brand-50 flex items-center justify-center mx-auto mb-3">
                <svg class="w-6 h-6 text-brand-500" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"/></svg>
            </div>
            <p class="text-[14px] font-semibold text-brand-900 mb-1">Catálogo vazio</p>
            <p class="text-[12px] text-surface-400 max-w-md mx-auto">Nenhuma entry publicada ainda. Publishers podem criar agentes em <a href="/agents" class="text-brand-600 underline">Agentes</a> e enviá-los para o catálogo.</p>
        </div>
    </template>

    <!-- Filtered empty (mas catálogo tem entries) -->
    <template x-if="!loading && filtered.length === 0 && entries.length > 0">
        <div class="rounded-xl border border-surface-200 bg-white p-8 text-center">
            <p class="text-[13px] text-surface-500 mb-2">Nenhuma entry casa com os filtros aplicados</p>
            <button @click="resetFilters()" class="text-[12px] text-brand-600 hover:underline">Limpar filtros</button>
        </div>
    </template>

    <!-- Grid de cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
        <template x-for="entry in filtered" :key="entry.id">
            <a :href="'/catalog/' + entry.id"
               class="group block rounded-xl border border-surface-200 bg-white p-4 hover:border-brand-300 hover:shadow-md transition-all">

                <!-- Header: nome + status + version -->
                <div class="flex items-start justify-between gap-2 mb-2">
                    <div class="flex-1 min-w-0">
                        <h3 class="text-[14px] font-semibold text-brand-900 truncate group-hover:text-brand-600" x-text="entry.name"></h3>
                        <p class="text-[10px] text-surface-400 font-mono truncate mt-0.5" x-text="entry.urn"></p>
                    </div>
                    <span class="rounded-full px-2 py-0.5 text-[9px] font-bold uppercase shrink-0"
                          :class="statusBadgeClass(entry.status)"
                          x-text="entry.status"></span>
                </div>

                <!-- Badges: kind + version + domain -->
                <div class="flex flex-wrap items-center gap-1.5 mb-3">
                    <span class="rounded-full px-2 py-0.5 text-[9px] font-bold uppercase"
                          :class="kindBadgeClass(entry.kind)"
                          x-text="kindLabel(entry.kind)"></span>
                    <span class="rounded-full bg-surface-100 px-2 py-0.5 text-[9px] font-mono text-surface-500" x-text="'v' + entry.version"></span>
                    <span x-show="entry.domain" class="rounded-full bg-brand-50 px-2 py-0.5 text-[9px] text-brand-700" x-text="entry.domain"></span>
                    <span x-show="entry.visibility !== 'company'" class="rounded-full bg-amber-50 px-2 py-0.5 text-[9px] text-amber-700" x-text="visibilityLabel(entry)"></span>
                </div>

                <!-- Descrição -->
                <p class="text-[11px] text-surface-500 leading-relaxed line-clamp-2 mb-3" x-text="entry.description || 'Sem descrição.'"></p>

                <!-- Trust metrics -->
                <div class="border-t border-surface-100 pt-2.5 grid grid-cols-3 gap-2 text-[10px]">
                    <div>
                        <div class="text-surface-400 text-[9px] uppercase tracking-wider">Reliability</div>
                        <div class="font-mono font-bold mt-0.5" :class="reliabilityClass(entry.trust_reliability)" x-text="formatReliability(entry.trust_reliability)"></div>
                    </div>
                    <div>
                        <div class="text-surface-400 text-[9px] uppercase tracking-wider">p95</div>
                        <div class="font-mono font-bold text-brand-900 mt-0.5" x-text="formatLatency(entry.trust_latency_p95_ms)"></div>
                    </div>
                    <div>
                        <div class="text-surface-400 text-[9px] uppercase tracking-wider">Custo/call</div>
                        <div class="font-mono font-bold text-brand-900 mt-0.5" x-text="formatCost(entry.trust_avg_cost_usd)"></div>
                    </div>
                </div>

                <!-- Tags (se houver) -->
                <div x-show="entry.tags && entry.tags.length > 0" class="mt-2.5 flex flex-wrap gap-1">
                    <template x-for="tag in (entry.tags || []).slice(0, 4)" :key="tag">
                        <span class="rounded-full bg-surface-50 px-1.5 py-0.5 text-[9px] text-surface-500" x-text="tag"></span>
                    </template>
                </div>

            </a>
        </template>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function catalogPage() {
    return {
        entries: [], loading: true,
        search: '', filterKind: '', filterStatus: '', filterDomain: '',

        async load() {
            this.loading = true;
            try {
                const params = new URLSearchParams();
                if (this.filterKind) params.set('kind', this.filterKind);
                if (this.filterStatus) params.set('status', this.filterStatus);
                if (this.filterDomain) params.set('domain', this.filterDomain);
                params.set('limit', '100');
                const data = await api.get('/api/v1/catalog/entries?' + params);
                this.entries = data.entries || [];
            } catch (e) {
                console.error(e);
                showToast('Erro ao carregar catálogo', 'error');
                this.entries = [];
            }
            this.loading = false;
        },

        // Watchers — recarrega quando filtros de servidor mudam
        // (search é client-side; kind/status/domain vão na query)
        init() {
            this.$watch('filterKind', () => this.load());
            this.$watch('filterStatus', () => this.load());
            this.$watch('filterDomain', () => this.load());
        },

        hasFilters() {
            return this.search || this.filterKind || this.filterStatus || this.filterDomain;
        },

        resetFilters() {
            this.search = '';
            this.filterKind = '';
            this.filterStatus = '';
            this.filterDomain = '';
            this.load();
        },

        get filtered() {
            if (!this.search) return this.entries;
            const q = this.search.toLowerCase();
            return this.entries.filter(e =>
                (e.name || '').toLowerCase().includes(q) ||
                (e.description || '').toLowerCase().includes(q) ||
                (e.urn || '').toLowerCase().includes(q)
            );
        },

        kindLabel(k) {
            return ({
                agent: 'Agente',
                skill: 'Skill',
                recipe: 'Recipe',
                pipeline: 'Pipeline',
                application: 'Aplicação',
                external_platform: 'Externa',
            })[k] || k;
        },

        kindBadgeClass(k) {
            return ({
                agent: 'bg-red-50 text-red-700',
                skill: 'bg-teal-50 text-teal-700',
                recipe: 'bg-brand-50 text-brand-700',
                pipeline: 'bg-emerald-50 text-emerald-700',
                application: 'bg-amber-50 text-amber-700',
                external_platform: 'bg-rose-50 text-rose-700',
            })[k] || 'bg-surface-100 text-surface-600';
        },

        statusBadgeClass(s) {
            return ({
                draft: 'bg-surface-100 text-surface-500',
                submitted: 'bg-amber-50 text-amber-700',
                approved: 'bg-brand-50 text-brand-700',
                published: 'bg-emerald-50 text-emerald-700',
                deprecated: 'bg-amber-100 text-amber-800',
                archived: 'bg-surface-200 text-surface-500',
            })[s] || 'bg-surface-100 text-surface-500';
        },

        visibilityLabel(e) {
            if (e.visibility === 'private') return 'Privada';
            if (e.visibility === 'department') return e.visibility_scope || 'Depto';
            return '';
        },

        formatReliability(v) {
            if (!v && v !== 0) return '—';
            return (Math.round(v * 100)) + '%';
        },

        reliabilityClass(v) {
            if (v === null || v === undefined) return 'text-surface-400';
            if (v >= 0.9) return 'text-emerald-600';
            if (v >= 0.7) return 'text-brand-600';
            if (v >= 0.5) return 'text-amber-600';
            return 'text-rose-600';
        },

        formatLatency(ms) {
            if (!ms) return '—';
            if (ms < 1000) return Math.round(ms) + 'ms';
            return (ms / 1000).toFixed(1) + 's';
        },

        formatCost(usd) {
            if (!usd) return '—';
            if (usd < 0.01) return '<$0.01';
            return '$' + usd.toFixed(3);
        },
    }
}
</script>
{% endblock %}
