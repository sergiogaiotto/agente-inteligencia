                                    class="rounded-lg bg-brand-500 px-4 py-2 text-[12px] font-semibold text-white hover:bg-brand-600 disabled:opacity-50">
                                <span x-text="inspectQueryLoading ? 'Buscando...' : 'Buscar'"></span>
                            </button>
                        </div>
                        <p class="text-[10px] text-surface-500">
                            Executa BM25 (Postgres tsvector) + similaridade vetorial (pgvector) <strong>restritos a esta KB</strong>, fundidos via RRF.
                            Replica o que um agente real faria — útil para validar antes de promover pro produção.
                        </p>
                        <div x-show="inspectQueryError" class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-[11px] text-rose-700"
                             x-text="inspectQueryError"></div>
                        <div x-show="!inspectQueryLoading && inspectQueryResults.length === 0 && inspectQueryRan && !inspectQueryError"
                             class="text-center py-8 text-[11px] text-surface-400">
                            Nenhum resultado pra <code class="bg-surface-100 px-1 rounded" x-text="inspectQueryText"></code> nesta KB.
                        </div>
                        <div class="space-y-2">
                            <template x-for="(r, i) in inspectQueryResults" :key="i">
                                <div class="rounded-lg border border-surface-200 bg-white">
                                    <div class="flex items-center justify-between px-3 py-2 border-b border-surface-100 bg-emerald-50/30">
                                        <div class="flex items-center gap-2 text-[10px]">
                                            <span class="rounded bg-emerald-100 text-emerald-700 px-1.5 py-0.5 font-bold font-mono">#<span x-text="i+1"></span></span>
                                            <span class="font-semibold text-emerald-700">score:</span>
                                            <span class="font-mono text-emerald-700" x-text="r.relevance_score"></span>
                                            <span x-show="r.source_name" class="text-surface-400">·</span>
                                            <span x-show="r.source_name" class="text-surface-500" x-text="r.source_name"></span>
                                        </div>
                                        <span class="text-[9px] font-mono text-surface-300" x-text="r.evidence_id?.slice(0, 8) || ''"></span>
                                    </div>
                                    <div class="px-3 py-2 text-[11px] text-surface-700 leading-relaxed" x-text="r.snippet_text"></div>
                                </div>
                            </template>
                        </div>
                    </div>

                </div>
            </aside>
        </div>
    </template>

    <style>
        .truncate-3-lines {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</div>
{% endblock %}
{% block scripts %}
<script>
function evidencePage() {
    return {
        sources: [],
        statsBy: {},  // {source_id: {chunks_count, tokens_total, last_chunk_at, ...}}
        editorOpen: false, editingId: null, saving: false,
        form: { name: '', description: '', source_type: 'manual', confidentiality_label: 'internal', kb_mode: 'hybrid' },

        // ─── Onda 6 Wave 1b: ingestão (markitdown) ──────────────────
        ingestOpen: false,
        ingestSourceId: null,
        ingestSourceName: '',
        ingestTab: 'text',  // 'text' | 'file' | 'url'
        ingestForm: { text: '', file: null, url: '', replace: true, chunk_size: '', chunk_overlap: '' },
        ingestProgress: { loading: false, error: null, result: null },
        ingestAdvancedOpen: false,
        // Defaults exibidos como placeholder (lidos do .env via /api/v1/dashboard/rag-config)
        defaultChunkSize: 500,
        defaultChunkOverlap: 50,

        // ─── Inspeção de KB (overview/chunks/test query) ───────────
        inspectOpen: false,
        inspectSource: null,         // KB completa (id, name, source_type, etc.)
        inspectTab: 'overview',       // 'overview' | 'documents' | 'chunks' | 'tables' | 'query'
        // Catálogo de Dados: categorias de PII (espelha o enum PiiCategory do backend)
        piiCategories: ['none','cpf','cnpj','email','phone','name','address','financial','health','biometric','other'],
        inspectChunks: [],            // chunks já carregados
        inspectChunkLimit: 50,        // página a cada loadInspectChunks
        inspectChunksLoading: false,
        inspectChunkFilter: '',       // filtro textual local (sem hit no servidor)
        // PR #227: documentos agrupados por source_doc_id
        inspectDocs: [],
        inspectDocsLoading: false,
        inspectQueryText: '',
        inspectQueryTopN: 5,
        inspectQueryResults: [],
        inspectQueryLoading: false,
        inspectQueryError: '',
        inspectQueryRan: false,       // 1ª busca foi feita? — controla "nenhum resultado"

        get inspectAvgTokens() {
            const stats = this.statsBy[this.inspectSource?.id];
            const c = stats?.chunks_count || 0;
            const t = stats?.tokens_total || 0;
            return c > 0 ? Math.round(t / c).toLocaleString() : '—';
        },

        get filteredChunks() {
            const q = (this.inspectChunkFilter || '').toLowerCase().trim();
            if (!q) return this.inspectChunks;
            return this.inspectChunks.filter(c => (c.text || '').toLowerCase().includes(q));
        },

        get ingestCanSubmit() {
            if (this.ingestTab === 'text') return !!(this.ingestForm.text || '').trim();
            if (this.ingestTab === 'file') return !!this.ingestForm.file;
            if (this.ingestTab === 'url') return !!(this.ingestForm.url || '').trim();
            return false;
        },

        async load() {
            try {
                const d = await api.get('/api/v1/knowledge-sources');
                this.sources = d.sources || [];
            } catch { this.sources = []; }
            // Defaults de chunking pro placeholder dos inputs avançados
            try {
                const cfg = await api.get('/api/v1/rag-config');
                this.defaultChunkSize = cfg.chunk_size || 500;
                this.defaultChunkOverlap = cfg.chunk_overlap || 50;
            } catch {}
            // Carrega stats em paralelo (uma req por source). Para volumes grandes
            // (>50 sources) considerar endpoint batch — fora de escopo desta onda.
            await this.loadAllStats();
        },

        async loadAllStats() {
            const out = {};
            await Promise.all(this.sources.map(async s => {
                try {
                    const r = await api.get('/api/v1/knowledge-sources/' + s.id + '/stats');
                    out[s.id] = r;
                } catch {
                    out[s.id] = { chunks_count: 0, tokens_total: 0, last_chunk_at: null };
                }
            }));
            this.statsBy = out;
        },

        ago(iso) {
            // Tempo relativo curto: "2h", "5d", "agora". null/inválido → "—".
            if (!iso) return '—';
            const t = new Date(iso).getTime();
            if (isNaN(t)) return '—';
            const sec = Math.max(1, (Date.now() - t) / 1000);
            if (sec < 60) return 'agora';
            if (sec < 3600) return Math.floor(sec/60) + 'min atrás';
            if (sec < 86400) return Math.floor(sec/3600) + 'h atrás';
            return Math.floor(sec/86400) + 'd atrás';
        },

        openEditor(s) {
            if (s) {
                this.editingId = s.id;
                this.form = { name: s.name || '', description: s.description || '', source_type: s.source_type || 'manual', confidentiality_label: s.confidentiality_label || 'internal', kb_mode: s.kb_mode || 'hybrid' };
            } else {
                this.editingId = null;
                this.form = { name: '', description: '', source_type: 'manual', confidentiality_label: 'internal', kb_mode: 'hybrid' };
            }
            this.editorOpen = true;
        },

        async saveSource() {
            if (!this.form.name.trim()) { showToast('Nome obrigatório', 'error'); return; }
            this.saving = true;
            try {
                if (this.editingId) {
                    await api.put('/api/v1/knowledge-sources/' + this.editingId, this.form);
                    showToast('Base atualizada');
                } else {
                    await api.post('/api/v1/knowledge-sources', this.form);
                    showToast('Base registrada');
                }
                this.editorOpen = false;
                await this.load();
            } catch(e) { showToast(e.message, 'error'); }
            this.saving = false;
        },

        async deleteSource(id, name) {
            if (!confirm(`Remover base "${name}"? Evidências vinculadas perderão a referência.`)) return;
            try { await api.del('/api/v1/knowledge-sources/' + id); showToast('Base removida'); await this.load(); } catch { showToast('Erro', 'error'); }
        },

        // ─── Ingestão (Onda 6 Wave 1b) ──────────────────────────────
        openIngest(s) {
            this.ingestSourceId = s.id;
            this.ingestSourceName = s.name;
            this.ingestTab = 'text';
            this.ingestForm = { text: '', file: null, url: '', replace: true, chunk_size: '', chunk_overlap: '' };
            this.ingestProgress = { loading: false, error: null, result: null };
            // Onda Tabular — estado de análise/promoção (modal próprio, persistente)
            this.tabularAnalysis = { loading: false, error: null, result: null };
            this.tabularPromote = { loading: false, error: null, results: [], currentSheet: null };
            this.tabularPromoteOpen = false;
            this.selectedSheetName = null;
            this.selectedAppendTarget = '';  // id da data_table alvo de append
            this.ingestAdvancedOpen = false;
            this.ingestOpen = true;
        },

        async runIngest() {
            if (!this.ingestCanSubmit || this.ingestProgress.loading) return;
            this.ingestProgress = { loading: true, error: null, result: null };
            const sid = this.ingestSourceId;
            // Helper: campos vazios ('') viram null no JSON pra manter default no backend
            const cs = this.ingestForm.chunk_size === '' || this.ingestForm.chunk_size == null ? null : Number(this.ingestForm.chunk_size);
            const co = this.ingestForm.chunk_overlap === '' || this.ingestForm.chunk_overlap == null ? null : Number(this.ingestForm.chunk_overlap);
            try {
                let result;
                if (this.ingestTab === 'text') {
                    result = await api.post('/api/v1/knowledge-sources/' + sid + '/ingest', {
                        text: this.ingestForm.text,
                        replace: this.ingestForm.replace,
                        chunk_size: cs,
                        chunk_overlap: co,
                    });
                } else if (this.ingestTab === 'url') {
                    result = await api.post('/api/v1/knowledge-sources/' + sid + '/ingest-url', {
                        url: this.ingestForm.url,
                        replace: this.ingestForm.replace,
                        chunk_size: cs,
                        chunk_overlap: co,
                    });
                } else if (this.ingestTab === 'file') {
                    // Multipart upload (api.post pode não suportar FormData — usa fetch direto)
                    const fd = new FormData();
                    fd.append('file', this.ingestForm.file);
                    fd.append('replace', String(this.ingestForm.replace));
                    if (cs !== null) fd.append('chunk_size', String(cs));
                    if (co !== null) fd.append('chunk_overlap', String(co));
                    const resp = await fetch('/api/v1/knowledge-sources/' + sid + '/ingest-file', {
                        method: 'POST',
                        body: fd,
                        credentials: 'include',
                    });
                    if (!resp.ok) {
                        let msg = `HTTP ${resp.status}`;
                        try { const j = await resp.json(); msg = j.detail || msg; } catch {}
                        throw new Error(msg);
                    }
                    result = await resp.json();
                }
                this.ingestProgress = { loading: false, error: null, result };
                // Onda Tabular: backend pode retornar skipped_rag=true para KS tabular
                // (não chunkou nada, espera promote-to-table). Toast adapta.
                if (result.skipped_rag) {
                    showToast(`KS tabular: arquivo aceito, indo para promover tabela...`, 'success');
                } else {
                    showToast(`Ingestão concluída: ${result.chunks_created} chunks`);
                }
                // Recarrega stats da source pra atualizar o badge no card
                await this.loadAllStats();
                // Onda Tabular: se foi CSV/XLSX, oferece promoção para tabela consultável
                this.tabularAnalysis = { loading: false, error: null, result: null };
                this.tabularPromote = { loading: false, error: null, results: [], currentSheet: null };
                this.tabularPromoteOpen = false;
                this.selectedSheetName = null;
                this.selectedAppendTarget = '';
                if (this.ingestTab === 'file' && this.ingestForm.file && this._isTabularFile(this.ingestForm.file)) {
                    // Análise + abertura do modal acontece em background — não bloqueia o fluxo
                    // do user, que pode fechar este modal. O modal de promote sobrevive.
                    this._runTabularAnalyze();
                }
            } catch(e) {
                this.ingestProgress = {
                    loading: false,
                    error: (e?.message || 'erro desconhecido'),
                    result: null,
                };
            }
        },

        // ─── Onda Tabular: análise + promoção de CSV/XLSX a tabela DuckDB ─
        _isTabularFile(file) {
            if (!file || !file.name) return false;
            const n = file.name.toLowerCase();
            return n.endsWith('.csv') || n.endsWith('.xlsx') || n.endsWith('.xls');
        },

        async _runTabularAnalyze() {
            const sid = this.ingestSourceId;
            if (!sid || !this.ingestForm.file) {
                console.warn('[tabular] _runTabularAnalyze: sem sid ou file', { sid, hasFile: !!this.ingestForm.file });
                return;
            }
            console.log('[tabular] iniciando análise:', this.ingestForm.file.name);
            this.tabularAnalysis = { loading: true, error: null, result: null };
            try {
                const fd = new FormData();
                fd.append('file', this.ingestForm.file);
                const resp = await fetch('/api/v1/knowledge-sources/' + sid + '/analyze-tabular', {
                    method: 'POST', body: fd, credentials: 'include',
                });
                if (!resp.ok) {
                    let msg = `HTTP ${resp.status}`;
                    try { const j = await resp.json(); msg = j.detail || msg; } catch {}
                    throw new Error(msg);
                }
                const result = await resp.json();
                console.log('[tabular] análise OK:', {
                    ext: result.ext,
                    sheet_count: result.sheet_count,
                    primary: result.primary_sheet,
                    top_score: result.score,
                    top_ready: result.tabular_ready,
                    sheets: (result.sheets || []).map(s => ({
                        name: s.name, ready: s.tabular_ready, score: s.score,
                        rows: s.rows, cols: s.columns, header_row: s.header_row,
                    })),
                });
                this.tabularAnalysis = { loading: false, error: null, result };

                // Abre modal SE alguma aba (ou o CSV) está apta a virar tabela.
                // Compat: backend antigo pode não enviar `sheets[]` — cai no top-level.
                const sheetsArr = Array.isArray(result.sheets) ? result.sheets : [];
                const anyReady = sheetsArr.length > 0
                    ? sheetsArr.some(s => s.tabular_ready)
                    : !!result.tabular_ready;

                if (anyReady) {
                    // Default selecionada = aba primária (ou primeira ready)
                    this.selectedSheetName = result.primary_sheet
                        || (sheetsArr.find(s => s.tabular_ready)?.name)
                        || null;
                    // Pré-carrega tabelas existentes da KS pra oferecer "Adicionar
                    // linhas a tabela existente" no modal (compatibleExistingTables)
                    if (this.loadTablesForSource && this.ingestSourceId) {
                        this.loadTablesForSource(this.ingestSourceId);
                    }
                    this.tabularPromoteOpen = true;
                    showToast('Planilha estruturada detectada — escolha como promover no modal.', 'success');
                } else {
                    // Análise rodou mas nada está apto. Toast neutro pra user saber.
                    const detail = sheetsArr.length > 0
                        ? `${sheetsArr.length} aba(s) analisada(s), nenhuma apta.`
                        : 'Arquivo não parece estruturado.';
                    showToast('Análise concluída: ' + detail + ' Veja "Tentar de novo" no painel.', 'error');
                }
            } catch(e) {
                console.error('[tabular] análise FALHOU:', e);
                this.tabularAnalysis = { loading: false, error: e.message || 'falha na análise', result: null };
                showToast('Análise tabular falhou: ' + (e.message || 'erro desconhecido'), 'error');
            }
        },

        async promoteToTable(sheetName = null, silentToast = false) {
            const sid = this.ingestSourceId;
            if (!sid || !this.ingestForm.file || this.tabularPromote.loading) return;
            // currentSheet ajuda o spinner a mostrar qual aba está sendo criada
            this.tabularPromote.loading = true;
            this.tabularPromote.error = null;
            this.tabularPromote.currentSheet = sheetName;
            if (!Array.isArray(this.tabularPromote.results)) {
                this.tabularPromote.results = [];
            }
            try {
                const fd = new FormData();
                fd.append('file', this.ingestForm.file);
                // Nome: filename sem extensão; backend adiciona sheet_name como sufixo se multi-aba
                const base = this.ingestForm.file.name.replace(/\.[^.]+$/, '');
                if (sheetName && sheetName !== '_csv_') {
                    fd.append('sheet_name', sheetName);
                }
                fd.append('description', '');
                const resp = await fetch('/api/v1/knowledge-sources/' + sid + '/promote-to-table', {
                    method: 'POST', body: fd, credentials: 'include',
                });
                if (!resp.ok) {
                    let msg = `HTTP ${resp.status}`;
                    try { const j = await resp.json(); msg = j.detail || msg; } catch {}
                    throw new Error(msg);
                }
                const result = await resp.json();
                this.tabularPromote.results.push(result);
                this.tabularPromote.loading = false;
                this.tabularPromote.currentSheet = null;
                if (!silentToast) {
                    showToast(`Tabela "${result.name}" criada (${result.row_count} linhas)`);
                }
                // Recarrega lista de tabelas da KB para refletir na tab "Tabelas"
                if (this.loadTablesForSource) await this.loadTablesForSource(sid);
                // PR #228: invalida stats do card esquerdo também. Sem isso o
                // card mostra contagem antiga (race: painel direito atualiza,
                // card fica stale até reload manual). refreshStatsFor é
                // single-KB e mais leve que loadAllStats.
                if (this.refreshStatsFor) await this.refreshStatsFor(sid);
            } catch(e) {
                this.tabularPromote.loading = false;
                this.tabularPromote.error = e.message || 'falha na promoção';
                this.tabularPromote.currentSheet = null;
                if (!silentToast) {
                    showToast('Erro ao promover: ' + (e.message || ''), 'error');
                }
            }
        },

        // ─── Inspeção (overview / chunks / tabelas / test query) ────
        openInspect(s) {
            this.inspectSource = s;
            this.inspectTab = 'overview';
            this.inspectChunks = [];
            this.inspectChunkFilter = '';
            this.inspectQueryText = '';
            this.inspectQueryResults = [];
            this.inspectQueryError = '';
            this.inspectQueryRan = false;
            // Onda Tabular — listagem de tabelas da KB
            this.inspectTables = [];
            this.inspectTablesLoading = false;
            this.inspectOpen = true;
            // Pré-carrega chunks pra a aba "Chunks" não ter delay quando trocar
            this.loadInspectChunks(true);
        },

        // ─── Onda Tabular: modal de promoção PERSISTENTE ──────────────
        // Aberto automaticamente quando _runTabularAnalyze conclui com sucesso.
        // Sobrevive ao fechamento do modal de ingest. Aceita XLSX multi-aba.
        closeTabularPromote() {
            this.tabularPromoteOpen = false;
            this.selectedSheetName = null;
            this.selectedAppendTarget = '';
            // tabularAnalysis.result mantém — se user reabrir, encontra cache
        },

        // Onda Tabular: tabelas existentes na KS atual com schema compatível
        // com a aba selecionada (intersecção mínima de >=1 coluna em comum).
        // Usa inspectTables (carregado pela aba Tabelas do drawer + recarregado
        // após cada promote). Caller deve garantir loadTablesForSource antes.
        get compatibleExistingTables() {
            const sheet = this.selectedSheet;
            if (!sheet || !sheet.schema || !sheet.schema.length) return [];
            const sheetCols = new Set(sheet.schema.map(c => c.name));
            return (this.inspectTables || [])
                .filter(t => t.status === 'ready' && t.knowledge_source_id === this.ingestSourceId)
                .filter(t => {
                    const tblCols = (t.schema_json || []).map(c => c.name);
                    return tblCols.some(c => sheetCols.has(c));
                });
        },

        async appendToExistingTable(targetTableId, sheetName) {
            if (!targetTableId || !this.ingestForm.file || this.tabularPromote.loading) return;
            this.tabularPromote.loading = true;
            this.tabularPromote.error = null;
            this.tabularPromote.currentSheet = sheetName;
            if (!Array.isArray(this.tabularPromote.results)) {
                this.tabularPromote.results = [];
            }
            try {
                const fd = new FormData();
                fd.append('file', this.ingestForm.file);
                if (sheetName && sheetName !== '_csv_') {
                    fd.append('sheet_name', sheetName);
                }
                const resp = await fetch('/api/v1/data-tables/' + targetTableId + '/append', {
                    method: 'POST', body: fd, credentials: 'include',
                });
                if (!resp.ok) {
                    let msg = `HTTP ${resp.status}`;
                    try { const j = await resp.json(); msg = j.detail || msg; } catch {}
                    throw new Error(msg);
                }
                const result = await resp.json();
                // Empacota como "result" tipo promote pra reaproveitar UI
                this.tabularPromote.results.push({
                    id: result.table_id,
                    name: `(append) +${result.rows_added} linhas`,
                    row_count: result.row_count_after,
                    urn: `→ ${result.row_count_before} + ${result.rows_added} = ${result.row_count_after}`,
                });
                this.tabularPromote.loading = false;
                this.tabularPromote.currentSheet = null;
                showToast(`+${result.rows_added} linhas adicionadas (total: ${result.row_count_after})`, 'success');
                if (this.loadTablesForSource) await this.loadTablesForSource(this.ingestSourceId);
                // PR #228: invalida stats do card. Append não muda tables_count
                // mas muda tables_rows_total e last_table_at — card precisa
                // refletir sem reload manual.
                if (this.refreshStatsFor) await this.refreshStatsFor(this.ingestSourceId);
            } catch(e) {
                this.tabularPromote.loading = false;
                this.tabularPromote.error = e.message || 'falha no append';
                this.tabularPromote.currentSheet = null;
                showToast('Erro ao adicionar linhas: ' + (e.message || ''), 'error');
            }
        },

        // Aba selecionada (getter computado)
        get selectedSheet() {
            if (!this.tabularAnalysis.result) return null;
            const sheets = this.tabularAnalysis.result.sheets || [];
            if (sheets.length === 0) {
                // CSV ou XLSX sem listagem de aba — usa top-level como "1 sheet"
                return {
                    name: '_csv_',
                    header_row: 1,
                    rows: this.tabularAnalysis.result.rows,
                    columns: this.tabularAnalysis.result.columns,
                    schema: this.tabularAnalysis.result.schema || [],
                    score: this.tabularAnalysis.result.score,
                    tabular_ready: this.tabularAnalysis.result.tabular_ready,
                    warnings: this.tabularAnalysis.result.warnings || [],
                    suggested_pk: this.tabularAnalysis.result.suggested_pk,
                    header_row_auto_detected: false,
                };
            }
            const name = this.selectedSheetName || this.tabularAnalysis.result.primary_sheet || sheets[0].name;
            return sheets.find(s => s.name === name) || sheets[0];
        },

        // Promove TODAS as abas em sequência (1 chamada por aba).
        async promoteAllSheets() {
            if (!this.tabularAnalysis.result) return;
            const sheets = this.tabularAnalysis.result.sheets || [];
            // Só promove as que estão "ready" — abas patológicas viram skip
            const targets = sheets.filter(s => s.tabular_ready);
            if (targets.length === 0) {
                showToast('Nenhuma aba pronta para promover.', 'error');
                return;
            }
            for (const s of targets) {
                await this.promoteToTable(s.name, /*silentToast=*/true);
                if (this.tabularPromote.error) break;  // para na 1ª falha
            }
            const ok = (this.tabularPromote.results || []).length;
            if (ok > 0) showToast(`${ok} tabela(s) promovida(s).`);
        },

        // ─── Onda Tabular: lista tabelas de uma KS ──────────────────
        async loadTablesForSource(sid) {
            if (!sid) return;
            this.inspectTablesLoading = true;
            try {
                const resp = await fetch('/api/v1/data-tables?ks_id=' + encodeURIComponent(sid), {
                    credentials: 'include',
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const body = await resp.json();
                this.inspectTables = (body.data_tables || []).map(t => ({ ...t, _expanded: false, _catSaving: false, _catSuggesting: false, _catSuggested: false }));
            } catch(e) {
                this.inspectTables = [];
                showToast('Erro ao carregar tabelas: ' + (e.message || ''), 'error');
            } finally {
                this.inspectTablesLoading = false;
            }
        },

        // ─── Catálogo de Dados: salvar curadoria humana (PR2) ───────
        async saveCatalog(t) {
            t._catSaving = true;
            try {
                const payload = {
                    description: t.description || '',
                    columns: (t.catalog?.columns || []).map(c => ({
                        name: c.name,
                        description: c.description || '',
                        pii_category: c.pii_category || 'none',
                    })),
                };
                const resp = await fetch('/api/v1/data-tables/' + encodeURIComponent(t.id) + '/catalog', {
                    method: 'PUT',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!resp.ok) {
                    let msg = 'HTTP ' + resp.status;
                    try { const b = await resp.json(); if (b.detail) msg = b.detail; } catch {}
                    throw new Error(msg);
                }
                showToast('Catálogo salvo');
                await this.loadTablesForSource(this.inspectSource?.id);
            } catch(e) {
                showToast('Erro ao salvar catálogo: ' + (e.message || ''), 'error');
            } finally {
                t._catSaving = false;
            }
        },

        // ─── Catálogo de Dados: sugestão por IA (PR3) — NÃO salva ───
        async generateCatalogAI(t) {
            t._catSuggesting = true;
            try {
                const resp = await fetch('/api/v1/data-tables/' + encodeURIComponent(t.id) + '/catalog/suggest', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sample_size: 10 }),
                });
                if (!resp.ok) {
                    let msg = 'HTTP ' + resp.status;
                    try { const b = await resp.json(); if (b.detail) msg = b.detail; } catch {}
                    throw new Error(msg);
                }
                const sug = (await resp.json()).suggestion || {};
                // preenche os campos editáveis SEM salvar (sugestão volátil; humano cura)
                if (sug.table_description) t.description = sug.table_description;
                const byName = {};
                (sug.columns || []).forEach(c => { byName[c.name] = c; });
                (t.catalog?.columns || []).forEach(c => {
                    const s = byName[c.name];
                    if (s) { c.description = s.description || ''; c.pii_category = s.pii_category || 'none'; }
                });
                t._catSuggested = true;
                showToast('Sugestão da IA preenchida — revise e salve');
            } catch(e) {
                showToast('Erro ao sugerir: ' + (e.message || ''), 'error');
            } finally {
                t._catSuggesting = false;
            }
        },

        async loadInspectChunks(replace = true, offset = 0) {
            if (!this.inspectSource) return;
            this.inspectChunksLoading = true;
            try {
                const r = await api.get(
                    '/api/v1/knowledge-sources/' + this.inspectSource.id +
                    '/chunks?limit=' + this.inspectChunkLimit + '&offset=' + offset
                );
                const incoming = (r.chunks || []).map(c => ({...c, _expanded: false}));
                this.inspectChunks = replace ? incoming : [...this.inspectChunks, ...incoming];
            } catch(e) {
                showToast('Erro ao carregar chunks: ' + (e?.message || ''), 'error');
            }
            this.inspectChunksLoading = false;
        },

        async runInspectQuery() {
            const q = (this.inspectQueryText || '').trim();
            if (!q || !this.inspectSource) return;
            this.inspectQueryLoading = true;
            this.inspectQueryError = '';
            this.inspectQueryResults = [];
            try {
                const r = await api.post(
                    '/api/v1/knowledge-sources/' + this.inspectSource.id + '/query',
                    { query: q, top_n: this.inspectQueryTopN }
                );
                this.inspectQueryResults = r.results || [];
            } catch(e) {
                this.inspectQueryError = e?.message || 'erro desconhecido';
            }
            this.inspectQueryLoading = false;
            this.inspectQueryRan = true;
        },

        async clearChunks(s) {
            if (!confirm(`Apagar todo o conteúdo indexado de "${s.name}"? A fonte permanece registrada (você pode re-ingerir depois).`)) return;
            try {
                await api.del('/api/v1/knowledge-sources/' + s.id + '/chunks');
                showToast('Conteúdo apagado');
                await this.loadAllStats();
            } catch(e) {
                showToast('Erro: ' + (e?.message || ''), 'error');
            }
        },

        // ── Tabelas: limpar todas (paralelo do clearChunks) — PR #226 ──
        async clearTables(s) {
            const n = this.statsBy[s.id]?.tables_count || 0;
            if (!n) return;
            if (!confirm(`Apagar TODAS as ${n} tabela(s) estruturada(s) de "${s.name}"? Os arquivos .duckdb são apagados em disco. A fonte permanece registrada.`)) return;
            try {
                const r = await api.del('/api/v1/knowledge-sources/' + s.id + '/tables');
                showToast(`${r.deleted} tabela(s) apagada(s)`);
                await this.loadAllStats();
                // Se a KB inspecionada é a mesma, atualiza a aba Tabelas também
                if (this.inspectSource?.id === s.id) {
                    await this.loadTablesForSource(s.id);
                }
            } catch(e) {
                showToast('Erro: ' + (e?.message || ''), 'error');
            }
        },

        // ── Delete de uma tabela individual no painel direito — PR #226 ──
        async deleteTable(t) {
            if (!confirm(`Excluir tabela "${t.name}"? O arquivo .duckdb é apagado em disco e a metadata é removida do banco. Operação irreversível.`)) return;
            try {
                await api.del('/api/v1/data-tables/' + t.id);
                showToast('Tabela excluída');
                // Atualiza listagem do inspector + stats da KB
                await this.loadTablesForSource(this.inspectSource?.id);
                if (t.knowledge_source_id) {
                    // Re-busca stats só desta KB (mais rápido que loadAllStats)
                    await this.refreshStatsFor(t.knowledge_source_id);
                }
            } catch(e) {
                showToast('Erro: ' + (e?.message || ''), 'error');
            }
        },

        // ── Refresh stats de uma KB (sem recarregar a lista inteira) — PR #226 ──
        refreshingStatsId: null,
        async refreshStatsFor(sid) {
            this.refreshingStatsId = sid;
            try {
                const r = await api.get('/api/v1/knowledge-sources/' + sid + '/stats');
                // Substitui só esta entrada de statsBy para reatividade granular
                this.statsBy = { ...this.statsBy, [sid]: r };
            } catch(e) {
                showToast('Erro ao atualizar stats: ' + (e?.message || ''), 'error');
            } finally {
                this.refreshingStatsId = null;
            }
        },

        // ── Multi-doc: lista documentos da KB (PR #227) ─────────────
        async loadDocumentsForSource(sid) {
            if (!sid) return;
            this.inspectDocsLoading = true;
            try {
                const body = await api.get('/api/v1/knowledge-sources/' + encodeURIComponent(sid) + '/documents');
                this.inspectDocs = body.documents || [];
            } catch(e) {
                this.inspectDocs = [];
                showToast('Erro ao carregar documentos: ' + (e?.message || ''), 'error');
            } finally {
                this.inspectDocsLoading = false;
            }
        },

        async deleteDocument(d) {
            if (!d?.source_doc_id) return;
            const label = d.source_filename || (d.is_legacy ? 'documento legado' : 'documento');
            if (!confirm(`Excluir "${label}"? ${d.chunks_count} chunk(s) serão apagados. Os outros documentos da KB permanecem intactos.`)) return;
            try {
                const r = await api.del('/api/v1/knowledge-sources/' + encodeURIComponent(this.inspectSource.id) + '/documents/' + encodeURIComponent(d.source_doc_id));
                showToast(`${r.chunks_deleted} chunk(s) apagado(s)`);
                await this.loadDocumentsForSource(this.inspectSource.id);
                await this.refreshStatsFor(this.inspectSource.id);
            } catch(e) {
                showToast('Erro: ' + (e?.message || ''), 'error');
            }
        },

        // Ícone por formato — mapping leve, default genérico
        docIcon(fmt) {
            if (!fmt) return '📄';
            const f = String(fmt).toLowerCase();
            if (['pdf'].includes(f)) return '📕';
            if (['docx', 'doc'].includes(f)) return '📘';
            if (['pptx', 'ppt'].includes(f)) return '📊';
            if (['xlsx', 'xls', 'csv'].includes(f)) return '📈';
            if (['md', 'markdown', 'txt'].includes(f)) return '📝';
            if (['url'].includes(f)) return '🔗';
            if (['html', 'htm'].includes(f)) return '🌐';
            if (['json', 'xml', 'yaml', 'yml'].includes(f)) return '📋';
            if (['mp3', 'wav', 'm4a', 'ogg'].includes(f)) return '🎵';
            if (['png', 'jpg', 'jpeg', 'gif'].includes(f)) return '🖼️';
            return '📄';
        },
    }
}
</script>
