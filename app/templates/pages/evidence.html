{% extends "layouts/base.html" %}
{% block content %}
<div x-data="evidencePage()" x-init="load()">
    <div class="flex items-center justify-between mb-6">
        <div>
            <p class="text-[12px] text-surface-400">RAG — bases autorizadas de conhecimento para Retrieval-Augmented Generation</p>
            <p class="text-[11px] text-surface-400 mt-0.5">Estas bases são a <strong>fonte</strong> que alimenta a regra <a href="/settings" class="underline hover:text-brand-700">"Exigir evidências"</a> (Configurações) — junto de anexos e ferramentas.</p>
        </div>
        <button @click="openEditor(null)" class="inline-flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2 text-[13px] font-semibold text-white shadow-sm hover:bg-brand-600 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Nova Base
        </button>
    </div>

    <!-- Cards — linha inteira clicável (abre drawer Inspecionar com 'overview').
         Ações internas (Ingerir/Editar/Deletar) usam @click.stop pra não disparar
         duplo. Bases sem chunks ainda abrem o drawer — usuário aprende ali. -->
    <div class="space-y-3">
        <template x-for="s in sources" :key="s.id">
            <div @click="openInspect(s)"
                 class="group rounded-xl border bg-white p-5 hover:shadow-sm transition-all cursor-pointer"
                 :class="inspectOpen && inspectSource?.id === s.id ? 'border-brand-400 ring-2 ring-brand-100' : 'border-surface-200 hover:border-brand-200'">
                <div class="flex items-start justify-between">
                    <div class="flex items-start gap-3 flex-1 min-w-0">
                        <div class="flex h-10 w-10 items-center justify-center rounded-xl shrink-0"
                             :class="{'bg-emerald-100 text-emerald-600':s.confidentiality_label==='public','bg-brand-100 text-brand-600':s.confidentiality_label==='internal','bg-amber-100 text-amber-600':s.confidentiality_label==='confidential','bg-rose-100 text-rose-600':s.confidentiality_label==='restricted'}">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 flex-wrap mb-1">
                                <h3 class="text-[14px] font-semibold text-brand-900" x-text="s.name"></h3>
                                <span class="rounded-full px-2 py-0.5 text-[10px] font-semibold"
                                      :class="{'bg-emerald-50 text-emerald-700':s.confidentiality_label==='public','bg-brand-50 text-brand-700':s.confidentiality_label==='internal','bg-amber-50 text-amber-700':s.confidentiality_label==='confidential','bg-rose-50 text-rose-700':s.confidentiality_label==='restricted'}"
                                      x-text="s.confidentiality_label"></span>
                                <!-- Onda Tabular: badge do tipo de conteúdo -->
                                <span class="rounded-full px-2 py-0.5 text-[10px] font-semibold inline-flex items-center gap-1"
                                      :class="{'bg-amber-50 text-amber-700':s.kb_mode==='tabular','bg-emerald-50 text-emerald-700':s.kb_mode==='text','bg-brand-50 text-brand-700':(!s.kb_mode || s.kb_mode==='hybrid')}"
                                      :title="s.kb_mode === 'tabular' ? 'Só Tabelas DuckDB (sem vector DB)' : (s.kb_mode === 'text' ? 'Só RAG textual' : 'Misto: RAG + Tabelas')">
                                    <span x-text="s.kb_mode === 'tabular' ? '📊' : (s.kb_mode === 'text' ? '📄' : '🔀')"></span>
                                    <span x-text="s.kb_mode === 'tabular' ? 'tabular' : (s.kb_mode === 'text' ? 'texto' : 'misto')"></span>
                                </span>
                                <span class="rounded-full bg-surface-100 px-2 py-0.5 text-[10px] font-medium text-surface-500" x-text="s.source_type"></span>
                            </div>
                            <p class="text-[12px] text-surface-400 mb-2" x-text="s.description || 'Sem descrição'"></p>
                            <!-- Stats bar (Onda 6 + PR #226: tabelas) -->
                            <!-- kbHasContent considera chunks E tabelas: KB modo tabular
                                 não tem chunks mas pode ter dados estruturados. -->
                            <div class="flex items-center gap-3 text-[11px]">
                                <template x-if="statsBy[s.id]">
                                    <div class="flex items-center gap-3 flex-wrap">
                                        <!-- Chunks (RAG textual) — só mostra se modo aceita texto -->
                                        <span x-show="s.kb_mode !== 'tabular' && statsBy[s.id].chunks_count > 0"
                                              class="text-emerald-600 font-medium">
                                            ● <span x-text="statsBy[s.id].chunks_count + ' chunks'"></span>
                                        </span>
                                        <span class="text-surface-400"
                                              x-show="s.kb_mode !== 'tabular' && statsBy[s.id].chunks_count > 0"
                                              x-text="(statsBy[s.id].tokens_total||0).toLocaleString() + ' tokens'"></span>

                                        <!-- Tabelas (DuckDB) — sempre que houver, qualquer modo -->
                                        <span x-show="(statsBy[s.id].tables_count||0) > 0"
                                              class="text-amber-700 font-medium"
                                              :title="'Tabelas estruturadas DuckDB · ' + (statsBy[s.id].tables_rows_total||0).toLocaleString() + ' linhas total'">
                                            📊 <span x-text="statsBy[s.id].tables_count + ' tabela(s)'"></span>
                                            <span class="text-surface-400 font-normal" x-show="(statsBy[s.id].tables_rows_total||0) > 0"
                                                  x-text="'· ' + (statsBy[s.id].tables_rows_total||0).toLocaleString() + ' linhas'"></span>
                                        </span>

                                        <!-- Timestamp do mais recente entre chunk/tabela -->
                                        <span class="text-surface-400"
                                              x-show="statsBy[s.id].last_chunk_at || statsBy[s.id].last_table_at"
                                              :title="statsBy[s.id].last_table_at || statsBy[s.id].last_chunk_at"
                                              x-text="'ingerido ' + ago(statsBy[s.id].last_table_at || statsBy[s.id].last_chunk_at)"></span>

                                        <!-- Empty state: só se NÃO tem chunks E NÃO tem tabelas -->
                                        <span class="text-amber-600"
                                              x-show="(statsBy[s.id].chunks_count||0) === 0 && (statsBy[s.id].tables_count||0) === 0">
                                            ⚠ sem conteúdo — clique em "Ingerir"
                                        </span>
                                    </div>
                                </template>
                                <template x-if="!statsBy[s.id]">
                                    <span class="text-surface-300">carregando…</span>
                                </template>
                            </div>
                        </div>
                    </div>
                    <!-- Ações: cada botão usa @click.stop pra não disparar
                         openInspect do container. Botão "Inspecionar" foi removido
                         desta linha — agora é o próprio click na linha (UX limpa,
                         menos ruído visual). -->
                    <div class="flex gap-1 ml-4 shrink-0">
                        <button @click.stop="openIngest(s)" title="Ingerir conteúdo (texto/arquivo/URL)"
                                class="inline-flex items-center gap-1 rounded-md bg-brand-50 px-2 py-1 text-[11px] font-semibold text-brand-700 hover:bg-brand-100">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
                            Ingerir
                        </button>
                        <!-- Refresh stats (sempre disponível em hover, mostra info sem ação destrutiva) -->
                        <button @click.stop="refreshStatsFor(s.id)" title="Atualizar estatísticas desta KB"
                                class="p-1.5 rounded-md hover:bg-brand-50 text-surface-400 hover:text-brand-600 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4" :class="refreshingStatsId === s.id ? 'animate-spin' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
                        </button>
                        <!-- Limpar chunks (RAG textual) -->
                        <button x-show="statsBy[s.id]?.chunks_count > 0"
                                @click.stop="clearChunks(s)" title="Limpar conteúdo textual (chunks RAG)"
                                class="p-1.5 rounded-md hover:bg-amber-50 text-surface-400 hover:text-amber-700 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.678 48.678 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3l-3 3"/></svg>
                        </button>
                        <!-- Limpar tabelas (DuckDB) — PR #226 -->
                        <button x-show="(statsBy[s.id]?.tables_count||0) > 0"
                                @click.stop="clearTables(s)" title="Limpar tabelas estruturadas (mantém a fonte registrada)"
                                class="p-1.5 rounded-md hover:bg-amber-50 text-surface-400 hover:text-amber-700 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 7.5h18M3 12h18M3 16.5h18M7.5 3v18M16.5 3v18"/></svg>
                        </button>
                        <button @click.stop="openEditor(s)" title="Editar metadados"
                                class="p-1.5 rounded-md hover:bg-surface-100 text-surface-400 hover:text-brand-600 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
                        </button>
                        <button @click.stop="deleteSource(s.id, s.name)" title="Excluir fonte"
                                class="p-1.5 rounded-md hover:bg-rose-50 text-surface-400 hover:text-rose-600 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Empty state -->
    <template x-if="sources.length === 0">
        <div class="text-center py-16">
            <div class="h-16 w-16 rounded-2xl bg-brand-50 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-brand-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>
            </div>
            <p class="text-[14px] font-medium text-surface-500 mb-1">Nenhuma base registrada</p>
            <p class="text-[12px] text-surface-400 mb-4 max-w-md mx-auto">Registre bases de conhecimento (manuais, regulatórios, FAQs) para habilitar o runtime de evidência nos agentes.</p>
            <button @click="openEditor(null)" class="inline-flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2 text-[13px] font-semibold text-white">Registrar Primeira Base</button>
        </div>
    </template>

    <!-- ══ MODAL: Editor ══ -->
    <template x-if="editorOpen">
        <div class="fixed inset-0 z-[9990] flex items-center justify-center p-4">
            <div class="fixed inset-0 bg-black/40" @click="editorOpen = false"></div>
            <div class="relative z-10 w-full max-w-lg rounded-2xl bg-white shadow-2xl border border-surface-200 fade-in overflow-hidden">
                <div class="flex items-center justify-between border-b border-surface-100 px-6 py-4">
                    <h3 class="text-[15px] font-bold text-brand-900" x-text="editingId ? 'Editar Base de Conhecimento' : 'Nova Base de Conhecimento'"></h3>
                    <button @click="editorOpen = false" class="p-1.5 rounded-lg hover:bg-surface-100 text-surface-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="px-6 py-5 space-y-4">
                    <div>
                        <label class="block text-[11px] font-semibold text-surface-500 mb-1">Nome *</label>
                        <input x-model="form.name" placeholder="Ex: Manual de Cobranças 2024" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] text-brand-900 outline-none focus:border-brand-400">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-surface-500 mb-1">Descrição</label>
                        <textarea x-model="form.description" rows="3" placeholder="Descreva o conteúdo e escopo desta base..."
                                  class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] text-brand-900 outline-none focus:border-brand-400 resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-semibold text-surface-500 mb-1">Tipo</label>
                            <select x-model="form.source_type" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] outline-none">
                                <option value="manual">Manual / Procedimento</option>
                                <option value="regulatorio">Regulatório</option>
                                <option value="contratual">Contratual</option>
                                <option value="faq">FAQ</option>
                                <option value="tecnico">Técnico</option>
                                <option value="politica">Política Interna</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-surface-500 mb-1">Classificação</label>
                            <select x-model="form.confidentiality_label" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] outline-none">
                                <option value="public">Público</option>
                                <option value="internal">Interno</option>
                                <option value="confidential">Confidencial</option>
                                <option value="restricted">Restrito</option>
                            </select>
                        </div>
                    </div>
                    <!-- Onda Tabular: tipo de conteúdo da KB (text/tabular/hybrid) -->
                    <div class="border-t border-surface-100 pt-4">
                        <label class="block text-[11px] font-semibold text-surface-500 mb-1.5">Tipo de conteúdo</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                            <label class="flex flex-col items-start gap-1 p-3 rounded-lg border-2 cursor-pointer transition-colors"
                                   :class="form.kb_mode === 'hybrid' ? 'border-brand-400 bg-brand-50/30' : 'border-surface-200 hover:border-brand-200'">
                                <div class="flex items-center gap-2 w-full">
                                    <input type="radio" x-model="form.kb_mode" value="hybrid" class="rounded">
                                    <span class="text-[12px] font-semibold text-brand-900">🔀 Misto</span>
                                    <span class="ml-auto text-[9px] uppercase tracking-wider text-surface-400">default</span>
                                </div>
                                <p class="text-[10px] text-surface-500 leading-tight">Aceita qualquer formato. Planilhas viram chunks RAG + opção de promover a tabela.</p>
                            </label>
                            <label class="flex flex-col items-start gap-1 p-3 rounded-lg border-2 cursor-pointer transition-colors"
                                   :class="form.kb_mode === 'text' ? 'border-emerald-400 bg-emerald-50/30' : 'border-surface-200 hover:border-emerald-200'">
                                <div class="flex items-center gap-2 w-full">
                                    <input type="radio" x-model="form.kb_mode" value="text" class="rounded">
                                    <span class="text-[12px] font-semibold text-brand-900">📄 Texto</span>
                                </div>
                                <p class="text-[10px] text-surface-500 leading-tight">Só RAG. Manuais, FAQs, contratos, políticas. Planilhas viram chunks markdown.</p>
                            </label>
                            <label class="flex flex-col items-start gap-1 p-3 rounded-lg border-2 cursor-pointer transition-colors"
                                   :class="form.kb_mode === 'tabular' ? 'border-amber-400 bg-amber-50/30' : 'border-surface-200 hover:border-amber-200'">
                                <div class="flex items-center gap-2 w-full">
                                    <input type="radio" x-model="form.kb_mode" value="tabular" class="rounded">
                                    <span class="text-[12px] font-semibold text-brand-900">📊 Tabular</span>
                                </div>
                                <p class="text-[10px] text-surface-500 leading-tight">Só Tabelas DuckDB. Aceita só CSV/XLSX. <strong>Sem vector DB</strong> — re-upload incrementa linhas.</p>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="border-t border-surface-100 px-6 py-4 flex items-center justify-end gap-3">
                    <button @click="editorOpen = false" class="rounded-lg border border-surface-200 px-4 py-2 text-[13px] font-medium text-surface-500 hover:bg-surface-50">Cancelar</button>
                    <button @click="saveSource()" :disabled="saving" class="rounded-lg bg-brand-500 px-5 py-2 text-[13px] font-semibold text-white hover:bg-brand-600 disabled:opacity-50 transition-colors">
                        <span x-text="saving ? 'Salvando...' : (editingId ? 'Atualizar' : 'Registrar')"></span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ══ MODAL: Ingerir conteúdo (Onda 6 Wave 1b) ══ -->
    <template x-if="ingestOpen">
        <div class="fixed inset-0 z-[9990] flex items-center justify-center p-4">
            <div class="fixed inset-0 bg-black/40" @click="!ingestProgress.loading && (ingestOpen = false)"></div>
            <div class="relative z-10 w-full max-w-2xl rounded-2xl bg-white shadow-2xl border border-surface-200 fade-in overflow-hidden">
                <div class="flex items-center justify-between border-b border-surface-100 px-6 py-4">
                    <div class="min-w-0">
                        <h3 class="text-[15px] font-bold text-brand-900">Ingerir conteúdo</h3>
                        <p class="text-[11px] text-surface-400 truncate" x-text="'na base: ' + (ingestSourceName || '—')"></p>
                    </div>
                    <button @click="!ingestProgress.loading && (ingestOpen = false)" :disabled="ingestProgress.loading"
                            class="p-1.5 rounded-lg hover:bg-surface-100 text-surface-400 disabled:opacity-30">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>

                <!-- Tabs -->
                <div class="flex border-b border-surface-100 bg-surface-50/50">
                    <template x-for="tab in [{k:'text', label:'Texto'}, {k:'file', label:'Arquivo'}, {k:'url', label:'URL'}]" :key="tab.k">
                        <button @click="ingestTab = tab.k; ingestProgress.error = null; ingestProgress.result = null"
                                :disabled="ingestProgress.loading"
                                :class="ingestTab === tab.k ? 'border-brand-500 text-brand-700 bg-white' : 'border-transparent text-surface-500 hover:text-brand-600'"
                                class="flex-1 border-b-2 px-4 py-2.5 text-[12px] font-semibold transition-colors disabled:opacity-50"
                                x-text="tab.label"></button>
                    </template>
                </div>

                <div class="px-6 py-5 space-y-4">
                    <!-- Tab: Texto -->
                    <div x-show="ingestTab === 'text'">
                        <label class="block text-[11px] font-semibold text-surface-500 mb-1">Conteúdo (texto / markdown)</label>
                        <textarea x-model="ingestForm.text" rows="10"
                                  placeholder="Cole o texto bruto ou markdown aqui — manuais, FAQs, políticas, contratos transcritos, etc.&#10;&#10;Será segmentado em chunks (~500 tokens cada) e indexado no Postgres BM25 + pgvector (vetorial)."
                                  class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[12px] text-brand-900 outline-none focus:border-brand-400 resize-y font-mono min-h-[12rem]"></textarea>
                        <p class="text-[10px] text-surface-400 mt-1" x-show="ingestForm.text"
                           x-text="ingestForm.text.length.toLocaleString() + ' caracteres · ~' + Math.ceil(ingestForm.text.length / 4).toLocaleString() + ' tokens estimados'"></p>
                    </div>

                    <!-- Tab: Arquivo -->
                    <div x-show="ingestTab === 'file'">
                        <label class="block text-[11px] font-semibold text-surface-500 mb-1">Arquivo</label>
                        <div class="rounded-lg border-2 border-dashed border-surface-200 hover:border-brand-300 p-6 text-center transition-colors cursor-pointer"
                             @click="$refs.fileInput.click()"
                             @dragover.prevent="$event.currentTarget.classList.add('border-brand-400')"
                             @dragleave.prevent="$event.currentTarget.classList.remove('border-brand-400')"
                             @drop.prevent="$event.currentTarget.classList.remove('border-brand-400'); ingestForm.file = $event.dataTransfer.files[0]">
                            <input type="file" x-ref="fileInput" @change="ingestForm.file = $event.target.files[0]" class="hidden">
                            <svg class="mx-auto w-8 h-8 text-surface-300 mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                            <template x-if="!ingestForm.file">
                                <div>
                                    <p class="text-[12px] text-brand-900 font-medium">Clique para selecionar ou arraste aqui</p>
                                    <p class="text-[10px] text-surface-400 mt-1">PDF, DOCX, PPTX, XLSX, HTML, MD, TXT, CSV, JSON, XML, EPUB, .msg, ZIP, áudio, imagens</p>
                                </div>
                            </template>
                            <template x-if="ingestForm.file">
                                <div>
                                    <p class="text-[12px] font-semibold text-brand-900" x-text="ingestForm.file.name"></p>
                                    <p class="text-[10px] text-surface-500 mt-1"
                                       x-text="(ingestForm.file.size/1024).toFixed(1) + ' KB · ' + (ingestForm.file.type || 'tipo desconhecido')"></p>
                                </div>
                            </template>
                        </div>
                        <p class="text-[10px] text-surface-400 mt-2">Conversão via <a href="https://github.com/microsoft/markitdown" target="_blank" class="text-brand-500 hover:text-brand-700">markitdown</a> da Microsoft. Áudio é transcrito automaticamente; imagens passam por OCR.</p>
                    </div>

                    <!-- Tab: URL -->
                    <div x-show="ingestTab === 'url'">
                        <label class="block text-[11px] font-semibold text-surface-500 mb-1">URL pública</label>
                        <input type="url" x-model="ingestForm.url" placeholder="https://exemplo.com/manual.pdf"
                               class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[12px] text-brand-900 outline-none focus:border-brand-400 font-mono">
                        <p class="text-[10px] text-surface-400 mt-2">Aceita páginas web (extrai texto limpo), PDFs hospedados, transcripts de YouTube, feeds RSS. URLs com login não são suportadas — baixe e use a aba "Arquivo".</p>
                    </div>

                    <!-- Chunk overrides (avançado) -->
                    <div class="pt-2 border-t border-surface-100">
                        <button @click="ingestAdvancedOpen = !ingestAdvancedOpen" type="button"
                                class="text-[11px] text-brand-600 hover:text-brand-700 font-medium">
                            <span x-text="ingestAdvancedOpen ? '▼ Esconder ajustes de chunking' : '▶ Ajustes de chunking (avançado)'"></span>
                        </button>
                        <div x-show="ingestAdvancedOpen" x-transition class="grid grid-cols-2 gap-3 mt-2">
                            <div>
                                <label class="block text-[10px] font-semibold text-surface-500 mb-1">Chunk size (tokens)</label>
                                <input type="number" min="50" max="4000" step="50" x-model.number="ingestForm.chunk_size"
                                       :placeholder="'default: ' + (defaultChunkSize || 500)"
                                       class="w-full rounded-lg border border-surface-200 bg-white px-2.5 py-1.5 text-[12px] font-mono outline-none focus:border-brand-400">
                            </div>
                            <div>
                                <label class="block text-[10px] font-semibold text-surface-500 mb-1">Chunk overlap (tokens)</label>
                                <input type="number" min="0" max="500" step="10" x-model.number="ingestForm.chunk_overlap"
                                       :placeholder="'default: ' + (defaultChunkOverlap || 50)"
                                       class="w-full rounded-lg border border-surface-200 bg-white px-2.5 py-1.5 text-[12px] font-mono outline-none focus:border-brand-400">
                            </div>
                            <p class="col-span-2 text-[10px] text-surface-500 leading-relaxed">
                                Vazio = usa default do sistema. <strong>Códigos / FAQs</strong> beneficiam de chunks pequenos (200-300).
                                <strong>Narrativas longas</strong> de chunks grandes (800-1500). Overlap costuma ser 10% do size.
                            </p>
                        </div>
                    </div>

                    <!-- Replace toggle (comum aos 3 tabs) -->
                    <div class="flex items-center gap-2 pt-2 border-t border-surface-100">
                        <input type="checkbox" id="ingestReplace" x-model="ingestForm.replace" class="rounded">
                        <label for="ingestReplace" class="text-[11px] text-surface-600">
                            <span class="font-semibold">Substituir conteúdo existente</span>
                            <span class="text-surface-400">— apaga chunks anteriores antes de ingerir (idempotente)</span>
                        </label>
                    </div>

                    <!-- Estado: loading / error / result -->
                    <template x-if="ingestProgress.loading">
                        <div class="rounded-lg border border-brand-200 bg-brand-50 px-3 py-3 flex items-center gap-2">
                            <svg class="animate-spin w-4 h-4 text-brand-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M22 12c0-5.523-4.477-10-10-10"/></svg>
                            <span class="text-[12px] text-brand-700">Processando — pode demorar para PDFs grandes / áudio / arquivos com muito texto. Não feche esta janela.</span>
                        </div>
                    </template>
                    <template x-if="ingestProgress.error">
                        <div class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-[12px] text-rose-800">
                            <strong>Erro na ingestão:</strong>
                            <span x-text="ingestProgress.error"></span>
                        </div>
                    </template>
                    <template x-if="ingestProgress.result">
                        <div class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-[12px] text-emerald-800">
                            <strong>✓ Ingestão concluída:</strong>
                            <span x-text="ingestProgress.result.chunks_created + ' chunks · ' + (ingestProgress.result.tokens_total||0).toLocaleString() + ' tokens · ' + (ingestProgress.result.duration_ms||0) + 'ms'"></span>
                            <template x-if="ingestProgress.result.partial">
                                <span class="block mt-1 text-amber-800">
                                    ⚠ Índice vetorial divergente — Postgres tem todos os chunks, mas o
                                    <span x-text="(ingestProgress.result.rag_vector_backend || 'vector store') === 'pgvector' ? 'pgvector' : (ingestProgress.result.rag_vector_backend || 'vector store')"></span>
                                    ficou incompleto. Re-execute a ingestão quando o backend estiver OK
                                    (ou rode <code class="px-1 bg-amber-100 rounded">POST /api/v1/evidence/reindex</code>).
                                </span>
                            </template>
                            <!-- Onda Tabular: feedback explícito sobre análise (estado: loading / ok / error / idle) -->
                            <template x-if="ingestForm.file && _isTabularFile(ingestForm.file)">
                                <div class="mt-3 pt-3 border-t border-emerald-200">
                                    <template x-if="tabularAnalysis.loading">
                                        <div class="flex items-center gap-2 text-[11px] text-amber-700">
                                            <svg class="animate-spin w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M22 12c0-5.523-4.477-10-10-10"/></svg>
                                            <span>Analisando planilha em background — modal abrirá automaticamente se for promovível.</span>
                                        </div>
                                    </template>
                                    <template x-if="tabularAnalysis.error">
                                        <div class="flex items-center justify-between gap-2 text-[11px]">
                                            <span class="text-rose-700">⚠ Análise tabular falhou: <span x-text="tabularAnalysis.error"></span></span>
                                            <button @click="_runTabularAnalyze()" type="button"
                                                    class="rounded border border-amber-300 bg-amber-50 hover:bg-amber-100 px-2 py-1 text-[10px] font-semibold text-amber-800">
                                                ↻ Tentar de novo
                                            </button>
                                        </div>
                                    </template>
                                    <template x-if="!tabularAnalysis.loading && !tabularAnalysis.error && tabularAnalysis.result">
                                        <div class="flex items-center justify-between gap-2 text-[11px]">
                                            <span class="text-amber-800">
                                                Análise concluída:
                                                <strong x-text="tabularAnalysis.result.sheet_count || 1"></strong> aba(s),
                                                score primário <strong x-text="(tabularAnalysis.result.score || 0).toFixed(2)"></strong>.
                                                <span x-show="!tabularPromoteOpen" class="text-surface-500">Modal de promote fechado.</span>
                                            </span>
                                            <button @click="tabularPromoteOpen = true" x-show="!tabularPromoteOpen" type="button"
                                                    class="rounded bg-amber-600 hover:bg-amber-700 text-white px-3 py-1 text-[10px] font-semibold">
                                                Abrir modal de promote
                                            </button>
                                        </div>
                                    </template>
                                    <template x-if="!tabularAnalysis.loading && !tabularAnalysis.error && !tabularAnalysis.result">
                                        <div class="flex items-center justify-between gap-2 text-[11px]">
                                            <span class="text-surface-600">Planilha detectada (.csv/.xlsx). Análise tabular não rodou ainda.</span>
                                            <button @click="_runTabularAnalyze()" type="button"
                                                    class="rounded bg-amber-600 hover:bg-amber-700 text-white px-3 py-1 text-[10px] font-semibold">
                                                ▶ Analisar planilha agora
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

                <div class="border-t border-surface-100 px-6 py-4 flex items-center justify-end gap-3">
                    <button @click="ingestOpen = false" :disabled="ingestProgress.loading"
                            class="rounded-lg border border-surface-200 px-4 py-2 text-[13px] font-medium text-surface-500 hover:bg-surface-50 disabled:opacity-50">
                        Fechar
                    </button>
                    <button @click="runIngest()"
                            :disabled="ingestProgress.loading || !ingestCanSubmit"
                            class="rounded-lg bg-brand-500 px-5 py-2 text-[13px] font-semibold text-white hover:bg-brand-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                        <span x-text="ingestProgress.loading ? 'Processando...' : 'Ingerir'"></span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ══════════════════════════════════════════════════════════════
         MODAL: Promover planilha para tabela DuckDB (Onda Tabular)
         Modal PRÓPRIO, separado do modal de ingestão — sobrevive ao
         fechamento daquele. Aberto automaticamente quando _runTabular
         Analyze conclui com sucesso. Suporta XLSX multi-aba: usuário
         escolhe qual aba promover (ou promove todas em sequência).
         ══════════════════════════════════════════════════════════════ -->
    <template x-if="tabularPromoteOpen && tabularAnalysis.result">
        <div class="fixed inset-0 z-[9995]" @keydown.escape.window="closeTabularPromote()">
            <div class="fixed inset-0 bg-black/40" @click="closeTabularPromote()"></div>
            <div class="fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[min(720px,95vw)] max-h-[90vh] bg-white rounded-xl shadow-2xl flex flex-col overflow-hidden">
                <!-- Header -->
                <div class="flex items-start justify-between gap-3 px-6 py-4 border-b border-surface-100 shrink-0">
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 7.5h18M3 12h18M3 16.5h18M7.5 3v18M16.5 3v18"/></svg>
                            <p class="text-[10px] font-semibold uppercase tracking-wider text-amber-600">Planilha estruturada detectada</p>
                        </div>
                        <h3 class="text-[16px] font-bold text-brand-900 truncate">
                            Promover para tabela consultável
                        </h3>
                        <p class="text-[11px] text-surface-500 mt-0.5">
                            na base: <span x-text="ingestSourceName"></span>
                            <span x-show="tabularAnalysis.result.sheet_count > 1" class="ml-2 text-amber-700 font-semibold"
                                  x-text="'· ' + tabularAnalysis.result.sheet_count + ' aba(s) detectada(s)'"></span>
                        </p>
                    </div>
                    <button @click="closeTabularPromote()" class="p-1.5 rounded-lg hover:bg-surface-100 text-surface-400 shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>

                <!-- Body -->
                <div class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
                    <!-- Seletor de aba (só XLSX com >1 aba) -->
                    <template x-if="tabularAnalysis.result.sheet_count > 1">
                        <div>
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1.5">Aba a inspecionar</label>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="s in tabularAnalysis.result.sheets" :key="s.name">
                                    <button @click="selectedSheetName = s.name" type="button"
                                            class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-[11px] font-medium transition-colors"
                                            :class="selectedSheetName === s.name ? 'border-amber-400 bg-amber-50 text-amber-800' : 'border-surface-200 bg-white text-surface-600 hover:border-amber-200'">
                                        <span class="font-mono" x-text="s.name"></span>
                                        <span class="text-[9px] px-1.5 py-0.5 rounded-full font-mono"
                                              :class="s.tabular_ready ? 'bg-emerald-100 text-emerald-700' : 'bg-surface-200 text-surface-500'"
                                              x-text="s.score.toFixed(2)"></span>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Detalhes da aba selecionada -->
                    <template x-if="selectedSheet">
                        <div>
                            <div class="flex items-center justify-between gap-2 mb-2">
                                <div class="text-[12px]">
                                    <strong class="text-brand-900" x-text="selectedSheet.rows + ' linha(s) · ' + selectedSheet.columns + ' coluna(s)'"></strong>
                                    <span x-show="selectedSheet.suggested_pk" class="text-surface-500">
                                        · chave sugerida: <code class="font-mono text-amber-700" x-text="selectedSheet.suggested_pk"></code>
                                    </span>
                                </div>
                                <span class="px-2 py-0.5 rounded-full text-[10px] font-mono"
                                      :class="selectedSheet.tabular_ready ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'"
                                      x-text="'score ' + selectedSheet.score.toFixed(2)"></span>
                            </div>
                            <p x-show="selectedSheet.header_row_auto_detected" class="text-[10px] text-amber-700 mb-2 italic">
                                ↻ Auto-detect: usando linha <span x-text="selectedSheet.header_row"></span> como header (a linha 1 parecia título).
                            </p>
                            <!-- Warnings -->
                            <template x-if="selectedSheet.warnings && selectedSheet.warnings.length">
                                <ul class="text-[10px] text-amber-700 mb-2 list-disc ml-4 space-y-0.5">
                                    <template x-for="w in selectedSheet.warnings" :key="w">
                                        <li x-text="w"></li>
                                    </template>
                                </ul>
                            </template>
                            <!-- Preview do schema -->
                            <div class="rounded border border-surface-200 bg-surface-50/50 p-2 max-h-48 overflow-auto">
                                <table class="text-[10px] w-full">
                                    <thead class="text-surface-500 sticky top-0 bg-surface-50">
                                        <tr><th class="text-left py-1 px-1.5">coluna</th><th class="text-left py-1 px-1.5">tipo</th><th class="text-left py-1 px-1.5">nulos?</th></tr>
                                    </thead>
                                    <tbody class="font-mono">
                                        <template x-for="c in selectedSheet.schema" :key="c.name">
                                            <tr class="border-t border-surface-100">
                                                <td class="py-0.5 px-1.5 text-brand-900" x-text="c.name"></td>
                                                <td class="py-0.5 px-1.5 text-amber-700" x-text="c.type"></td>
                                                <td class="py-0.5 px-1.5 text-surface-500" x-text="c.nullable ? 'sim' : 'não'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>

                    <!-- Progresso da promoção (suporta múltiplas em sequência) -->
                    <template x-if="tabularPromote.loading">
                        <div class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-2.5 flex items-center gap-2">
                            <svg class="animate-spin w-4 h-4 text-amber-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M22 12c0-5.523-4.477-10-10-10"/></svg>
                            <span class="text-[12px] text-amber-800">
                                Criando tabela<span x-show="tabularPromote.currentSheet"> "<span x-text="tabularPromote.currentSheet"></span>"</span>...
                            </span>
                        </div>
                    </template>
                    <template x-if="tabularPromote.results && tabularPromote.results.length">
                        <div class="space-y-1.5">
                            <template x-for="r in tabularPromote.results" :key="r.id">
                                <div class="rounded border border-emerald-300 bg-emerald-50 px-3 py-2 text-[11px] text-emerald-800">
                                    ✓ Tabela <strong x-text="r.name"></strong> criada
                                    (<span x-text="r.row_count"></span> linhas) ·
                                    <code class="font-mono text-[10px]" x-text="r.urn"></code>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="tabularPromote.error">
                        <div class="rounded border border-rose-200 bg-rose-50 px-3 py-2 text-[11px] text-rose-700">
                            <strong>Erro ao promover:</strong> <span x-text="tabularPromote.error"></span>
                        </div>
                    </template>

                    <!-- Onda Tabular: seletor de "adicionar linhas" se existe tabela compatível -->
                    <template x-if="compatibleExistingTables.length > 0">
                        <div class="border-t border-amber-100 pt-3 mt-3">
                            <label class="block text-[11px] font-semibold text-amber-800 mb-1.5">
                                ↗ Adicionar linhas a uma tabela existente (incremento, mantém versão atual)
                            </label>
                            <select x-model="selectedAppendTarget"
                                    class="w-full rounded-lg border border-amber-300 bg-amber-50/30 px-3 py-1.5 text-[12px] font-mono">
                                <option value="">— escolher tabela alvo —</option>
                                <template x-for="t in compatibleExistingTables" :key="t.id">
                                    <option :value="t.id"
                                            x-text="t.name + ' (' + t.row_count + ' linhas atuais)'"></option>
                                </template>
                            </select>
                            <p class="text-[10px] text-surface-500 mt-1">
                                Append mantém o schema; colunas extras no arquivo novo são ignoradas.
                            </p>
                        </div>
                    </template>
                </div>

                <!-- Footer -->
                <div class="border-t border-surface-100 px-6 py-3 flex flex-wrap items-center justify-end gap-2 shrink-0">
                    <button @click="closeTabularPromote()" type="button"
                            class="px-4 py-1.5 rounded-lg border border-surface-200 text-[12px] text-surface-600 hover:bg-surface-50">
                        Dispensar
                    </button>
                    <button x-show="selectedAppendTarget"
                            @click="appendToExistingTable(selectedAppendTarget, selectedSheetName)"
                            :disabled="tabularPromote.loading"
                            type="button"
                            class="px-4 py-1.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-[12px] font-semibold disabled:opacity-50">
                        ↗ Adicionar linhas
                    </button>
                    <button x-show="!selectedAppendTarget && tabularAnalysis.result.sheet_count > 1"
                            @click="promoteAllSheets()"
                            :disabled="tabularPromote.loading"
                            type="button"
                            class="px-4 py-1.5 rounded-lg border border-amber-300 bg-amber-50 hover:bg-amber-100 text-[12px] font-semibold text-amber-800 disabled:opacity-50">
                        Promover todas as <span x-text="tabularAnalysis.result.sheet_count"></span> abas
                    </button>
                    <button x-show="!selectedAppendTarget"
                            @click="promoteToTable(selectedSheetName)"
                            :disabled="tabularPromote.loading || !selectedSheet"
                            type="button"
                            class="px-4 py-1.5 rounded-lg bg-amber-600 hover:bg-amber-700 text-white text-[12px] font-semibold disabled:opacity-50">
                        <span x-show="tabularAnalysis.result.sheet_count > 1">Promover esta aba (nova tabela)</span>
                        <span x-show="tabularAnalysis.result.sheet_count <= 1">Promover para tabela consultável</span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ══ DRAWER: Inspecionar KB (overview + chunks + test query) ══
         Slide-in lateral à direita — padrão da plataforma para conteúdo
         contextual sobre item selecionado da lista. Mesmo formato do drawer
         regulatório do inventário (PR #101). -->
    <template x-if="inspectOpen">
        <div class="fixed inset-0 z-[9990]" @keydown.escape.window="inspectOpen = false">
            <div class="fixed inset-0 bg-black/30" @click="inspectOpen = false"></div>
            <aside class="fixed right-0 top-0 bottom-0 w-full sm:w-[640px] bg-white shadow-2xl border-l border-surface-200 flex flex-col"
                   role="dialog" aria-label="Inspecionar Base de Conhecimento" style="max-height: 100vh">
                <div class="flex items-center justify-between border-b border-surface-100 px-6 py-4 shrink-0 bg-gradient-to-br from-brand-50/40 to-white">
                    <div class="min-w-0 flex-1">
                        <p class="text-[10px] font-semibold uppercase tracking-wider text-red-600">Inspecionar Base</p>
                        <h3 class="text-[15px] font-bold text-brand-900 truncate" x-text="inspectSource?.name || '—'"></h3>
                        <p x-show="inspectSource?.id" class="text-[9px] font-mono text-surface-400 truncate" x-text="inspectSource?.id || ''"></p>
                    </div>
                    <button @click="inspectOpen = false" class="p-1.5 rounded-lg hover:bg-surface-100 text-surface-400 shrink-0" aria-label="Fechar">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>

                <!-- Tabs (PR #227: nova aba Documentos antes de Chunks) -->
                <div class="flex border-b border-surface-100 px-6 shrink-0 overflow-x-auto">
                    <template x-for="t in [{k:'overview',label:'Visão Geral'},{k:'documents',label:'Documentos'},{k:'chunks',label:'Chunks'},{k:'tables',label:'Tabelas'},{k:'query',label:'Test Query'}]" :key="t.k">
                        <button @click="inspectTab = t.k; if (t.k === 'tables') loadTablesForSource(inspectSource?.id); if (t.k === 'documents') loadDocumentsForSource(inspectSource?.id)"
                                :class="inspectTab === t.k ? 'border-brand-500 text-brand-700' : 'border-transparent text-surface-500 hover:text-brand-600'"
                                class="px-4 py-3 border-b-2 text-[12px] font-semibold transition-colors whitespace-nowrap">
                            <span x-text="t.label"></span>
                        </button>
                    </template>
                </div>

                <!-- Content -->
                <div class="flex-1 overflow-y-auto px-6 py-5">

                    <!-- TAB: Visão Geral -->
                    <div x-show="inspectTab === 'overview'" class="space-y-4">
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-2">
                            <div class="rounded-lg border border-surface-200 bg-surface-50 px-3 py-2.5">
                                <div class="text-[9px] uppercase tracking-wider text-surface-400 font-semibold">Chunks</div>
                                <div class="text-[18px] font-bold text-brand-900 font-mono" x-text="(statsBy[inspectSource?.id]?.chunks_count || 0).toLocaleString()"></div>
                            </div>
                            <div class="rounded-lg border border-surface-200 bg-surface-50 px-3 py-2.5">
                                <div class="text-[9px] uppercase tracking-wider text-surface-400 font-semibold">Tokens</div>
                                <div class="text-[18px] font-bold text-brand-900 font-mono" x-text="(statsBy[inspectSource?.id]?.tokens_total || 0).toLocaleString()"></div>
                            </div>
                            <div class="rounded-lg border border-surface-200 bg-surface-50 px-3 py-2.5">
                                <div class="text-[9px] uppercase tracking-wider text-surface-400 font-semibold">Avg tokens/chunk</div>
                                <div class="text-[18px] font-bold text-brand-900 font-mono" x-text="inspectAvgTokens"></div>
                            </div>
                            <div class="rounded-lg border border-surface-200 bg-surface-50 px-3 py-2.5">
                                <div class="text-[9px] uppercase tracking-wider text-surface-400 font-semibold">Última ingestão</div>
                                <div class="text-[12px] font-semibold text-brand-900" x-text="ago(statsBy[inspectSource?.id]?.last_chunk_at)"></div>
                            </div>
                        </div>
                        <div class="rounded-lg border border-surface-200 bg-white px-4 py-3 space-y-2">
                            <div class="text-[12px] font-semibold text-brand-900">Metadados</div>
                            <div class="text-[11px] text-surface-600 grid grid-cols-2 gap-2">
                                <div><span class="text-surface-400">ID:</span> <span class="font-mono text-brand-900" x-text="inspectSource?.id || '—'"></span></div>
                                <div><span class="text-surface-400">Tipo:</span> <span x-text="inspectSource?.source_type || '—'"></span></div>
                                <div><span class="text-surface-400">Classificação:</span> <span x-text="inspectSource?.confidentiality_label || '—'"></span></div>
                                <div><span class="text-surface-400">Coleção vetorial:</span> <span class="font-mono">agente_evidence</span> <span class="text-surface-400">(pgvector)</span></div>
                            </div>
                            <div x-show="inspectSource?.description" class="text-[11px] text-surface-500 pt-2 border-t border-surface-100" x-text="inspectSource?.description"></div>
                        </div>
                        <div class="rounded-lg border border-red-100 bg-red-50/40 px-4 py-3 text-[11px] text-red-700 leading-relaxed">
                            <strong>Como funciona o RAG aqui:</strong> texto vai pra <code class="bg-white px-1 rounded">evidence_chunks</code> (Postgres + tsvector pra BM25)
                            e <code class="bg-white px-1 rounded">agente_evidence</code> (pgvector pra similaridade vetorial). Busca híbrida com RRF
                            funde os dois rankings. Use a aba <strong>Test Query</strong> pra ver o que cada query traria de volta antes de cabear num agente.
                        </div>
                    </div>

                    <!-- TAB: Chunks -->
                    <div x-show="inspectTab === 'chunks'" class="space-y-3">
                        <div class="flex items-center justify-between gap-2">
                            <input type="text" x-model="inspectChunkFilter" placeholder="Filtrar por texto..."
                                   class="flex-1 rounded-lg border border-surface-200 bg-white px-3 py-1.5 text-[12px] outline-none focus:border-brand-400">
                            <span class="text-[10px] text-surface-400">
                                <span x-text="filteredChunks.length"></span> de <span x-text="inspectChunks.length"></span>
                            </span>
                            <button @click="loadInspectChunks(true)" class="rounded-lg border border-surface-200 px-3 py-1.5 text-[11px] text-surface-600 hover:bg-surface-50">
                                ↻ Recarregar
                            </button>
                        </div>
                        <div x-show="inspectChunksLoading" class="text-center py-8 text-[12px] text-surface-400">Carregando chunks...</div>
                        <div x-show="!inspectChunksLoading && filteredChunks.length === 0" class="text-center py-8 text-[12px] text-surface-400">
                            <span x-show="inspectChunks.length === 0">Nenhum chunk indexado ainda — ingira conteúdo primeiro.</span>
                            <span x-show="inspectChunks.length > 0">Nenhum chunk casa com o filtro.</span>
                        </div>
                        <div class="space-y-2">
                            <template x-for="c in filteredChunks" :key="c.id">
                                <div class="rounded-lg border border-surface-200 bg-white hover:shadow-sm transition-shadow">
                                    <div class="flex items-center justify-between px-3 py-2 border-b border-surface-100 bg-surface-50/50">
                                        <div class="flex items-center gap-2 text-[10px] font-mono text-surface-500">
                                            <span class="rounded bg-brand-100 text-brand-700 px-1.5 py-0.5 font-semibold">#<span x-text="c.ordinal"></span></span>
                                            <span x-text="c.token_count + ' tokens'"></span>
                                            <span x-text="c.char_count + ' chars'"></span>
                                            <span class="text-surface-300" x-text="ago(c.created_at)"></span>
                                        </div>
                                        <button @click="c._expanded = !c._expanded" class="text-[10px] text-brand-600 hover:text-brand-700">
                                            <span x-text="c._expanded ? 'Colapsar' : 'Expandir'"></span>
                                        </button>
                                    </div>
                                    <div class="px-3 py-2 text-[11px] text-surface-700 leading-relaxed font-mono"
                                         :class="c._expanded ? '' : 'truncate-3-lines'"
                                         x-text="c.text"></div>
                                </div>
                            </template>
                        </div>
                        <div x-show="inspectChunks.length >= inspectChunkLimit" class="text-center pt-2">
                            <button @click="loadInspectChunks(false, inspectChunks.length)"
                                    class="rounded-lg border border-surface-200 px-4 py-1.5 text-[11px] font-medium text-surface-600 hover:bg-surface-50">
                                Carregar mais
                            </button>
                        </div>
                    </div>

                    <!-- TAB: Documentos (PR #227 — multi-doc por KB) -->
                    <div x-show="inspectTab === 'documents'" class="space-y-3">
                        <div class="flex items-center justify-between">
                            <p class="text-[11px] text-surface-500">
                                Documentos ingeridos nesta KB (RAG textual). Cada documento agrupa seus chunks via <code class="bg-surface-100 px-1 rounded">metadata.source_doc_id</code>. Apagar um documento preserva os outros.
                            </p>
                            <button @click="loadDocumentsForSource(inspectSource?.id)"
                                    class="rounded-lg border border-surface-200 px-3 py-1.5 text-[11px] text-surface-600 hover:bg-surface-50">
                                ↻ Recarregar
                            </button>
                        </div>
                        <div x-show="inspectDocsLoading" class="text-center py-8 text-[12px] text-surface-400">Carregando documentos...</div>
                        <div x-show="!inspectDocsLoading && inspectDocs.length === 0" class="text-center py-8 text-[12px] text-surface-400">
                            Nenhum documento ingerido ainda. Use o botão "Ingerir" no card da KB.
                        </div>
                        <div class="space-y-2">
                            <template x-for="d in inspectDocs" :key="d.source_doc_id">
                                <div class="rounded-lg border border-surface-200 bg-white">
                                    <div class="flex items-center justify-between px-3 py-2.5">
                                        <div class="min-w-0 flex-1">
                                            <div class="flex items-center gap-2">
                                                <!-- Ícone por formato -->
                                                <span class="text-[16px]" x-text="docIcon(d.source_format)"></span>
                                                <span class="text-[12px] font-semibold text-brand-900 truncate" x-text="d.source_filename || (d.is_legacy ? 'Documento legado (sem metadata)' : 'documento sem nome')"></span>
                                                <span x-show="d.is_legacy" class="rounded-full bg-amber-50 text-amber-700 px-1.5 py-0.5 text-[9px] font-semibold">legado</span>
                                                <span x-show="d.source_format" class="rounded-full bg-surface-100 text-surface-500 px-1.5 py-0.5 text-[9px] font-mono" x-text="d.source_format"></span>
                                            </div>
                                            <div class="text-[10px] text-surface-400 mt-0.5 flex items-center gap-3">
                                                <span><strong class="text-brand-700 font-mono" x-text="(d.chunks_count||0).toLocaleString()"></strong> chunks</span>
                                                <span x-show="(d.tokens_total||0) > 0"><strong class="text-brand-700 font-mono" x-text="(d.tokens_total||0).toLocaleString()"></strong> tokens</span>
                                                <span x-show="d.ingested_at" :title="d.ingested_at" x-text="'ingerido ' + ago(d.ingested_at)"></span>
                                                <span x-show="d.source_uri" class="font-mono truncate max-w-[200px]" :title="d.source_uri" x-text="d.source_uri"></span>
                                            </div>
                                        </div>
                                        <button @click="deleteDocument(d)" :title="'Excluir ' + (d.source_filename || 'este documento')"
                                                class="shrink-0 p-1.5 rounded-md hover:bg-rose-50 text-surface-400 hover:text-rose-600 transition-colors">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- TAB: Tabelas (Onda Tabular) -->
                    <div x-show="inspectTab === 'tables'" class="space-y-3">
                        <div class="flex items-center justify-between">
                            <p class="text-[11px] text-surface-500">
                                Tabelas DuckDB promovidas desta KB. Skills consomem via "Inserir Tabela" no editor SKILL.md.
                            </p>
                            <button @click="loadTablesForSource(inspectSource?.id)" class="rounded-lg border border-surface-200 px-3 py-1.5 text-[11px] text-surface-600 hover:bg-surface-50">
                                ↻ Recarregar
                            </button>
                        </div>
                        <div x-show="inspectTablesLoading" class="text-center py-8 text-[12px] text-surface-400">Carregando tabelas...</div>
                        <div x-show="!inspectTablesLoading && inspectTables.length === 0" class="text-center py-8 text-[12px] text-surface-400">
                            Nenhuma tabela promovida ainda. Faça upload de um CSV/XLSX e use "Promover para tabela consultável".
                        </div>
                        <div class="space-y-2">
                            <template x-for="t in inspectTables" :key="t.id">
                                <div class="rounded-lg border border-surface-200 bg-white">
                                    <div class="flex items-center justify-between px-3 py-2 border-b border-surface-100 bg-amber-50/40 cursor-pointer"
                                         @click="t._expanded = !t._expanded">
                                        <div class="min-w-0 flex-1">
                                            <div class="flex items-center gap-2">
                                                <svg class="w-3.5 h-3.5 text-amber-600 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 7.5h18M3 12h18M3 16.5h18M7.5 3v18M16.5 3v18"/></svg>
                                                <span class="text-[12px] font-semibold text-brand-900 truncate" x-text="t.name"></span>
                                                <span class="rounded-full text-[9px] px-1.5 py-0.5 font-mono"
                                                      :class="t.status === 'ready' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'"
                                                      x-text="t.status"></span>
                                            </div>
                                            <div class="text-[10px] font-mono text-surface-400 truncate mt-0.5" x-text="t.urn"></div>
                                        </div>
                                        <div class="flex items-center gap-3 shrink-0">
                                            <div class="text-right text-[10px] text-surface-500">
                                                <div><strong class="text-brand-900 font-mono" x-text="(t.row_count||0).toLocaleString()"></strong> linhas</div>
                                                <div><strong class="text-brand-900 font-mono" x-text="t.column_count"></strong> colunas</div>
                                            </div>
                                            <span class="rounded-full text-[10px] px-2 py-0.5 font-mono"
                                                  :class="(t.quality_score||0) >= 0.7 ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'"
                                                  x-text="'score ' + (t.quality_score||0).toFixed(2)"></span>
                                            <!-- Botão delete por linha — PR #226 -->
                                            <button @click.stop="deleteTable(t)" :title="'Excluir tabela ' + t.name"
                                                    class="p-1 rounded-md hover:bg-rose-50 text-surface-400 hover:text-rose-600 transition-colors">
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79"/></svg>
                                            </button>
                                            <svg class="w-3.5 h-3.5 text-surface-400 transition-transform" :class="t._expanded ? 'rotate-180' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                                        </div>
                                    </div>
                                    <div x-show="t._expanded" x-transition class="px-3 py-3 space-y-2">
                                        <div class="text-[11px] text-surface-600 grid grid-cols-2 gap-2">
                                            <div><span class="text-surface-400">Versão:</span> <span class="font-mono" x-text="t.version"></span></div>
                                            <div><span class="text-surface-400">PK sugerida:</span> <span class="font-mono" x-text="t.suggested_pk || '—'"></span></div>
                                            <div><span class="text-surface-400">Tamanho:</span> <span class="font-mono" x-text="((t.size_bytes||0)/1024).toFixed(1) + ' KB'"></span></div>
                                            <div><span class="text-surface-400">Criada:</span> <span x-text="ago(t.created_at)"></span></div>
                                        </div>
                                        <!-- Catálogo de Dados: descrição da TABELA (curável; IA sugere no PR3) -->
                                        <div>
                                            <div class="flex items-center justify-between mb-1">
                                                <span class="text-[10px] font-bold text-surface-500 uppercase tracking-wider">Descrição da tabela</span>
                                                <span class="text-[9px] px-1.5 py-0.5 rounded"
                                                      :class="t.catalog?.table?.source === 'human' ? 'bg-emerald-100 text-emerald-700' : (t.catalog?.table?.source === 'ai' ? 'bg-amber-100 text-amber-700' : 'bg-surface-100 text-surface-400')"
                                                      x-text="t.catalog?.table?.source === 'human' ? 'curada' : (t.catalog?.table?.source === 'ai' ? 'sugerida (IA)' : 'não catalogada')"></span>
                                            </div>
                                            <textarea x-model="t.description" rows="2" placeholder="Descreva o que esta tabela contém…"
                                                      class="w-full text-[11px] rounded border border-surface-200 px-2 py-1 focus:border-brand-300 focus:outline-none"></textarea>
                                        </div>

                                        <!-- Schema + catálogo por COLUNA (descrição + PII curáveis) -->
                                        <div class="rounded border border-surface-200 bg-surface-50/30 p-2 max-h-64 overflow-auto">
                                            <table class="text-[10px] w-full">
                                                <thead class="text-surface-500 sticky top-0 bg-surface-50">
                                                    <tr>
                                                        <th class="text-left py-1 px-1">coluna</th>
                                                        <th class="text-left py-1 px-1">tipo</th>
                                                        <th class="text-left py-1 px-1">descrição</th>
                                                        <th class="text-left py-1 px-1">PII</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="font-mono">
                                                    <template x-for="c in (t.catalog?.columns || [])" :key="c.name">
                                                        <tr class="border-t border-surface-100">
                                                            <td class="py-0.5 px-1 text-brand-900" x-text="c.name"></td>
                                                            <td class="py-0.5 px-1 text-amber-700" x-text="c.type"></td>
                                                            <td class="py-0.5 px-1">
                                                                <input type="text" x-model="c.description" placeholder="—"
                                                                       class="w-full text-[10px] font-sans rounded border border-transparent hover:border-surface-200 focus:border-brand-300 focus:outline-none px-1 py-0.5">
                                                            </td>
                                                            <td class="py-0.5 px-1">
                                                                <select x-model="c.pii_category"
                                                                        class="text-[10px] font-sans rounded border border-surface-200 px-1 py-0.5 focus:border-brand-300 focus:outline-none"
                                                                        :class="(c.pii_category && c.pii_category !== 'none') ? 'bg-rose-50 text-rose-700' : ''">
                                                                    <template x-for="opt in piiCategories" :key="opt">
                                                                        <option :value="opt" x-text="opt"></option>
                                                                    </template>
                                                                </select>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>

                                        <div class="flex items-center justify-end gap-2">
                                            <span x-show="t._catSuggested" class="mr-auto text-[10px] text-amber-600">Sugestão da IA preenchida — revise e <strong>salve</strong> para aplicar.</span>
                                            <button @click="generateCatalogAI(t)" :disabled="t._catSuggesting || t._catSaving"
                                                    class="inline-flex items-center gap-1.5 rounded-lg border border-brand-300 bg-white px-3 py-1.5 text-[11px] font-semibold text-brand-600 hover:bg-brand-50 disabled:opacity-40">
                                                <span>✨</span>
                                                <span x-text="t._catSuggesting ? 'Sugerindo…' : 'Sugerir com IA'"></span>
                                            </button>
                                            <button @click="saveCatalog(t)" :disabled="t._catSaving || t._catSuggesting"
                                                    class="inline-flex items-center gap-1.5 rounded-lg bg-brand-500 px-3 py-1.5 text-[11px] font-semibold text-white hover:bg-brand-600 disabled:opacity-40">
                                                <span x-text="t._catSaving ? 'Salvando…' : 'Salvar catálogo'"></span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- TAB: Test Query -->
                    <div x-show="inspectTab === 'query'" class="space-y-3">
                        <div class="flex gap-2">
                            <input type="text" x-model="inspectQueryText" placeholder="Pergunta de teste — ex: 'qual é a política de cobrança?'"
                                   @keydown.enter="runInspectQuery()"
                                   class="flex-1 rounded-lg border border-surface-200 bg-white px-3 py-2 text-[12px] outline-none focus:border-brand-400">
                            <select x-model.number="inspectQueryTopN" class="rounded-lg border border-surface-200 bg-white px-2 py-2 text-[12px]">
                                <option value="3">top 3</option>
                                <option value="5">top 5</option>
                                <option value="10">top 10</option>
                                <option value="20">top 20</option>
                            </select>
                            <button @click="runInspectQuery()" :disabled="inspectQueryLoading || !inspectQueryText.trim()"
