{% extends "layouts/base.html" %}

{% block content %}
<div x-data="workspacePage()" x-init="load()" class="flex h-[calc(100vh-3.5rem)] -m-4 lg:-m-6">

    <!-- Session sidebar -->
    <div class="hidden lg:flex w-56 flex-col border-r border-surface-200 bg-white shrink-0">
        <div class="flex items-center justify-between border-b border-surface-100 px-4 py-3">
            <span class="text-[12px] font-semibold text-brand-900">Sessões</span>
            <button @click="newSession()" class="rounded-md bg-brand-50 p-1.5 text-brand-600 hover:bg-brand-100 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto scrollbar-thin">
            <template x-for="s in sessions" :key="s.id">
                <div class="group relative border-b border-surface-50" :class="currentSessionId === s.id ? 'bg-brand-50 border-l-2 border-l-brand-500' : 'hover:bg-surface-50'">
                    <div x-show="renamingId !== s.id" @click="loadSession(s.id)" class="w-full text-left px-4 py-3 cursor-pointer">
                        <div class="text-[12px] font-medium text-brand-900 truncate pr-12" x-text="s.title || 'Nova sessão'"></div>
                        <div class="text-[10px] text-surface-400 mt-0.5" x-text="s.created_at?.replace('T',' ').substring(0,16)"></div>
                    </div>
                    <div x-show="renamingId !== s.id" class="absolute right-2 top-2.5 flex gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button @click.stop="startRename(s)" class="p-1 rounded hover:bg-brand-100 text-surface-400 hover:text-brand-600"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg></button>
                        <button @click.stop="deleteSession(s.id, s.title)" class="p-1 rounded hover:bg-rose-100 text-surface-400 hover:text-rose-600"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79"/></svg></button>
                    </div>
                    <div x-show="renamingId === s.id" class="px-3 py-2" @click.stop>
                        <input x-model="renameValue" @keydown.enter="confirmRename(s.id)" @keydown.escape="renamingId=null" class="w-full rounded border border-brand-300 bg-white px-2 py-1 text-[12px] text-brand-900 outline-none">
                        <div class="flex gap-1 mt-1"><button @click="confirmRename(s.id)" class="rounded bg-brand-500 px-2 py-0.5 text-[10px] font-semibold text-white">Salvar</button><button @click="renamingId=null" class="rounded bg-surface-100 px-2 py-0.5 text-[10px] text-surface-500">Cancelar</button></div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Chat + Log area -->
    <div class="flex flex-1 flex-col min-w-0">
        <!-- Header -->
        <div class="flex items-center gap-3 border-b border-surface-100 bg-white px-4 py-2.5">
            <div class="flex rounded-lg border border-surface-200 overflow-hidden shrink-0">
                <button @click="execMode='agent';newSession()" class="px-3 py-1.5 text-[11px] font-medium transition-colors" :class="execMode==='agent'?'bg-brand-500 text-white':'bg-white text-surface-500 hover:bg-surface-50'">Agente</button>
                <button @click="execMode='pipeline';newSession()" class="px-3 py-1.5 text-[11px] font-medium transition-colors" :class="execMode==='pipeline'?'bg-violet-500 text-white':'bg-white text-surface-500 hover:bg-surface-50'">Pipeline</button>
            </div>
            <select x-show="execMode==='agent'" x-model="selectedAgentId" @change="newSession()" class="rounded-lg border border-surface-200 bg-surface-50 px-3 py-1.5 text-[12px] text-brand-900 outline-none min-w-[200px]">
                <option value="">Selecione um agente</option>
                <option x-show="selectedAgentId && !agents.some(a=>a.id===selectedAgentId)" :value="selectedAgentId" x-text="selectedAgentFallbackLabel"></option>
                <template x-for="a in agents" :key="a.id"><option :value="a.id" x-text="a.name+' (v'+(a.version||'1.0.0')+' · '+a.model+')'"></option></template>
            </select>
            <select x-show="execMode==='pipeline'" x-model="selectedAgentId" @change="newSession()" class="rounded-lg border border-violet-200 bg-violet-50 px-3 py-1.5 text-[12px] text-brand-900 outline-none min-w-[200px]">
                <option value="">Selecione pipeline</option>
                <option x-show="selectedAgentId && !pipelineRoots.some(p=>p.id===selectedAgentId)" :value="selectedAgentId" x-text="selectedPipelineFallbackLabel"></option>
                <template x-for="p in pipelineRoots" :key="p.id"><option :value="p.id" x-text="p.name+' → '+p.chainLen+' agente(s)'"></option></template>
            </select>
            <template x-if="selectedAgentId"><span class="flex items-center gap-1 text-[10px] font-medium" :class="execMode==='pipeline'?'text-violet-600':'text-emerald-600'"><span class="h-1.5 w-1.5 rounded-full pulse-dot" :class="execMode==='pipeline'?'bg-violet-400':'bg-emerald-400'"></span><span x-text="execMode==='pipeline'?'Pipeline':'Conectado'"></span></span></template>
            <div class="flex-1"></div>
            <button @click="showTrace=!showTrace" class="hidden xl:flex items-center gap-1.5 rounded-lg px-3 py-1.5 text-[11px] font-medium transition-colors" :class="showTrace?'bg-brand-500 text-white':'bg-surface-100 text-surface-500 hover:bg-surface-200'">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3"/></svg>
                Rastreabilidade
            </button>
        </div>

        <!-- Messages -->
        <div x-ref="chatContainer" class="flex-1 overflow-y-auto scrollbar-thin px-4 py-6 space-y-4 bg-surface-50">
            <template x-if="messages.length===0 && !sending">
                <div class="flex flex-col items-center justify-center h-full text-center">
                    <div class="h-16 w-16 rounded-2xl bg-brand-50 flex items-center justify-center mb-4"><svg class="w-8 h-8 text-brand-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/></svg></div>
                    <p class="text-[14px] font-medium text-brand-900 mb-1">AgenteInteligência-AI</p>
                    <p class="text-[12px] text-surface-400 max-w-sm">Selecione um agente e inicie uma conversa.</p>
                </div>
            </template>
            <template x-for="(msg,i) in messages" :key="i">
                <div class="flex gap-3" :class="msg.role==='user'?'justify-end':'justify-start'">
                    <template x-if="msg.role==='assistant'">
                        <div @click="if(msg._trace){lastTrace=msg._trace;activeTraceIdx=i;}" class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full text-[10px] font-bold text-white mt-1 transition-all" :class="msg._trace?(activeTraceIdx===i?'bg-violet-500 ring-2 ring-violet-200 scale-110 cursor-pointer':'bg-brand-500 hover:bg-violet-500 cursor-pointer'):'bg-brand-500'"><span x-text="msg._agentName?msg._agentName.substring(0,2).toUpperCase():'AI'"></span></div>
                    </template>
                    <div class="max-w-[75%] rounded-2xl px-4 py-3 text-[13px] leading-relaxed" :class="msg.role==='user'?'bg-brand-500 text-white rounded-br-md':(activeTraceIdx===i?'bg-white border-2 border-violet-300 text-brand-900 rounded-bl-md shadow-md':'bg-white border border-surface-200 text-brand-900 rounded-bl-md shadow-sm')">
                        <template x-if="msg._agentName && msg.role==='assistant'">
                            <div class="flex items-center gap-2 mb-2 pb-1.5 border-b border-surface-100">
                                <span class="rounded-full px-2 py-0.5 text-[9px] font-bold" :class="msg._agentKind==='aobd'?'bg-violet-50 text-violet-600':msg._agentKind==='router'?'bg-brand-50 text-brand-600':'bg-teal-50 text-teal-600'" x-text="msg._agentKind"></span>
                                <span class="text-[11px] font-semibold text-brand-900" x-text="msg._agentName"></span>
                                <span x-show="msg._duration" class="text-[9px] text-surface-400" x-text="msg._duration?.toFixed(0)+'ms'"></span>
                            </div>
                        </template>
                        <!-- ══ CONTENT: raw vs formatted toggle ══ -->
                        <div x-show="msg.role==='assistant' && msg._systemNote" x-html="msg.content"></div>
                        <div x-show="msg.role==='assistant' && !msg._systemNote && !richViewMsgs[i]" x-html="msg.role==='assistant'?formatMarkdown(msg.content):msg.content"></div>
                        <div x-show="msg.role==='assistant' && !msg._systemNote && richViewMsgs[i]" class="rounded-xl border border-violet-200/80 bg-gradient-to-b from-violet-50/70 to-white p-3 shadow-sm" x-html="renderRichContent(msg.content)"></div>
                        <div x-show="msg.role==='user'" x-text="msg.content"></div>
                        <!-- ══ FOOTER ══ -->
                        <div x-show="msg.role==='assistant' && !msg._systemNote" class="flex items-center gap-1 mt-2 pt-1.5 border-t border-surface-100">
                            <span class="text-[10px] opacity-60 flex-1" x-text="msg.created_at?.replace('T',' ').substring(11,16)||''"></span>
                            <!-- Format toggle button -->
                            <button x-show="isStructuredContent(msg.content)" @click="richViewMsgs[i]=!richViewMsgs[i]"
                                    class="p-1 rounded transition-colors" :class="richViewMsgs[i]?'bg-violet-100 text-violet-600 hover:bg-violet-200':'hover:bg-surface-100 text-surface-300 hover:text-violet-600'" :title="richViewMsgs[i]?'Ver original':'Visualizar formatado'">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5"/></svg>
                            </button>
                            <!-- Copy button -->
                            <button @click="copyMsg(extractText(msg.content))" class="p-1 rounded hover:bg-surface-100 text-surface-300 hover:text-brand-600" title="Copiar"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg></button>
                        </div>
                        <div x-show="msg.role==='user'" class="mt-1.5 text-[10px] opacity-60" x-text="msg.created_at?.replace('T',' ').substring(11,16)||''"></div>
                    </div>
                    <template x-if="msg.role==='user'"><div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-surface-200 text-[10px] font-bold text-surface-500 mt-1">EU</div></template>
                </div>
            </template>
            <template x-if="sending"><div class="flex gap-3 justify-start"><div class="flex h-7 w-7 items-center justify-center rounded-full bg-brand-500 text-[10px] font-bold text-white">AI</div><div class="rounded-2xl rounded-bl-md bg-white border border-surface-200 px-4 py-3 shadow-sm"><div class="flex gap-1.5"><span class="h-2 w-2 rounded-full bg-brand-300 pulse-dot" style="animation-delay:0s"></span><span class="h-2 w-2 rounded-full bg-brand-300 pulse-dot" style="animation-delay:.2s"></span><span class="h-2 w-2 rounded-full bg-brand-300 pulse-dot" style="animation-delay:.4s"></span></div></div></div></template>
        </div>

        <!-- ══════════ LIVE EXECUTION LOG ══════════ -->
        <div x-show="liveLog.length > 0" x-transition class="border-t border-surface-200 bg-white overflow-hidden" style="max-height:300px">
            <div class="flex items-center justify-between px-4 py-1.5 border-b border-surface-100">
                <div class="flex items-center gap-2">
                    <span class="text-[9px] font-bold text-brand-900 uppercase tracking-widest">Execution Log</span>
                    <span x-show="sending" class="h-1.5 w-1.5 rounded-full bg-emerald-400 pulse-dot"></span>
                    <span class="text-[9px] text-surface-400" x-text="liveLog.length+' entrada(s)'"></span>
                </div>
                <div class="flex gap-1">
                    <button @click="exportLogXlsx()" x-show="liveLog.length>0 && !sending" class="flex items-center gap-1 px-1.5 py-0.5 rounded text-[8px] font-semibold text-emerald-600 bg-emerald-50 hover:bg-emerald-100 transition-colors" title="Exportar XLSX">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                        XLSX
                    </button>
                    <button @click="logMinimized=!logMinimized" class="p-0.5 rounded text-surface-400 hover:text-brand-600"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path x-show="!logMinimized" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/><path x-show="logMinimized" d="M4.5 15.75l7.5-7.5 7.5 7.5"/></svg></button>
                    <button @click="liveLog=[]" class="p-0.5 rounded text-surface-400 hover:text-rose-500"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                </div>
            </div>
            <div x-show="!logMinimized" x-ref="liveLogContainer" class="px-2 pb-2 overflow-y-auto scrollbar-thin text-[10px] leading-relaxed" style="max-height:260px">
                <template x-for="(e,i) in liveLog" :key="i">
                    <div class="flex gap-1.5 py-[3px] border-b border-surface-50 items-start"
                         :class="e.cat==='separator'?'bg-surface-100 py-1':''">
                        <span class="text-surface-300 shrink-0 w-[38px] text-right font-mono text-[9px] mt-px" x-text="e.time"></span>
                        <span class="shrink-0 w-4 text-center mt-px" x-text="e.icon"></span>
                        <span class="shrink-0 rounded px-1.5 py-0.5 text-[7px] font-bold uppercase tracking-wider mt-px"
                              :class="{'bg-violet-100 text-violet-600':e.cat==='agent','bg-blue-100 text-blue-600':e.cat==='prompt','bg-teal-100 text-teal-600':e.cat==='skill','bg-amber-100 text-amber-600':e.cat==='tools','bg-cyan-100 text-cyan-600':e.cat==='fsm','bg-emerald-100 text-emerald-600':e.cat==='evidence','bg-rose-100 text-rose-600':e.cat==='result','bg-indigo-100 text-indigo-600':e.cat==='pipeline','bg-purple-100 text-purple-600':e.cat==='llm','bg-sky-100 text-sky-600':e.cat==='dialog','bg-slate-100 text-slate-600':e.cat==='system','bg-orange-100 text-orange-600':e.cat==='error','bg-surface-200 text-surface-500':e.cat==='separator','bg-gray-100 text-gray-500':!['agent','prompt','skill','tools','fsm','evidence','result','pipeline','llm','dialog','system','error','separator'].includes(e.cat)}"
                              x-text="e.cat"></span>
                        <div class="flex-1 min-w-0">
                            <span class="font-semibold" :class="{'text-gray-900':e.level==='info','text-emerald-700':e.level==='success','text-amber-700':e.level==='warning','text-rose-700':e.level==='danger'}" x-text="e.title"></span>
                            <span x-show="e.detail" class="text-gray-400 ml-1 text-[9px]" x-text="e.detail?.substring(0,250)"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Input area -->
        <div class="border-t border-surface-200 bg-white px-4 py-3">
            <div x-show="pendingFiles.length>0" class="flex flex-wrap gap-2 mb-2 max-w-3xl mx-auto">
                <template x-for="(f,i) in pendingFiles" :key="i">
                    <span class="inline-flex items-center gap-1.5 rounded-lg border border-brand-200 bg-brand-50 px-2.5 py-1.5 text-[11px] font-medium text-brand-700">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32"/></svg>
                        <span x-text="f.filename"></span>
                        <button @click="pendingFiles.splice(i,1)" class="ml-0.5 text-brand-400 hover:text-rose-600"><svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                    </span>
                </template>
            </div>
            <div class="flex items-end gap-2 max-w-3xl mx-auto relative">
                <!-- ══ SLASH COMMAND POPOVER ══ -->
                <div x-show="slashOpen" x-transition.duration.150ms @click.away="slashOpen=false"
                     class="absolute bottom-full left-12 right-12 mb-2 rounded-xl border border-violet-200 bg-white shadow-lg z-40 overflow-hidden">
                    <div class="px-3 py-1.5 border-b border-violet-100 bg-violet-50 text-[9px] font-bold text-violet-700 uppercase tracking-wider flex items-center justify-between">
                        <span>Comandos</span>
                        <span class="text-[9px] text-violet-400 normal-case">↑↓ navegar · Enter selecionar · Esc fechar</span>
                    </div>
                    <template x-for="(cmd, idx) in filteredSlashCmds" :key="cmd.name">
                        <button type="button" @click="runSlashCommand(cmd.name)"
                                class="w-full text-left px-3 py-2 hover:bg-violet-50 transition-colors flex items-start gap-3 border-b border-surface-50 last:border-0"
                                :class="idx === slashHighlight ? 'bg-violet-50' : ''">
                            <code class="rounded bg-violet-100 px-1.5 py-0.5 text-[11px] font-mono font-bold text-violet-700 shrink-0 mt-0.5" x-text="'/' + cmd.name"></code>
                            <div class="min-w-0 flex-1">
                                <div class="text-[12px] font-semibold text-brand-900" x-text="cmd.title"></div>
                                <div class="text-[10px] text-surface-500" x-text="cmd.desc"></div>
                            </div>
                        </button>
                    </template>
                    <div x-show="filteredSlashCmds.length === 0" class="px-3 py-3 text-[11px] text-surface-400 text-center">Nenhum comando corresponde</div>
                </div>
                <label class="flex h-10 w-10 items-center justify-center rounded-xl border border-surface-200 text-surface-400 hover:text-brand-600 hover:border-brand-300 cursor-pointer transition-colors shrink-0" :class="!selectedAgentId?'opacity-30 pointer-events-none':''">
                    <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13"/></svg>
                    <input type="file" class="hidden" @change="handleFileSelect($event)" multiple :disabled="!selectedAgentId">
                </label>
                <textarea x-ref="chatInput" x-model="input"
                          @input="onInputChange(); $el.style.height='auto'; $el.style.height=Math.min($el.scrollHeight,360)+'px'"
                          @keydown.enter.prevent="onEnterKey($event)"
                          @keydown.arrow-down.prevent="if(slashOpen) slashHighlight = Math.min(slashHighlight+1, filteredSlashCmds.length-1)"
                          @keydown.arrow-up.prevent="if(slashOpen) slashHighlight = Math.max(slashHighlight-1, 0)"
                          @keydown.escape="slashOpen=false"
                          placeholder="Digite sua mensagem... (ou / para comandos · Shift+Enter quebra linha)" rows="2"
                          style="min-height:44px; max-height:360px;"
                          class="flex-1 resize-y rounded-xl border border-surface-200 bg-surface-50 px-4 py-2.5 text-[13px] leading-relaxed text-brand-900 placeholder:text-surface-300 focus:border-brand-400 focus:ring-2 focus:ring-brand-100 outline-none transition scrollbar-thin" :disabled="!selectedAgentId||sending"></textarea>
                <button @click="send()" :disabled="!selectedAgentId||(!input.trim()&&!pendingFiles.length)||sending" class="flex h-10 w-10 items-center justify-center rounded-xl bg-brand-500 text-white hover:bg-brand-600 disabled:opacity-30 transition-colors shrink-0"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg></button>
            </div>
        </div>
    </div>

    <!-- ══════════════ TRACE PANEL ══════════════ -->
    <aside x-show="showTrace" x-transition.duration.200ms class="hidden xl:flex w-80 flex-col border-l border-surface-200 bg-white shrink-0 overflow-hidden">
        <div class="flex items-center justify-between border-b border-surface-100 px-4 py-3">
            <span class="text-[12px] font-semibold text-brand-900">Rastreabilidade</span>
            <button @click="showTrace=false" class="p-1 rounded hover:bg-surface-100 text-surface-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div class="flex-1 overflow-y-auto scrollbar-thin">
            <template x-if="!lastTrace">
                <div class="flex flex-col items-center justify-center h-full px-6 text-center">
                    <svg class="w-10 h-10 text-surface-200 mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3"/></svg>
                    <p class="text-[12px] text-surface-400">Envie uma mensagem para ver a rastreabilidade.</p>
                </div>
            </template>
            <template x-if="lastTrace">
                <div class="p-4 space-y-4">
                    <div class="rounded-xl p-4" :class="lastTrace.final_state==='LogAndClose'?'bg-emerald-50 border border-emerald-200':lastTrace.final_state==='Refuse'?'bg-amber-50 border border-amber-200':'bg-rose-50 border border-rose-200'">

                                <div class="pb-3 flex-1 min-w-0"><div class="text-[12px] font-semibold text-brand-900" x-text="step.agent_name"></div><div class="flex items-center gap-2 mt-0.5"><span class="rounded-full px-1.5 py-0.5 text-[9px] font-bold" :class="step.agent_kind==='aobd'?'bg-violet-50 text-violet-600':step.agent_kind==='router'?'bg-brand-50 text-brand-600':'bg-teal-50 text-teal-600'" x-text="step.agent_kind"></span><span class="text-[10px] text-surface-400" x-text="step.agent_model"></span><span class="text-[10px] font-mono" :class="step.status==='completed'?'text-emerald-600':'text-rose-600'" x-text="step.status==='completed'?step.duration_ms?.toFixed(0)+'ms':step.status"></span></div></div></div>

                                <template x-for="src in lastTrace.trace?.evidence_sources||[]" :key="src"><div class="flex items-center gap-2 rounded-lg bg-surface-50 px-3 py-2"><svg class="w-3.5 h-3.5 text-teal-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg><span class="text-[11px] text-surface-500 truncate" x-text="src"></span></div></template>
                            </div>
                        </template>
                        <template x-if="!lastTrace.trace?.evidence_count"><div class="rounded-lg bg-surface-50 px-3 py-3 text-center"><p class="text-[11px] text-surface-400">Sem evidências consultadas</p><a href="/rag" class="text-[10px] text-brand-500 font-medium">Registrar bases</a></div></template>
                    </div>
                    <div>
                        <div class="mb-2 flex items-center justify-between">
                            <h3 class="text-[11px] font-bold text-brand-900 uppercase tracking-wider">Diagnóstico</h3>
                            <button @click="diagnosticExpanded=!diagnosticExpanded" class="inline-flex items-center gap-1 rounded-md px-2 py-1 text-[10px] font-semibold transition-colors" :class="diagnosticExpanded ? 'bg-surface-100 text-surface-500 hover:bg-surface-200' : 'bg-brand-50 text-brand-600 hover:bg-brand-100'">
                                <span x-text="diagnosticExpanded ? 'Recolher' : 'Expandir'"></span>
                                <svg class="h-3 w-3 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" :class="diagnosticExpanded ? '' : 'rotate-180'">
                                    <path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                                </svg>
                            </button>
                        </div>
                        <div x-show="diagnosticExpanded" class="space-y-1.5">
                            <template x-for="d in getDiagnostics()" :key="d.text">
                                <div class="flex gap-2 rounded-lg px-3 py-2" :class="d.level==='success'?'bg-emerald-50':d.level==='warning'?'bg-amber-50':d.level==='danger'?'bg-rose-50':'bg-brand-50'">
                                    <span class="shrink-0 mt-0.5" x-text="d.level==='success'?'✓':d.level==='warning'?'⚠':d.level==='danger'?'✗':'ℹ'"></span>
                                    <span class="text-[11px] leading-relaxed" :class="d.level==='success'?'text-emerald-700':d.level==='warning'?'text-amber-700':d.level==='danger'?'text-rose-700':'text-brand-700'" x-text="d.text"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-[11px] font-bold text-brand-900 uppercase tracking-wider mb-2">Execução detalhada</h3>
                        <template x-if="traceExecutionLog().length>0">

                                <template x-for="(e,i) in traceExecutionLog()" :key="i">
                                    <div class="rounded-lg border px-2.5 py-2" :class="e.level==='success'?'border-emerald-200 bg-emerald-50/70':e.level==='warning'?'border-amber-200 bg-amber-50/70':e.level==='danger'?'border-rose-200 bg-rose-50/70':'border-surface-200 bg-surface-50'">
                                        <div class="flex items-start gap-2">
                                            <span class="text-[12px] shrink-0" x-text="e.icon||'•'"></span>

                        </template>
                        <template x-if="traceExecutionLog().length===0">
                            <div class="rounded-lg bg-surface-50 px-3 py-3 text-[11px] text-surface-400 text-center">Sem log detalhado persistido para esta execução.</div>
                        </template>
                    </div>
                    <div>
                        <h3 class="text-[11px] font-bold text-brand-900 uppercase tracking-wider mb-2">Métricas</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="rounded-lg bg-surface-50 px-3 py-2 text-center"><div class="text-[16px] font-bold text-brand-900" x-text="lastTrace.duration_ms?.toFixed(0)||'—'"></div><div class="text-[9px] text-surface-400 uppercase">Latência (ms)</div></div>                            <div class="rounded-lg bg-surface-50 px-3 py-2 text-center"><div class="text-[16px] font-bold text-brand-900" x-text="lastTrace.trace?.total_steps||lastTrace.transitions?.length||0"></div><div class="text-[9px] text-surface-400 uppercase">Transições</div></div>
                            <div class="rounded-lg bg-surface-50 px-3 py-2 text-center"><div class="text-[16px] font-bold text-brand-900" x-text="lastTrace.trace?.evidence_count||0"></div><div class="text-[9px] text-surface-400 uppercase">Evidências</div></div>
                            <div class="rounded-lg bg-surface-50 px-3 py-2 text-center"><div class="text-[16px] font-bold text-brand-900" x-text="lastTrace.trace?.mcp_tools?.length||0"></div><div class="text-[9px] text-surface-400 uppercase">MCP Tools</div></div>
                            <div class="rounded-lg bg-surface-50 px-3 py-2 text-center"><div class="text-[16px] font-bold text-brand-900" x-text="lastTrace.trace?.api_tools_count||0"></div><div class="text-[9px] text-surface-400 uppercase">API Tools</div></div>
                            <div class="rounded-lg bg-surface-50 px-3 py-2 text-center"
                                 :title="(lastTrace.trace?.tokens?.input||0).toLocaleString('pt-BR')+' in (último prompt) + '+(lastTrace.trace?.tokens?.output||0).toLocaleString('pt-BR')+' out (gerados) · '+(lastTrace.trace?.tokens?.calls||0)+' chamada(s) LLM · billing total: '+(lastTrace.trace?.tokens?.total_billed||0).toLocaleString('pt-BR')">
                                <div class="text-[16px] font-bold text-brand-900" x-text="(lastTrace.trace?.tokens?.total||0).toLocaleString('pt-BR')"></div>
                                <div class="text-[9px] text-surface-400 uppercase">Tokens</div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-[11px] font-bold text-brand-900 uppercase tracking-wider mb-2">Agente</h3>
                        <div class="rounded-lg bg-surface-50 px-3 py-2.5 space-y-1.5 text-[11px]">
                            <div class="flex justify-between"><span class="text-surface-400">Nome</span><span class="font-medium text-brand-900" x-text="lastTrace.trace?.agent_name||selectedAgentInfo?.name||'—'"></span></div>
                            <div class="flex justify-between"><span class="text-surface-400">Tipo</span><span class="font-medium text-brand-900" x-text="lastTrace.trace?.agent_kind||selectedAgentInfo?.kind||'—'"></span></div>
                            <div class="flex justify-between"><span class="text-surface-400">Modelo</span><span class="font-medium text-brand-900" x-text="lastTrace.trace?.agent_model||selectedAgentInfo?.model||'—'"></span></div>
                            <div class="flex justify-between"><span class="text-surface-400">Domínio</span><span class="font-medium text-brand-900" x-text="lastTrace.trace?.agent_domain||'—'"></span></div>
                            <div x-show="lastTrace.trace?.skill_detail?.name" class="flex justify-between"><span class="text-surface-400">Skill</span><span class="font-medium text-teal-700" x-text="lastTrace.trace?.skill_detail?.name+' v'+(lastTrace.trace?.skill_detail?.version||'?')"></span></div>

                    <div class="rounded-lg bg-surface-50 px-3 py-2">

{% endblock %}

{% block scripts %}
<script>
function workspacePage() {
    return {
        agents:[], sessions:[], messages:[],
        selectedAgentId:'', currentSessionId:null,
        input:'', sending:false,
        renamingId:null, renameValue:'',
        showTrace:true, lastTrace:null, activeTraceIdx:-1,
        pendingFiles:[],
        execMode:'agent',
        pipelineRoots:[],
        slashOpen:false, slashHighlight:0, _agentSchemaCache:{},
        slashCmds:[
            {name:'help', title:'Sumário do agente', desc:'Mostra propósito, skill, modo de execução e capacidades'},
            {name:'params', title:'Parâmetros de entrada', desc:'Lista os inputs esperados (do ## Inputs e API Bindings)'},
            {name:'template', title:'Template JSON', desc:'Insere um JSON pré-preenchido com os inputs no campo de mensagem'},
        ],
        progressSteps:[], progressMinimized:false,
        liveLog:[], logMinimized:false, _logStart:0, _animTimers:[], _pulseInterval:null, _pulseCount:0,
        richViewMsgs:{},
        diagnosticExpanded:true,
        get progressDone(){return this.progressSteps.filter(s=>s.status==='done'||s.status==='error').length},
        get selectedAgentInfo(){return this.agents.find(a=>a.id===this.selectedAgentId)||null},

        // ═══════════════════════════════════════════════════════
        // Structured content detection & rich rendering
        // ═══════════════════════════════════════════════════════
        isStructuredContent(content) {
            if (!content) return false;
            const t = content.trim();
            // User-facing rule: if it looks like key:value OR contains braces, show format toggle.
            if (/[{}]/.test(t)) return true;
            if (/["'\w-]+\s*:\s*[^\s]/.test(t)) return true;
            if ((t.startsWith('{') && t.endsWith('}')) || (t.startsWith('[') && t.endsWith(']'))) return true;
            if (t.includes('\\n') && t.length > 100) return true;
            return false;
        },

        renderRichContent(content) {
            if (!content) return '';
            let text = content.trim();

            // Try JSON parse
            if ((text.startsWith('{') && text.endsWith('}')) || (text.startsWith('[') && text.endsWith(']'))) {
                try {
                    const parsed = JSON.parse(text);
                    return this._renderParsedJson(parsed);
                } catch {}
            }

            // Handle escaped newlines in plain text
            text = text.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
            return this._renderRichMarkdown(text);
        },

        _renderParsedJson(obj) {
            // ── Array of result objects (search results, lists) ──
            if (Array.isArray(obj)) {
                if (obj.length && obj.every(item => typeof item === 'object' && item !== null && (item.title || item.name))) {
                    return this._renderResultCards(obj);
                }
                // MCP content blocks
                if (obj.length && obj.every(item => item?.type === 'text')) {
                    const texts = obj.map(b => b.text || '').join('\n\n');
                    return this._renderRichMarkdown(texts.replace(/\\n/g, '\n'));
                }
                return `<pre class="rounded-lg bg-surface-50 border border-surface-200 p-3 text-[11px] font-mono overflow-x-auto whitespace-pre-wrap text-brand-800">${this._esc(JSON.stringify(obj, null, 2))}</pre>`;
            }

            // ── Object with "results" array ──
            if (obj.results && Array.isArray(obj.results)) {
                return this._renderResultCards(obj.results);
            }

            // ── MCP content array ──
            if (obj.content && Array.isArray(obj.content)) {
                const texts = obj.content.filter(b => b?.type === 'text').map(b => b.text || '');
                if (texts.length) return this._renderRichMarkdown(texts.join('\n\n').replace(/\\n/g, '\n'));
            }

            // ── Object with result.content ──
            if (obj.result?.content && Array.isArray(obj.result.content)) {
                const texts = obj.result.content.filter(b => b?.type === 'text').map(b => b.text || '');
                if (texts.length) return this._renderRichMarkdown(texts.join('\n\n').replace(/\\n/g, '\n'));
            }

            // ── Single text field extraction ──
            const textFields = ['generated_content','output','content','text','result','response','answer','message','summary','data'];
            for (const f of textFields) {
                if (obj[f] && typeof obj[f] === 'string') {
                    return this._renderRichMarkdown(obj[f].replace(/\\n/g, '\n').replace(/\\t/g, '\t'));
                }
            }

            // ── Single-key object with string value ──
            const keys = Object.keys(obj);
            if (keys.length === 1 && typeof obj[keys[0]] === 'string') {
                return this._renderRichMarkdown(obj[keys[0]].replace(/\\n/g, '\n'));
            }

            // ── Object with multiple fields → render as key-value card ──
            if (keys.length <= 20) {
                return this._renderObjectCard(obj);
            }

            // ── Fallback: pretty JSON ──
            return `<pre class="rounded-lg bg-surface-50 border border-surface-200 p-3 text-[11px] font-mono overflow-x-auto whitespace-pre-wrap text-brand-800">${this._esc(JSON.stringify(obj, null, 2))}</pre>`;
        },

        _renderResultCards(results) {
            let html = `
                <div class="flex items-center justify-between mb-2.5">
                    <div class="inline-flex items-center gap-1.5 rounded-full border border-violet-200 bg-violet-50 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-violet-700">
                        <span class="inline-block h-1.5 w-1.5 rounded-full bg-violet-500"></span>
                        ${results.length} resultado(s)
                    </div>
                    <span class="text-[10px] text-surface-400">Visualização formatada</span>
                </div>
                <div class="space-y-2.5">
            `;
            for (const r of results) {
                const title = r.title || r.name || '—';
                const link = r.link || r.url || r.href || '';
                const snippet = r.snippet || r.description || r.summary || r.abstract || r.text || '';
                const domain = this._hostFromUrl(link);

                html += `<div class="rounded-xl border border-surface-200 bg-white/90 p-3.5 shadow-[0_1px_0_rgba(15,23,42,0.03)] hover:shadow-md hover:border-violet-200 transition-all">`;

                // Title (linked if URL available)
                if (link) {
                    html += `
                        <a href="${this._esc(link)}" target="_blank" rel="noopener" class="text-[13px] font-semibold text-brand-700 hover:text-violet-700 hover:underline leading-snug">
                            ${this._esc(title)}
                        </a>
                        <div class="mt-1 flex items-center gap-2">
                            ${domain ? `<span class="inline-flex max-w-[220px] items-center rounded-full bg-surface-100 px-2 py-0.5 text-[9px] font-mono text-surface-500 truncate">${this._esc(domain)}</span>` : ''}
                            <span class="text-[9px] text-surface-300 truncate font-mono">${this._esc(link)}</span>
                        </div>
                    `;
                } else {
                    html += `<div class="text-[13px] font-semibold text-brand-900 leading-snug">${this._esc(title)}</div>`;
                }

                // Snippet
                if (snippet) {
                    html += `<p class="text-[12px] text-surface-600 mt-2 leading-relaxed">${this._esc(snippet)}</p>`;
                }

                // Extra fields
                const skip = new Set(['title','name','link','url','href','snippet','description','summary','abstract','text']);
                for (const [k, v] of Object.entries(r)) {
                    if (!skip.has(k) && v !== null && v !== undefined && v !== '') {
                        const val = typeof v === 'object' ? JSON.stringify(v) : String(v);
                        if (val.length < 300) {
                            html += `<div class="text-[10px] mt-1.5"><span class="font-semibold text-surface-400">${this._esc(k)}:</span> <span class="text-surface-500">${this._esc(val)}</span></div>`;
                        }
                    }
                }

                html += `</div>`;
            }
            html += `</div>`;
            return html;
        },

        _renderObjectCard(obj) {
            let html = `
                <div class="mb-2 inline-flex items-center gap-1.5 rounded-full border border-violet-200 bg-violet-50 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-violet-700">
                    <span class="inline-block h-1.5 w-1.5 rounded-full bg-violet-500"></span>
                    Estruturado
                </div>
                <div class="rounded-xl border border-surface-200 bg-white/90 p-4 space-y-2">
            `;
            for (const [k, v] of Object.entries(obj)) {
                if (v === null || v === undefined) continue;
                let valHtml;

                if (typeof v === 'string') {
                    valHtml = `<span class="text-brand-900">${this._esc(v.substring(0, 500))}</span>`;
                } else if (Array.isArray(v)) {
                    if (v.length && typeof v[0] === 'object') {
                        valHtml = `<div class="mt-1">${this._renderResultCards(v)}</div>`;
                    } else {
                        valHtml = `<span class="font-mono text-brand-800">${this._esc(JSON.stringify(v))}</span>`;
                    }
                } else if (typeof v === 'object') {
                    valHtml = `<pre class="mt-1 rounded bg-white border border-surface-100 p-2 text-[10px] font-mono overflow-x-auto">${this._esc(JSON.stringify(v, null, 2))}</pre>`;
                } else {
                    valHtml = `<span class="text-brand-900">${this._esc(String(v))}</span>`;
                }
                html += `<div class="text-[11px]"><span class="font-semibold text-surface-400">${this._esc(k)}:</span> ${valHtml}</div>`;
            }
            html += '</div>';
            return html;
        },

        _hostFromUrl(url){
            if(!url) return '';
            try{return new URL(url).hostname.replace(/^www\./,'')}catch{return ''}
        },

        _renderRichMarkdown(text) {
            if (!text) return '';
            let html = this._esc(text);

            // Code blocks
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
                `<pre class="rounded-lg bg-surface-50 border border-surface-200 px-3 py-2 my-2 text-[10px] font-mono overflow-x-auto text-brand-800"><code>${code.trim()}</code></pre>`
            );

            const lines = html.split('\n');
            const out = [];
            let inList = false;

            for (const line of lines) {
                // Headers
                if (line.match(/^#{1,6}\s/)) {
                    if (inList) { out.push('</ul>'); inList = false; }
                    const lvl = line.match(/^(#{1,6})\s/)[1].length;
                    const content = line.replace(/^#{1,6}\s+/, '');
                    const cls = lvl <= 2 ? 'text-[14px] font-bold mt-3 mb-1' : 'text-[12px] font-semibold mt-2 mb-0.5';
                    out.push(`<div class="${cls} text-brand-900">${this._inlineMd(content)}</div>`);
                    continue;
                }
                // HR
                if (line.match(/^[-*_]{3,}\s*$/)) {
                    if (inList) { out.push('</ul>'); inList = false; }
                    out.push('<hr class="my-2 border-surface-200">');
                    continue;
                }
                // Unordered list
                if (line.match(/^\s*[-*+]\s+/)) {
                    if (!inList) { out.push('<ul class="my-1 space-y-0.5">'); inList = true; }
                    const c = line.replace(/^\s*[-*+]\s+/, '');
                    out.push(`<li class="flex gap-1.5 text-[12px] text-surface-600"><span class="text-brand-400 shrink-0">•</span><span>${this._inlineMd(c)}</span></li>`);
                    continue;
                }
                // Ordered list
                if (line.match(/^\s*\d+[.)]\s+/)) {
                    if (!inList) { out.push('<ol class="my-1 space-y-0.5 list-decimal list-inside text-[12px] text-surface-600">'); inList = true; }
                    const c = line.replace(/^\s*\d+[.)]\s+/, '');
                    out.push(`<li>${this._inlineMd(c)}</li>`);
                    continue;
                }
                if (inList && line.trim() === '') { out.push('</ul>'); inList = false; }
                if (line.trim() === '') { out.push('<div class="h-1.5"></div>'); continue; }
                if (inList) { out.push('</ul>'); inList = false; }
                out.push(`<p class="text-[12px] text-surface-600 leading-relaxed">${this._inlineMd(line)}</p>`);
            }
            if (inList) out.push('</ul>');
            return out.join('\n');
        },

        _inlineMd(t) {
            return t
                .replace(/`([^`]+)`/g, '<code class="rounded bg-surface-100 px-1 py-0.5 text-[10px] font-mono text-violet-700">$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong class="font-semibold text-brand-900">$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-brand-500 underline hover:text-brand-700">$1</a>');
        },

        _esc(s) {
            return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        },

        // ─────────────────────────────────────
        // Boot
        // ─────────────────────────────────────
        async load(){
            try{this.agents=(await api.get('/api/v1/agents?status=active')).agents||[]}catch{}
            try{this.sessions=(await api.get('/api/v1/workspace/sessions?limit=20')).sessions||[]}catch{}
            await this.loadPipelineRoots();
            const p=new URLSearchParams(window.location.search);
            if(p.get('session')) this.loadSession(p.get('session'));
            else if(p.get('agent')){this.selectedAgentId=p.get('agent');this.execMode=p.get('mode')||'agent';this.newSession();}
        },
        async loadPipelineRoots(){
            try{
                const t=await api.get('/api/v1/mesh/topology');const e=t.edges||[];const n=t.nodes||[];
                const ts=new Set(e.map(x=>x.target));
                const roots=[...new Set(e.map(x=>x.source))].filter(s=>!ts.has(s));
                this.pipelineRoots=roots.map(rid=>{
                    const nd=n.find(x=>x.id===rid);let len=1;const v=new Set([rid]);const q=[rid];
                    while(q.length){const c=q.shift();for(const ed of e){if(ed.source===c&&!v.has(ed.target)){v.add(ed.target);q.push(ed.target);len++}}}
                    return{id:rid,name:nd?.name||'?',chainLen:len}
                }).filter(x=>x.chainLen>1);
            }catch{this.pipelineRoots=[];}
        },
        newSession(){this.currentSessionId=null;this.messages=[];this.lastTrace=null;this.pendingFiles=[];this.liveLog=[];this.richViewMsgs={};this._clearAnimTimers()},

        // ─────────────────────────────────────
        // Slash commands (/help, /params, /template)
        // ─────────────────────────────────────
        get filteredSlashCmds(){
            const q=(this.input||'').trim();
            if(!q.startsWith('/')) return [];
            const term=q.slice(1).toLowerCase();
            if(!term) return this.slashCmds;
            return this.slashCmds.filter(c=>c.name.startsWith(term)||c.title.toLowerCase().includes(term));
        },
        get selectedAgentFallbackLabel(){
            const fromTrace=this.lastTrace?.trace?.agent_name;
            const fromList=this.agents.find(a=>a.id===this.selectedAgentId)?.name;
            return (fromTrace||fromList||'Agente da sessão')+' (indisponível na lista)';
        },
        get selectedPipelineFallbackLabel(){
            const firstStep=this.lastTrace?.pipeline_steps?.[0];
            const rootName=this.pipelineRoots.find(p=>p.id===this.selectedAgentId)?.name;
            const nm=firstStep?.agent_name||rootName||'Pipeline da sessão';
            const len=this.lastTrace?.pipeline_steps?.length||1;
            return `${nm} → ${len} agente(s)`;
        },
        onInputChange(){
            const v=(this.input||'').trim();
            const open=v.startsWith('/')&&!v.includes('\n');
            if(open!==this.slashOpen){this.slashOpen=open;this.slashHighlight=0}
            else if(open&&this.slashHighlight>=this.filteredSlashCmds.length) this.slashHighlight=0;
        },
        onEnterKey(ev){
            if(ev.shiftKey){this.input+='\n';return}
            if(this.slashOpen&&this.filteredSlashCmds.length){
                const cmd=this.filteredSlashCmds[this.slashHighlight]||this.filteredSlashCmds[0];
                this.runSlashCommand(cmd.name);
                return;
            }
            // Plain "/cmd" sem popover (caso já tenha sido fechado mas o texto bate)
            const v=(this.input||'').trim();
            if(v.startsWith('/')){
                const name=v.slice(1).split(/\s+/)[0].toLowerCase();
                if(this.slashCmds.some(c=>c.name===name)){this.runSlashCommand(name);return}
            }
            this.send();
        },
        async _fetchAgentSchema(){
            if(!this.selectedAgentId) return null;
            if(this._agentSchemaCache[this.selectedAgentId]) return this._agentSchemaCache[this.selectedAgentId];
            try{
                const data=await api.get(`/api/v1/agents/${this.selectedAgentId}/inputs-schema`);
                this._agentSchemaCache[this.selectedAgentId]=data;
                return data;
            }catch(e){showToast('Erro ao carregar schema: '+e.message,'error');return null}
        },
        _pushSystemMessage(html){
            this.messages.push({role:'assistant',content:html,_systemNote:true,_agentName:'Sistema',_agentKind:'system',created_at:new Date().toISOString()});
            this.$nextTick(()=>this.scrollToBottom());
        },
        async runSlashCommand(name){
            this.slashOpen=false;this.input='';
            if(!this.selectedAgentId){showToast('Selecione um agente primeiro','error');return}
            if(this.execMode==='pipeline'){showToast('Comandos de inspeção indisponíveis em modo Pipeline','info');return}
            const data=await this._fetchAgentSchema();
            if(!data) return;
            if(name==='help') this._pushSystemMessage(this._renderHelp(data));
            else if(name==='params') this._pushSystemMessage(this._renderParams(data));
            else if(name==='template'){const tpl=this._buildInputTemplate(data); if(tpl){this.input=tpl; showToast('Template inserido — edite os valores e envie');}else{showToast('Sem inputs estruturados para este agente','info')}}
        },
        _allInputNames(data){
            const fromSchema=Object.keys(data?.inputs_schema?.properties||{});
            const fromBindings=data?.inputs_referenced||[];
            return Array.from(new Set([...fromSchema, ...fromBindings]));
        },
        _buildInputTemplate(data){
            const names=this._allInputNames(data);
            if(!names.length) return '';
            const props=data?.inputs_schema?.properties||{};
            const required=new Set(data?.inputs_schema?.required||[]);
            const obj={};
            for(const n of names){
                const spec=props[n]||{};
                const t=spec.type||'string';
                if('default' in spec) obj[n]=spec.default;
                else if(t==='integer'||t==='number') obj[n]=0;
                else if(t==='boolean') obj[n]=false;
                else if(t==='array') obj[n]=[];
                else if(t==='object') obj[n]={};
                else obj[n]=required.has(n)?'<obrigatório>':'';
            }
            return JSON.stringify(obj,null,2);
        },
        _renderHelp(d){
            const a=d.agent||{};const s=d.skill;const mode=d.execution_mode||'standard';
            const modeColor={fast:'emerald',standard:'brand',rigorous:'amber',declarative:'violet'}[mode]||'brand';
            const bindings=d.api_bindings||[];
            return `
<div class="space-y-2 text-[12px]">
  <div class="font-bold text-brand-900 text-[13px]">${this._esc(a.name||'Agente')}</div>
  <div class="flex flex-wrap gap-1.5 text-[10px]">
    <span class="rounded-full bg-brand-50 px-2 py-0.5 text-brand-700 font-semibold">${this._esc(a.kind||'')}</span>
    <span class="rounded-full bg-surface-100 px-2 py-0.5 text-surface-600 font-mono">${this._esc(a.model||'')}</span>
    <span class="rounded-full bg-surface-100 px-2 py-0.5 text-surface-600">v${this._esc(a.version||'?')}</span>
    <span class="rounded-full bg-${modeColor}-50 px-2 py-0.5 text-${modeColor}-700 font-semibold">mode: ${this._esc(mode)}</span>
  </div>
  ${s?`<div class="rounded-lg bg-teal-50 border border-teal-100 px-3 py-2"><div class="text-[10px] font-bold text-teal-700 uppercase tracking-wider mb-0.5">Skill</div><div class="text-[12px] font-semibold text-teal-900">${this._esc(s.name)} <span class="font-mono text-[10px] text-teal-600">v${this._esc(s.version)}</span></div>${s.purpose?`<div class="text-[11px] text-teal-700 mt-1">${this._esc(s.purpose)}</div>`:''}</div>`:'<div class="text-[11px] text-surface-400 italic">Agente sem skill vinculada.</div>'}
  ${bindings.length?`<div><div class="text-[10px] font-bold text-violet-700 uppercase tracking-wider mb-1">API Bindings (${bindings.length})</div><div class="space-y-1">${bindings.map(b=>`<div class="flex items-center gap-2 rounded bg-violet-50 border border-violet-100 px-2 py-1"><span class="font-mono text-[9px] font-bold text-violet-700 shrink-0">${this._esc(b.method)}</span><span class="font-mono text-[10px] text-brand-900 truncate">${this._esc(b.path)}</span><span class="text-[9px] text-surface-400 ml-auto">${this._esc(b.connector)}</span></div>`).join('')}</div></div>`:''}
  <div class="pt-1 text-[11px] text-surface-500">Use <code class="rounded bg-surface-100 px-1 font-mono text-violet-700">/params</code> para ver inputs ou <code class="rounded bg-surface-100 px-1 font-mono text-violet-700">/template</code> para gerar um JSON pré-preenchido.</div>
</div>`;
        },
        _renderParams(d){
            const names=this._allInputNames(d);
            const props=d?.inputs_schema?.properties||{};
            const required=new Set(d?.inputs_schema?.required||[]);
            const fromBindings=new Set(d?.inputs_referenced||[]);
            if(!names.length){
                const _ob='{'+'{', _cb='}'+'}';
                return '<div class="text-[12px] text-surface-500">Nenhum parâmetro de entrada estruturado foi declarado para este agente.<br><span class="text-[11px] text-surface-400">Adicione a seção <code class="font-mono text-violet-600">## Inputs</code> com JSON Schema na SKILL.md, ou use API Bindings com variáveis <code class="font-mono text-violet-600">'+_ob+' inputs.X '+_cb+'</code>.</span></div>';
            }
            const rows=names.map(n=>{
                const spec=props[n]||{};
                const t=spec.type||'—';
                const isReq=required.has(n);
                const fromB=fromBindings.has(n);
                const desc=spec.description||(fromB?'Referenciado em API Bindings':'');
                return `<tr class="border-b border-surface-100 last:border-0">
  <td class="py-1.5 pr-2 align-top"><code class="font-mono text-[11px] text-violet-700 font-semibold">${this._esc(n)}</code>${isReq?'<span class="ml-1 text-rose-500" title="obrigatório">*</span>':''}</td>
  <td class="py-1.5 pr-2 align-top text-[10px] text-surface-500 font-mono">${this._esc(t)}</td>
  <td class="py-1.5 align-top text-[11px] text-surface-700">${this._esc(desc)}</td>
</tr>`;
            }).join('');
            return `
<div class="space-y-2 text-[12px]">
  <div class="font-bold text-brand-900">Parâmetros de entrada</div>
  <table class="w-full text-left">
    <thead><tr class="border-b border-surface-200"><th class="py-1 pr-2 text-[9px] font-bold text-surface-400 uppercase">Nome</th><th class="py-1 pr-2 text-[9px] font-bold text-surface-400 uppercase">Tipo</th><th class="py-1 text-[9px] font-bold text-surface-400 uppercase">Descrição</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="text-[10px] text-surface-400"><span class="text-rose-500">*</span> obrigatório · use <code class="rounded bg-surface-100 px-1 font-mono text-violet-700">/template</code> para inserir um JSON pré-preenchido</div>
</div>`;
        },

        // ─────────────────────────────────────
        // Session load / rename / delete
        // ─────────────────────────────────────
        async loadSession(sid){
            try{
                const d=await api.get(`/api/v1/workspace/sessions/${sid}`);
                this.currentSessionId=sid;this.messages=d.messages||[];
                this.lastTrace=d.trace||null;
                const isPipelineSession = d.trace?.mode==='pipeline'||(d.trace?.pipeline_steps?.length>0);
                this.execMode=isPipelineSession?'pipeline':'agent';
                const pipelineEntryId=d.trace?.pipeline_steps?.[0]?.agent_id||d.trace?.agent_id;
                const sessionAgentId=d.session?.agent_id;
                this.selectedAgentId=isPipelineSession?(pipelineEntryId||sessionAgentId||''):(sessionAgentId||pipelineEntryId||'');
                this.activeTraceIdx=-1;this.richViewMsgs={};
                for(let i=this.messages.length-1;i>=0;i--){if(this.messages[i]._trace){this.activeTraceIdx=i;break}}
                this._restoreLog(d.trace);
                this.$nextTick(()=>this.scrollToBottom());
            }catch{showToast('Erro ao carregar sessão','error')}
        },
        startRename(s){this.renamingId=s.id;this.renameValue=s.title||''},
        async confirmRename(sid){
            if(!this.renameValue.trim()){this.renamingId=null;return}
            try{await fetch(`/api/v1/workspace/sessions/${sid}?title=${encodeURIComponent(this.renameValue.trim())}`,{method:'PATCH'});const s=this.sessions.find(x=>x.id===sid);if(s)s.title=this.renameValue.trim();this.renamingId=null;showToast('Sessão renomeada')}catch{showToast('Erro','error')}
        },
        async deleteSession(sid,title){
            if(!confirm(`Excluir sessão "${title||'Nova sessão'}"?`)) return;
            try{await api.del(`/api/v1/workspace/sessions/${sid}`);this.sessions=this.sessions.filter(s=>s.id!==sid);if(this.currentSessionId===sid){this.currentSessionId=null;this.messages=[];this.lastTrace=null;this.liveLog=[]}showToast('Sessão excluída')}catch{showToast('Erro','error')}
        },
        async handleFileSelect(ev){
            for(const f of ev.target.files){
                try{const fd=new FormData();fd.append('file',f);const r=await fetch('/api/v1/workspace/upload',{method:'POST',body:fd});if(!r.ok)throw new Error();const d=await r.json();this.pendingFiles.push(d);showToast(`"${f.name}" anexado`)}catch(e){showToast('Erro no upload','error')}
            }
            ev.target.value='';
        },

        // ─────────────────────────────────────
        // SEND
        // ─────────────────────────────────────
        async send(){
            if(!this.selectedAgentId||(!this.input.trim()&&!this.pendingFiles.length)||this.sending)return;
            const text=this.input.trim()||(this.pendingFiles.length?`[Anexo: ${this.pendingFiles.map(f=>f.filename).join(', ')}]`:'');
            this.input='';
            const msgAtt=this.pendingFiles.map(f=>({filename:f.filename,content_type:f.content_type,size:f.size}));
            this.messages.push({role:'user',content:text,created_at:new Date().toISOString(),attachments:msgAtt.length?msgAtt:null});
            this.scrollToBottom();
            this.sending=true;
            this.lastTrace=null;this.activeTraceIdx=-1;
            this.liveLog=[];this._logStart=Date.now();
            this._clearAnimTimers();

            if(this.execMode==='pipeline') await this._initProgressSteps(); else this._initAgentProgress();
            this._startLiveAnimation();

            try{
                const result=await api.post('/api/v1/workspace/chat',{
                    agent_id:this.selectedAgentId,message:text,session_id:this.currentSessionId,
                    attachments:this.pendingFiles.length?this.pendingFiles:null,
                    mode:this.execMode,
                });
                this.currentSessionId=result.interaction_id||this.currentSessionId;
                this._clearAnimTimers();

                if(result.mode==='pipeline'&&result.pipeline_steps?.length){
                    for(let i=0;i<result.pipeline_steps.length;i++){
                        const step=result.pipeline_steps[i];
                        if(this.progressSteps[i]){this.progressSteps[i].status=step.status==='completed'?'done':step.status;this.progressSteps[i].duration=step.duration_ms?.toFixed(0)||'0'}
                    }
                    for(const step of result.pipeline_steps){
                        if(step.status==='completed'||step.status==='error'){
                            this.messages.push({role:'assistant',content:step.output||step.error||'',created_at:new Date().toISOString(),_agentName:step.agent_name,_agentKind:step.agent_kind,_duration:step.duration_ms,_trace:{interaction_id:step.interaction_id,agent_id:step.agent_id,final_state:step.final_state,evidence_score:step.evidence_score||0,transitions:step.transitions||[],duration_ms:step.duration_ms||0,trace:step.trace||{},mode:'agent',pipeline_steps:result.pipeline_steps}});
                        }
                    }
                    this.lastTrace=result;
                    this.lastTrace.trace=this.lastTrace.trace||result.pipeline_steps?.[result.pipeline_steps.length-1]?.trace||{};
                    this.activeTraceIdx=this.messages.length-1;
                }else{
                    const idx=this.messages.length;
                    this.messages.push({role:'assistant',content:result.output,created_at:new Date().toISOString(),_trace:result,_agentName:result.trace?.agent_name,_agentKind:result.trace?.agent_kind,_duration:result.duration_ms});
                    this.lastTrace=result;
                    this.activeTraceIdx=idx;

                    // Auto-activate rich view for JSON responses
                    if (this.isStructuredContent(result.output)) {
                        this.richViewMsgs[idx] = true;
                    }
                }

                this._finalizeWithRealLog(result);

                if(this.progressSteps.length===1){this.progressSteps[0].status=result.final_state==='Refuse'?'error':'done';this.progressSteps[0].duration=Math.round(result.duration_ms||0)}

                this.pendingFiles=[];
                this.sessions=(await api.get('/api/v1/workspace/sessions?limit=20').catch(()=>({sessions:[]}))).sessions||[];
            }catch(e){
                this._clearAnimTimers();
                this.messages.push({role:'assistant',content:'Erro: '+e.message,created_at:new Date().toISOString()});
                for(const ps of this.progressSteps){if(ps.status==='waiting'||ps.status==='running')ps.status='error'}
                this._addLog('error','💥','Erro na execução',e.message,'danger');
                showToast('Erro','error');
            }
            this.sending=false;this.scrollToBottom();this.$refs.chatInput?.focus();
        },

        // ═══════════════════════════════════════════════════
        // LIVE LOG animation (kept from original)
        // ═══════════════════════════════════════════════════
        _clearAnimTimers(){this._animTimers.forEach(t=>clearTimeout(t));this._animTimers=[];if(this._pulseInterval){clearInterval(this._pulseInterval);this._pulseInterval=null}},
        _sched(fn,ms){this._animTimers.push(setTimeout(()=>fn.call(this),ms))},

        _startLiveAnimation(){
            const ag=this.selectedAgentInfo;
            const name=ag?.name||'Agente';
            const kind=ag?.kind||'subagent';
            const model=ag?.model||'—';
            const provider=ag?.llm_provider||'openai';
            const kindMap={aobd:'AOBD — Orquestrador de Domínio',router:'AR — Roteador Adaptativo',subagent:'SA — Subagente Especialista'};
            let d=0;

            this._sched(()=>this._addLog('agent','🤖','Inicializando agente',`${name} (${kindMap[kind]||kind})`,'info'),d);d+=220;
            this._sched(()=>this._addLog('agent','⚙️','Modelo LLM',`${provider}/${model}`,'info'),d);d+=180;
            if(ag?.domain){this._sched(()=>this._addLog('agent','🏢','Domínio',ag.domain,'info'),d);d+=150}

            d+=300;
            this._sched(()=>this._addLog('prompt','📝','Compilando System Prompt','','info'),d);d+=350;
            this._sched(()=>this._addLog('skill','📋','Carregando SKILL.md','','info'),d);d+=300;
            this._sched(()=>this._addLog('tools','🔧','Resolvendo Tool Bindings','','info'),d);

            d+=500;
            this._sched(()=>this._addLog('fsm','▶','Intake','Recebendo input','info'),d);d+=400;
            this._sched(()=>this._addLog('fsm','🔒','PolicyCheck','','info'),d);d+=500;
            this._sched(()=>this._addLog('fsm','🔍','RetrieveEvidence','','info'),d);d+=800;
            this._sched(()=>this._addLog('fsm','🧠','DraftAnswer','DeepAgent Harness — LLM gerando resposta...','info'),d);

            d+=1500;
            this._sched(()=>{
                this._pulseCount=0;
                this._pulseInterval=setInterval(()=>{
                    if(!this.sending){clearInterval(this._pulseInterval);this._pulseInterval=null;return}
                    this._pulseCount++;
                    const elapsed=((Date.now()-this._logStart)/1000).toFixed(1);
                    const phases=[
                        {cat:'llm',icon:'🧠',title:'DeepAgent Harness — iteração',detail:`${elapsed}s`},
                        {cat:'tools',icon:'🔧',title:'Verificando tool calls',detail:`${elapsed}s`},
                        {cat:'evidence',icon:'🔍',title:'Processando evidências',detail:`${elapsed}s`},
                        {cat:'fsm',icon:'⏳',title:'FSM aguardando DraftAnswer',detail:`${elapsed}s`},
                        {cat:'system',icon:'📈',title:'Heartbeat',detail:`${elapsed}s`},
                    ];
                    const p=phases[this._pulseCount%phases.length];
                    this._addLog(p.cat,p.icon,p.title,p.detail,'info');
                },3000);
            },d);
        },

        _finalizeWithRealLog(result){
            const execLog=result.trace?.execution_log||[];
            if(!execLog.length) return;
            this._addLog('separator','','═══ RESULTADO REAL ═══','','info');
            for(const e of execLog){
                this.liveLog.push({time:this._ts(),icon:e.icon||'',title:e.title||'',detail:e.detail||'',cat:e.cat||'info',level:e.level||'info',final:true});
            }
            this._scrollLog();
        },

        _restoreLog(trace){
            if(!trace){this.liveLog=[];return}
            const el=trace.execution_log||trace.trace?.execution_log||[];
            if(!el.length){this.liveLog=[];return}
            // Distribuir timestamps proporcionalmente ao duration_ms total
            const totalMs=trace.duration_ms||trace.trace?.duration_ms||0;
            const totalSec=totalMs/1000;
            const step=el.length>1?totalSec/(el.length-1):0;
            this.liveLog=el.map((e,i)=>{
                const s=Math.min(step*i,totalSec);
                const time=Math.floor(s/60).toString().padStart(2,'0')+':'+Math.floor(s%60).toString().padStart(2,'0');
                return{time,icon:e.icon||'',title:e.title||'',detail:e.detail||'',cat:e.cat||'info',level:e.level||'info',final:true};
            });
        },

        _addLog(cat,icon,title,detail,level){
            this.liveLog.push({time:this._ts(),icon,title,detail:detail||'',cat:cat||'info',level:level||'info',final:false});
            this._scrollLog();
        },
        _ts(){
            const s=((Date.now()-this._logStart)/1000);
            return Math.floor(s/60).toString().padStart(2,'0')+':'+Math.floor(s%60).toString().padStart(2,'0');
        },
        _scrollLog(){this.$nextTick(()=>{const c=this.$refs.liveLogContainer;if(c)c.scrollTop=c.scrollHeight})},

        async _initProgressSteps(){
            try{
                const t=await api.get('/api/v1/mesh/topology');const e=t.edges||[];const n=t.nodes||[];
                const chain=[this.selectedAgentId];const v=new Set(chain);const q=[this.selectedAgentId];
                while(q.length){const c=q.shift();for(const ed of e){if(ed.source===c&&!v.has(ed.target)){v.add(ed.target);chain.push(ed.target);q.push(ed.target)}}}
                this.progressSteps=chain.map((id,i)=>{const nd=n.find(x=>x.id===id);return{id,name:nd?.name||'?',kind:nd?.kind||'',model:nd?.model||'',status:i===0?'running':'waiting',duration:''}});
                this.progressMinimized=false;
            }catch{this.progressSteps=[{id:this.selectedAgentId,name:'Processando...',kind:'',status:'running',duration:''}]}
        },
        _initAgentProgress(){
            const ag=this.agents.find(a=>a.id===this.selectedAgentId);
            this.progressSteps=[{id:this.selectedAgentId,name:ag?.name||'?',kind:ag?.kind?.toUpperCase()||'SA',model:ag?.model||'',status:'running',duration:''}];
            this.progressMinimized=false;
        },

        // ─────────────────────────────────────
        // Helpers
        // ─────────────────────────────────────
        scrollToBottom(){this.$nextTick(()=>{const el=this.$refs.chatContainer;if(el)el.scrollTop=el.scrollHeight})},
        formatMarkdown(t){
            if(!t)return '';
            const c=this.extractText(t);
            return c.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre class="rounded-lg bg-surface-50 border border-surface-100 p-3 my-2 text-[11px] font-mono overflow-x-auto"><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code class="rounded bg-surface-100 px-1.5 py-0.5 text-[11px] font-mono text-brand-700">$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
        },
        extractText(t){
            if(!t)return '';
            const s=t.trim();
            if((s.startsWith('{')&&s.endsWith('}'))||(s.startsWith('[')&&s.endsWith(']'))){
                try{const o=JSON.parse(s);for(const f of['generated_content','output','content','text','response','answer','result','message','summary']){if(o[f]&&typeof o[f]==='string')return o[f].replace(/\\n/g,'\n')}const k=Object.keys(o);if(k.length===1&&typeof o[k[0]]==='string')return o[k[0]].replace(/\\n/g,'\n')}catch{}
            }
            return t;
        },
        fsmColor(s){return{'PolicyCheck':'bg-blue-100 text-blue-700','RetrieveEvidence':'bg-cyan-100 text-cyan-700','DraftAnswer':'bg-violet-100 text-violet-700','VerifyEvidence':'bg-amber-100 text-amber-700','Recommend':'bg-emerald-100 text-emerald-700','Refuse':'bg-rose-100 text-rose-700','Escalate':'bg-red-100 text-red-700','LogAndClose':'bg-surface-200 text-surface-600'}[s]||'bg-brand-100 text-brand-700'},
        fsmLabel(s){return{'Intake':'Recepção','PolicyCheck':'Verificação de Política','RetrieveEvidence':'Busca de Evidências','DraftAnswer':'Geração de Rascunho (LLM)','VerifyEvidence':'Verificação de Evidência','Recommend':'Recomendação','Refuse':'Recusa','Escalate':'Escalação','LogAndClose':'Registro e Fechamento'}[s]||s},
        fsmDesc(s){return{'Intake':'Recebe e contextualiza a solicitação do usuário','PolicyCheck':'Avalia permissões do ator e políticas OPA','RetrieveEvidence':'Retriever + Reranker consultam bases autorizadas','DraftAnswer':'DeepAgent Harness gera resposta via LLM','VerifyEvidence':'Evidence Checker valida consistência e cobertura','Recommend':'Resposta verificada entregue ao requisitante','Refuse':'Evidência insuficiente ou conflito de política','Escalate':'Risco detectado — encaminhado a supervisão humana','LogAndClose':'Decisão, fontes e métricas registradas no audit log'}[s]||''},
        traceExecutionLog(){
            const base=this.lastTrace||{};
            return base.trace?.execution_log||base.execution_log||[];
        },
        getDiagnostics(){
            const d=this.lastTrace?.trace?.diagnostics||[];
            const steps=this.lastTrace?.pipeline_steps;
            if(!steps?.length)return d;
            const last=[...steps].reverse().find(s=>s.status==='completed');
            const lastD=last?.trace?.diagnostics||[];
            const summary=d.filter(x=>x.level==='success'&&x.text?.startsWith('Pipeline'));
            return[...summary,...lastD];
        },
        async copyMsg(t){try{await navigator.clipboard.writeText(t||'');showToast('Copiado')}catch{showToast('Erro','error')}},

        async exportLogXlsx(){
            if(!this.liveLog.length) return;
            if(!window.XLSX){
                await new Promise((resolve,reject)=>{
                    const s=document.createElement('script');
                    s.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
                    s.onload=resolve; s.onerror=reject;
                    document.head.appendChild(s);
                });
            }
            const XLSX=window.XLSX;
            const agName=this.lastTrace?.trace?.agent_name||this.selectedAgentInfo?.name||'agente';
            const ts=new Date().toISOString().replace(/[:.]/g,'-').substring(0,19);
            const rows=this.liveLog.map((e,i)=>({'#':i+1,'Tempo':e.time||'','Categoria':(e.cat||'').toUpperCase(),'Título':e.title||'','Detalhe':e.detail||'','Nível':e.level||'info'}));
            const wsLog=XLSX.utils.json_to_sheet(rows);
            wsLog['!cols']=[{wch:4},{wch:8},{wch:12},{wch:40},{wch:60},{wch:10}];
            const trace=this.lastTrace?.trace||{};
            const summary=[{Campo:'Agente',Valor:trace.agent_name||'—'},{Campo:'Tipo',Valor:trace.agent_kind||'—'},{Campo:'Modelo',Valor:`${trace.agent_provider||''}/${trace.agent_model||''}`},{Campo:'Estado Final',Valor:this.lastTrace?.final_state||'—'},{Campo:'Duração (ms)',Valor:String(this.lastTrace?.duration_ms||0)},{Campo:'Exportado em',Valor:new Date().toLocaleString('pt-BR')}];
            const wsSummary=XLSX.utils.json_to_sheet(summary);
            wsSummary['!cols']=[{wch:22},{wch:60}];
            const diags=(this.getDiagnostics()||[]).map(d=>({Nível:d.level,Mensagem:d.text}));
            const wsDiag=XLSX.utils.json_to_sheet(diags.length?diags:[{Nível:'—',Mensagem:'Sem diagnósticos'}]);
            const wb=XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb,wsLog,'Execution Log');
            XLSX.utils.book_append_sheet(wb,wsSummary,'Resumo');
            XLSX.utils.book_append_sheet(wb,wsDiag,'Diagnóstico');
            XLSX.writeFile(wb,`execution-log_${agName}_${ts}.xlsx`);
            showToast('XLSX exportado');
        },
    }
}
</script>
{% endblock %}
