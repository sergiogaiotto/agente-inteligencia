            </div>
        </div>
    </template>

    <!-- ═══════ ENDPOINT FORM MODAL ═══════ -->
    <template x-if="endpointFormOpen">
        <div class="fixed inset-0 z-[9990] flex items-center justify-center p-4">
            <div class="fixed inset-0 bg-black/40" @click="endpointFormOpen = false"></div>
            <div class="relative z-10 w-full max-w-lg rounded-2xl bg-white shadow-2xl border border-surface-200 overflow-hidden">
                <div class="flex items-center justify-between border-b border-surface-100 px-6 py-4">
                    <h3 class="text-[15px] font-bold text-brand-900" x-text="editingEndpointId ? 'Editar Endpoint' : 'Novo Endpoint'"></h3>
                    <button @click="endpointFormOpen = false" class="p-1.5 rounded-lg hover:bg-surface-100 text-surface-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                </div>
                <div class="px-6 py-5 space-y-4">
                    <!-- ═ Combobox Nome (com descoberta via OpenAPI) ═ -->
                    <div class="grid grid-cols-3 gap-3">
                        <div class="col-span-2 relative" x-data="{focused:false}">
                            <div class="flex items-center justify-between mb-1">
                                <label class="block text-[11px] font-semibold text-brand-900">Nome *</label>
                                <button @click="discoverEpSuggestions()" :disabled="epDiscovering" type="button"
                                        class="inline-flex items-center gap-1 rounded-md bg-gradient-to-r from-violet-50 to-fuchsia-50 border border-violet-200 px-2 py-0.5 text-[10px] font-medium text-violet-700 hover:from-violet-100 hover:to-fuchsia-100 disabled:opacity-50"
                                        :title="epDiscoveredEndpoints.length ? epDiscoveredEndpoints.length + ' endpoints descobertos' : 'Descobrir endpoints via OpenAPI'">
                                    <svg x-show="!epDiscovering" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
                                    <svg x-show="epDiscovering" class="animate-spin w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" opacity="0.3"/><path d="M22 12c0-5.523-4.477-10-10-10"/></svg>
                                    <span x-text="epDiscovering ? 'Descobrindo...' : (epDiscoveredEndpoints.length ? 'OpenAPI (' + epDiscoveredEndpoints.length + ')' : 'Descobrir')"></span>
                                </button>
                            </div>
                            <input x-model="epForm.name" @focus="focused=true" @blur="setTimeout(()=>focused=false,200)"
                                   placeholder="Digite ou escolha abaixo..."
                                   class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] outline-none focus:border-brand-400">
                            <!-- Dropdown de sugestões (filtradas pelo nome digitado) -->
                            <div x-show="focused && filteredEpSuggestions.length > 0" x-transition
                                 class="absolute left-0 right-0 top-full mt-1 rounded-lg bg-white border border-violet-200 shadow-xl z-30 py-1 max-h-64 overflow-y-auto">
                                <div class="px-2.5 py-1 text-[9px] font-bold text-violet-400 uppercase tracking-wider border-b border-surface-100 bg-violet-50/50">
                                    Endpoints encontrados no OpenAPI · <span x-text="filteredEpSuggestions.length"></span>
                                </div>
                                <template x-for="(ep, idx) in filteredEpSuggestions" :key="idx">
                                    <button @click="applyEpSuggestion(ep)" type="button"
                                            class="w-full flex items-center gap-2 px-2.5 py-1.5 text-left hover:bg-violet-50 transition-colors">
                                        <span class="font-mono rounded px-1.5 py-0.5 text-[9px] font-bold shrink-0" :class="methodColor(ep.method)" x-text="ep.method"></span>
                                        <div class="min-w-0 flex-1">
                                            <div class="text-[11px] font-semibold text-brand-900 truncate" x-text="ep.name"></div>
                                            <div class="text-[10px] font-mono text-surface-500 truncate" x-text="ep.path"></div>
                                        </div>
                                    </button>
                                </template>
                            </div>
                            <!-- Empty hint quando digitou mas não há match -->
                            <div x-show="focused && epForm.name && filteredEpSuggestions.length === 0 && epDiscoveredEndpoints.length > 0"
                                 class="absolute left-0 right-0 top-full mt-1 rounded-lg bg-white border border-surface-200 shadow-md z-30 px-3 py-2 text-[11px] text-surface-400">
                                Nenhum endpoint corresponde. Continue digitando para criar manualmente.
                            </div>
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1">Método</label>
                            <select x-model="epForm.method" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] font-bold font-mono outline-none">
                                <option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-brand-900 mb-1">Path *</label>
                        <input x-model="epForm.path" placeholder="/api/v1/users" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] font-mono outline-none focus:border-brand-400">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1">Categoria</label>
                            <input x-model="epForm.category" placeholder="geral" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] outline-none focus:border-brand-400">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1">Descricao</label>
                            <input x-model="epForm.description" placeholder="O que faz..." class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] outline-none focus:border-brand-400">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-brand-900 mb-1">Body de exemplo (JSON)</label>
                        <textarea x-model="epForm.sample_body" rows="4" placeholder="{}" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[12px] font-mono outline-none focus:border-brand-400 resize-none"></textarea>
                    </div>
                    <!-- ═ Resultado do teste ═ -->
                    <div x-show="epTestResult" x-transition class="rounded-lg border p-3 space-y-2"
                         :class="epTestResult?.ok ? 'border-emerald-200 bg-emerald-50' : 'border-rose-200 bg-rose-50'">
                        <div class="flex items-center gap-2 text-[11px]">
                            <span class="font-bold" :class="epTestResult?.ok ? 'text-emerald-700' : 'text-rose-700'"
                                  x-text="epTestResult?.ok ? '✓ Sucesso' : '✗ Falha'"></span>
                            <span class="rounded px-1.5 py-0.5 font-mono font-bold text-[10px]" :class="epTestResult?.ok ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'"
                                  x-text="'HTTP ' + (epTestResult?.status ?? '?')"></span>
                            <span class="text-surface-500" x-text="(epTestResult?.latency_ms ?? 0).toFixed(0) + ' ms'"></span>
                            <span x-show="epTestResult?.url" class="font-mono text-surface-400 text-[10px] truncate" x-text="epTestResult?.method + ' ' + epTestResult?.url"></span>
                            <button @click="epTestResult = null" type="button" class="ml-auto text-surface-400 hover:text-surface-700" title="Fechar resultado">✕</button>
                        </div>
                        <div x-show="epTestResult?.data || epTestResult?.error" class="rounded bg-white/60 px-2 py-1.5 font-mono text-[10px] text-brand-900 max-h-40 overflow-y-auto">
                            <pre x-text="epTestResult?.error ? JSON.stringify(epTestResult.error, null, 2) : JSON.stringify(epTestResult?.data, null, 2)"></pre>
                        </div>
                    </div>
                </div>
                <div class="border-t border-surface-100 px-6 py-4 flex items-center gap-3">
                    <!-- Test endpoint (chama /proxy com config atual) -->
                    <button @click="testEndpoint()" :disabled="epTesting || !epForm.path" type="button"
                            class="inline-flex items-center gap-1.5 rounded-lg border border-emerald-300 bg-emerald-50 px-3 py-2 text-[12px] font-semibold text-emerald-700 hover:bg-emerald-100 disabled:opacity-40">
                        <svg x-show="!epTesting" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25zm0 2.25h.008v6.75H12V10.5z"/></svg>
                        <svg x-show="epTesting" class="animate-spin w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" opacity="0.3"/><path d="M22 12c0-5.523-4.477-10-10-10"/></svg>
                        <span x-text="epTesting ? 'Testando...' : 'Testar'"></span>
                    </button>
                    <div class="flex-1"></div>
                    <button @click="endpointFormOpen = false" type="button" class="rounded-lg border border-surface-200 px-4 py-2 text-[13px] font-medium text-surface-500 hover:bg-surface-50">Cancelar</button>
                    <button @click="saveEndpoint()" :disabled="savingEp" class="rounded-lg bg-brand-500 px-5 py-2 text-[13px] font-semibold text-white hover:bg-brand-600 disabled:opacity-50">
                        <span x-text="savingEp ? 'Salvando...' : (editingEndpointId ? 'Atualizar' : 'Criar')"></span>
                    </button>
                </div>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function apiConnectorsPage() {
    return {
        tree: [], search: '', selected: null, selectedConnector: null,
        healthMap: {}, healthLatency: null, testing: false,
        reqMethod: 'GET', reqPath: '', reqBody: '{}', reqHeaders: '{}', showHeaders: false,
        executing: false, response: null,
        rightTab: 'connector', callHistory: [],
        // Connector form
        connectorFormOpen: false, editingConnectorId: null, savingConn: false,
        connForm: { name:'', base_url:'', description:'', icon:'AP', color:'bg-brand-500', api_key:'', auth_type:'none', auth_header:'X-API-Key', health_path:'/api/health', timeout_ms:30000 },
        // Test connection (pre-save)
        testingInline: false, testResult: null,
        // IA wizard (OpenAPI introspection)
        introspectOpen: false, introspecting: false, introspectUrl: '', introspectToken: '',
        introspectStatus: '', introspectResult: null, introspectPicks: {}, introspectImportAll: false,
        // Login helper (para auth_type=cookie)
        loginHelperOpen: false,
        loginHelper: { url: '', body: '{"login":"","password":""}', running: false, status: '', ok: false },
        // Endpoint form
        endpointFormOpen: false, editingEndpointId: null, editingConnIdForEp: null, savingEp: false,
        epForm: { name:'', method:'GET', path:'', description:'', category:'geral', sample_body:'{}' },
        // Endpoint discovery via OpenAPI
        epDiscovering: false, epDiscoveredEndpoints: [], epDiscoveredFromConnId: null,
        // Testar endpoint antes de salvar (PR #17)
        epTesting: false, epTestResult: null,

        // ── Connector detail view (quando connector selecionado sem endpoint) ──
        get connectorRegisteredEndpoints() {
            const node = this.selectedConnector;
            if (!node) return [];
            const fresh = this.tree.find(n => n.id === node.id);
            if (!fresh) return [];
            const out = [];
            for (const lst of Object.values(fresh.categories || {})) {
                out.push(...(lst || []));
            }
            return out.sort((a, b) => (a.method || '').localeCompare(b.method || '') || (a.path || '').localeCompare(b.path || ''));
        },
        // Descobertos no OpenAPI que ainda não têm correspondente cadastrado
        get connectorNotImportedEndpoints() {
            if (!this.selectedConnector || this.epDiscoveredFromConnId !== this.selectedConnector.id) return [];
            const key = (method, path) => `${(method||'').toUpperCase()}::${(path||'').trim()}`;
            const registeredKeys = new Set(this.connectorRegisteredEndpoints.map(e => key(e.method, e.path)));
            return (this.epDiscoveredEndpoints || []).filter(e => !registeredKeys.has(key(e.method, e.path)));
        },

        get filteredEpSuggestions() {
            const q = (this.epForm.name || '').toLowerCase().trim();
            const list = this.epDiscoveredEndpoints || [];
            if (!q) return list.slice(0, 50);
            return list.filter(e =>
                (e.name||'').toLowerCase().includes(q) ||
                (e.path||'').toLowerCase().includes(q) ||
                (e.method||'').toLowerCase().includes(q) ||
                (e.description||'').toLowerCase().includes(q)
            ).slice(0, 50);
        },
        // Tree state
        _openCats: {},
        get totalEndpoints() { return this.tree.reduce((s,n) => s + (n.endpoint_count||0), 0); },
        get filteredTree() {
            if (!this.search) return this.tree.map(n => ({...n, _open: n._open !== false}));
            const q = this.search.toLowerCase();
            return this.tree.map(n => {
                const filteredCats = {};
                for (const [cat, eps] of Object.entries(n.categories||{})) {
                    const f = eps.filter(e => e.name.toLowerCase().includes(q) || e.path.toLowerCase().includes(q));
                    if (f.length) filteredCats[cat] = f;
                }
                const count = Object.values(filteredCats).reduce((s,a) => s + a.length, 0);
                return count > 0 ? {...n, _open: true, categories: filteredCats, endpoint_count: count} : null;
            }).filter(Boolean);
        },
        filteredEndpoints(eps) {
            if (!this.search || !eps) return eps || [];
            const q = this.search.toLowerCase();
            return eps.filter(e => e.name.toLowerCase().includes(q) || e.path.toLowerCase().includes(q));
        },
        toggleCat(connId, cat) { const k = connId+':'+cat; this._openCats[k] = !this._openCats[k]; },
        isCatOpen(connId, cat) { const k = connId+':'+cat; return this._openCats[k] !== false && (this.search || this._openCats[k]); },
        methodColor(m) { return {'GET':'bg-emerald-100 text-emerald-700','POST':'bg-blue-100 text-blue-700','PUT':'bg-amber-100 text-amber-700','DELETE':'bg-rose-100 text-rose-700','PATCH':'bg-violet-100 text-violet-700'}[m] || 'bg-surface-100 text-surface-500'; },

        async load() {
            try {
                const d = await api.get('/api/v1/api-connectors/catalog/tree');
                this.tree = (d.tree||[]).map(n => ({...n, _open: false}));
            } catch {}
            try { const h = await api.get('/api/v1/api-connectors/health/all'); for (const [k,v] of Object.entries(h)) this.healthMap[k] = v.ok; } catch {}
        },

        selectEndpoint(ep, connNode) {
            this.selected = ep;
            this.selectedConnector = connNode;
            this.reqMethod = ep.method;
            this.reqPath = ep.path;
            this.reqBody = ep.sample_body || '{}';
            this.reqHeaders = ep.sample_headers || '{}';
            this.response = null;
            this.rightTab = 'connector';
            try { this.reqBody = JSON.stringify(JSON.parse(this.reqBody), null, 2); } catch {}
            try { this.reqHeaders = JSON.stringify(JSON.parse(this.reqHeaders), null, 2); } catch {}
            this.loadHistory();
        },

        async executeRequest() {
            this.executing = true; this.response = null;
            try {
                let body = null, headers = null;
                if (this.reqMethod !== 'GET' && this.reqMethod !== 'DELETE') {
                    try { body = JSON.parse(this.reqBody); } catch { showToast('JSON do body invalido', 'error'); this.executing = false; return; }
                }
                if (this.showHeaders && this.reqHeaders.trim() !== '{}') {
                    try { headers = JSON.parse(this.reqHeaders); } catch {}
                }
                this.response = await api.post('/api/v1/api-connectors/proxy', {
                    connector_id: this.selectedConnector.id,
                    method: this.reqMethod,
                    path: this.reqPath,
                    body, headers,
                    endpoint_id: this.selected?.id || '',
                });
            } catch(e) { this.response = { error: e.message, status: 500 }; }
            this.executing = false;
        },

        async testConnector() {
            if (!this.selectedConnector) return;
            this.testing = true; this.healthLatency = null;
            try {
                const r = await api.post('/api/v1/api-connectors/' + this.selectedConnector.id + '/test');
                this.healthMap[this.selectedConnector.id] = r.ok;
                this.healthLatency = r.latency_ms?.toFixed(0) || null;
                showToast(r.ok ? 'Conectado' : 'Falha: ' + (r.error||''), r.ok ? 'success' : 'error');
            } catch { this.healthMap[this.selectedConnector.id] = false; }
            this.testing = false;
        },

        async loadHistory() {
            if (!this.selectedConnector) return;
            try {
                const d = await api.get('/api/v1/api-connectors/history/calls?connector_id=' + this.selectedConnector.id + '&limit=20');
                this.callHistory = d.calls || [];
            } catch { this.callHistory = []; }
        },

        async toggleFav() {
            if (!this.selected || !this.selectedConnector) return;
            try {
                const r = await api.patch('/api/v1/api-connectors/' + this.selectedConnector.id + '/endpoints/' + this.selected.id + '/favorite');
                this.selected.is_favorite = r.is_favorite ? 1 : 0;
            } catch {}
        },

        async copyResponse() {
            try { await navigator.clipboard.writeText(JSON.stringify(this.response?.data || this.response?.error, null, 2)); showToast('Copiado'); } catch {}
        },

        // ── Connector CRUD ──
        openConnectorForm(conn) {
            if (conn) {
                this.editingConnectorId = conn.id;
                this.connForm = { name: conn.name, base_url: conn.base_url, description: conn.description||'', icon: conn.icon||'AP', color: conn.color||'bg-brand-500', api_key: conn.api_key||'', auth_type: conn.auth_type||'none', auth_header: conn.auth_header||'X-API-Key', health_path: conn.health_path||'/api/health', timeout_ms: conn.timeout_ms||30000 };
            } else {
                this.editingConnectorId = null;
                this.connForm = { name:'', base_url:'', description:'', icon:'AP', color:'bg-brand-500', api_key:'', auth_type:'none', auth_header:'X-API-Key', health_path:'/api/health', timeout_ms:30000 };
            }
            // reset wizard + test state
            this.testResult = null; this.testingInline = false;
            this.introspectOpen = false; this.introspectUrl = ''; this.introspectToken = '';
            this.introspectResult = null; this.introspectPicks = {}; this.introspectStatus = '';
            this.connectorFormOpen = true;
        },

        // ── Test inline (pre-save) ──
        async testInline() {
            if (!this.connForm.base_url.trim()) { showToast('Preencha a base_url', 'error'); return; }
            this.testingInline = true; this.testResult = null;
            try {
                const r = await api.post('/api/v1/api-connectors/test-inline', {
                    base_url: this.connForm.base_url,
                    auth_type: this.connForm.auth_type,
                    auth_header: this.connForm.auth_header,
                    api_key: this.connForm.api_key,
                    health_path: this.connForm.health_path,
                    timeout_ms: this.connForm.timeout_ms,
                });
                this.testResult = r;
                showToast(r.ok ? 'Conectado (' + r.latency_ms + 'ms)' : 'Falha HTTP ' + r.status, r.ok ? 'success' : 'error');
            } catch(e) {
                this.testResult = { ok: false, status: 0, error: e.message };
                showToast('Erro: ' + e.message, 'error');
            }
            this.testingInline = false;
        },

        // ── IA wizard — introspect OpenAPI ──
        async runIntrospect() {
            const url = (this.introspectUrl || '').trim();
            if (!url) return;
            this.introspecting = true; this.introspectStatus = 'Buscando openapi.json...'; this.introspectResult = null;
            try {
                const r = await api.post('/api/v1/api-connectors/introspect', {
                    url, bearer_token: this.introspectToken || '',
                });
                this.introspectResult = r;
                if (r.found) {
                    this.introspectStatus = '✓ Encontrado';
                    // pre-select first 10 endpoints
                    const picks = {};
                    (r.endpoints || []).slice(0, 10).forEach((_, i) => picks[i] = true);
                    this.introspectPicks = picks;
                } else {
                    this.introspectStatus = '⚠ Não encontrado';
                }
            } catch(e) {
                this.introspectStatus = 'Erro: ' + e.message;
                showToast(e.message, 'error');
            }
            this.introspecting = false;
        },

        async runLoginHelper() {
            let body;
            try { body = JSON.parse(this.loginHelper.body); }
            catch(e) { this.loginHelper.status = 'JSON do body inválido'; this.loginHelper.ok = false; return; }
            this.loginHelper.running = true; this.loginHelper.status = 'Fazendo login...'; this.loginHelper.ok = false;
            try {
                const r = await api.post('/api/v1/api-connectors/extract-cookie', {
                    login_url: this.loginHelper.url.trim(),
                    login_body: body,
                    cookie_name: this.connForm.auth_header || '',
                });
                if (r.ok) {
                    this.connForm.auth_header = r.cookie_name;
                    this.connForm.api_key = r.cookie_value;
                    this.loginHelper.status = '✓ Cookie "' + r.cookie_name + '" extraído e colado';
                    this.loginHelper.ok = true;
                    showToast('Cookie extraído com sucesso');
                } else {
                    this.loginHelper.status = '✗ ' + (r.error || 'falha no login');
                    this.loginHelper.ok = false;
                    if (r.available_cookies?.length) {
                        this.loginHelper.status += ' (disponíveis: ' + r.available_cookies.join(', ') + ')';
                    }
                }
            } catch(e) {
                this.loginHelper.status = '✗ ' + e.message;
                this.loginHelper.ok = false;
            }
            this.loginHelper.running = false;
        },

        applyIntrospect() {
            const r = this.introspectResult;
            if (!r || !r.found) return;
            const p = r.proposal || {};
            // preenche só campos que o usuário ainda não alterou
            this.connForm.name = this.connForm.name || p.name || '';
            this.connForm.base_url = p.base_url || this.connForm.base_url;
            this.connForm.description = this.connForm.description || p.description || '';
            this.connForm.icon = p.icon || this.connForm.icon;
            this.connForm.color = p.color || this.connForm.color;
            this.connForm.auth_type = p.auth_type || this.connForm.auth_type;
            this.connForm.auth_header = p.auth_header || this.connForm.auth_header;
            this.connForm.health_path = p.health_path || this.connForm.health_path;
            this.connForm.timeout_ms = p.timeout_ms || this.connForm.timeout_ms;
            showToast('Campos preenchidos. Revise e salve.');
            this.introspectOpen = false;
        },

        // Selected endpoints queued for import after save
        get _pendingEndpointsToImport() {
            if (!this.introspectResult?.endpoints) return [];
            return this.introspectResult.endpoints.filter((_, i) => this.introspectImportAll || this.introspectPicks[i]);
        },

        async saveConnector() {
            if (!this.connForm.name.trim() || !this.connForm.base_url.trim()) { showToast('Nome e URL obrigatorios', 'error'); return; }
            this.savingConn = true;
            try {
                let connectorId = this.editingConnectorId;
                if (connectorId) {
                    await api.put('/api/v1/api-connectors/' + connectorId, this.connForm);
                    showToast('Conector atualizado');
                } else {
                    const res = await api.post('/api/v1/api-connectors', this.connForm);
                    connectorId = res.id;
                    showToast('Conector criado');
                }
                // Auto-import endpoints discovered via wizard (se houver)
                const pending = this._pendingEndpointsToImport;
                if (pending.length && connectorId) {
                    let imported = 0;
                    for (const ep of pending) {
                        try {
                            await api.post('/api/v1/api-connectors/' + connectorId + '/endpoints', {
                                name: ep.name, method: ep.method, path: ep.path,
                                description: ep.description || '', category: ep.category || 'geral',
                                sample_body: ep.sample_body || '{}',
                            });
                            imported++;
                        } catch {}
                    }
                    if (imported) showToast(imported + ' endpoint(s) importado(s)');
                }
                this.connectorFormOpen = false; await this.load();
            } catch(e) { showToast(e.message, 'error'); }
            this.savingConn = false;
        },
        async deleteConnector() {
            if (!this.selectedConnector) return;
            return this.deleteConnectorById(this.selectedConnector.id);
        },

        async deleteConnectorById(connId) {
            const node = this.tree.find(n => n.id === connId);
            if (!node) return;
            if (!confirm('Excluir conector "' + node.name + '" e todos seus endpoints?')) return;
            try {
                await api.del('/api/v1/api-connectors/' + connId);
                // Limpa seleção se o deletado era o selecionado
                if (this.selectedConnector?.id === connId) { this.selected = null; this.selectedConnector = null; }
                if (this.epDiscoveredFromConnId === connId) { this.epDiscoveredEndpoints = []; this.epDiscoveredFromConnId = null; }
                await this.load();
                showToast('Conector removido');
            } catch(e) { showToast('Erro: ' + e.message, 'error'); }
        },

        async deleteEndpointById(connId, ep) {
            if (!confirm('Excluir endpoint "' + ep.name + '"?')) return;
            try {
                await api.del('/api/v1/api-connectors/' + connId + '/endpoints/' + ep.id);
                if (this.selected?.id === ep.id) this.selected = null;
                await this.load();
                showToast('Endpoint removido');
            } catch(e) { showToast('Erro: ' + e.message, 'error'); }
        },

        // ── Connector detail view actions ──
        selectConnectorOnly(node) {
            this.selectedConnector = node;
            this.selected = null;
            this.response = null;
            this.rightTab = 'connector';
            // abre se estiver fechado
            if (!node._open) node._open = true;
        },

        async discoverForCurrentConnector() {
            const conn = this.selectedConnector;
            if (!conn) return;
            if (!conn.base_url) { showToast('Connector sem base_url', 'error'); return; }
            this.epDiscovering = true;
            try {
                // Passa connector_id → backend usa _build_auth_headers e suporta
                // cookie/bearer/api_key/basic nativamente (sem depender do frontend
                // saber qual header montar).
                const r = await api.post('/api/v1/api-connectors/introspect', {
                    url: conn.base_url, connector_id: conn.id, max_endpoints: 100,
                });
                if (r.found) {
                    this.epDiscoveredEndpoints = r.endpoints || [];
                    this.epDiscoveredFromConnId = conn.id;
                    const notImported = this.connectorNotImportedEndpoints.length;
                    showToast(r.endpoints.length + ' descoberto(s), ' + notImported + ' não cadastrado(s)');
                } else {
                    this.epDiscoveredEndpoints = [];
                    this.epDiscoveredFromConnId = conn.id; // marca como tentado
                    showToast(r.hint || 'OpenAPI não encontrado', 'error');
                }
            } catch(e) {
                showToast('Erro: ' + e.message, 'error');
            }
            this.epDiscovering = false;
        },

        async importDiscovered(ep) {
            const connId = this.selectedConnector?.id;
            if (!connId) return;
            try {
                await api.post('/api/v1/api-connectors/' + connId + '/endpoints', {
                    name: ep.name, method: ep.method, path: ep.path,
                    description: ep.description || '', category: ep.category || 'geral',
                    sample_body: ep.sample_body || '{}',
                });
                await this.load();
                // mantém selectedConnector apontando para o node atualizado
                const refreshed = this.tree.find(n => n.id === connId);
                if (refreshed) this.selectedConnector = refreshed;
                showToast('Endpoint "' + ep.name + '" importado');
            } catch(e) { showToast('Erro: ' + e.message, 'error'); }
        },

        async tryOutDiscovered(ep) {
            // Executa sem cadastrar — usa /proxy direto
            const connId = this.selectedConnector?.id;
            if (!connId) return;
            const method = (ep.method || 'GET').toUpperCase();
            let body = null;
            if (!['GET','HEAD','DELETE'].includes(method) && ep.sample_body) {
                try { body = JSON.parse(ep.sample_body); } catch { body = null; }
            }
            // Pré-popula playground e seleciona o endpoint descoberto como "virtual"
            this.selected = {
                id: 'discovered:' + ep.method + ':' + ep.path,
                name: ep.name, method, path: ep.path,
                description: ep.description || '',
                sample_body: ep.sample_body || '{}',
                sample_headers: '{}',
                is_favorite: 0,
            };
            this.reqMethod = method;
            this.reqPath = ep.path;
            this.reqBody = ep.sample_body || '{}';
            this.reqHeaders = '{}';
            this.response = null;
            try { this.reqBody = JSON.stringify(JSON.parse(this.reqBody), null, 2); } catch {}
            showToast('Pronto para executar (não cadastrado)');
        },

        // ── Endpoint CRUD ──
        openEndpointForm(connId, ep) {
            this.editingConnIdForEp = connId;
            if (ep) {
                this.editingEndpointId = ep.id;
                this.epForm = { name: ep.name, method: ep.method, path: ep.path, description: ep.description||'', category: ep.category||'geral', sample_body: ep.sample_body||'{}' };
            } else {
                this.editingEndpointId = null;
                this.epForm = { name:'', method:'GET', path:'', description:'', category:'geral', sample_body:'{}' };
            }
            // Reset discovery state só se trocou de connector
            if (this.epDiscoveredFromConnId !== connId) {
                this.epDiscoveredEndpoints = [];
                this.epDiscoveredFromConnId = null;
            }
            // Reset do resultado de teste anterior
            this.epTestResult = null;
            this.epTesting = false;
            this.endpointFormOpen = true;
        },

        // ── Testar endpoint (chama /proxy com config atual do form) ──
        async testEndpoint() {
            const connId = this.editingConnIdForEp;
            if (!connId) { showToast('Connector não identificado', 'error'); return; }
            if (!this.epForm.path.trim()) { showToast('Path obrigatório', 'error'); return; }
            const method = (this.epForm.method || 'GET').toUpperCase();
            const needsBody = !['GET', 'HEAD', 'DELETE'].includes(method);
            let body = null;
            if (needsBody && this.epForm.sample_body && this.epForm.sample_body.trim() !== '{}') {
                try { body = JSON.parse(this.epForm.sample_body); }
                catch { showToast('Body JSON inválido', 'error'); return; }
                // Aviso amigável se tiver template Jinja não resolvido
                const raw = this.epForm.sample_body;
                const tplMarker = '{' + '{';  // evita Jinja processar aqui no server
                if (raw.includes(tplMarker)) {
                    showToast('Atenção: body tem placeholders de template — substitua por valores reais para testar', 'info');
                }
            }
            this.epTesting = true; this.epTestResult = null;
            try {
                const r = await api.post('/api/v1/api-connectors/proxy', {
                    connector_id: connId,
                    method, path: this.epForm.path, body, headers: null, endpoint_id: '',
                });
                const ok = r.status >= 200 && r.status < 300;
                this.epTestResult = {
                    ok, status: r.status, latency_ms: r.latency_ms || 0,
                    method: r.method || method, url: r.url || '',
                    data: ok ? r.data : null,
                    error: ok ? null : (r.error || r.data || null),
                };
                showToast(ok ? 'HTTP ' + r.status + ' em ' + (r.latency_ms || 0).toFixed(0) + 'ms' : 'Falha ' + r.status,
                         ok ? 'success' : 'error');
            } catch(e) {
                this.epTestResult = { ok: false, status: 0, latency_ms: 0, error: e.message };
                showToast('Erro: ' + e.message, 'error');
            }
            this.epTesting = false;
        },

        // ── Discovery: chama /introspect e popula as sugestões ──
        async discoverEpSuggestions() {
            const connId = this.editingConnIdForEp;
            if (!connId) return;
            const node = this.tree.find(n => n.id === connId);
            const baseUrl = node?.base_url;
            if (!baseUrl) { showToast('Connector sem base_url — não dá pra descobrir', 'error'); return; }
            this.epDiscovering = true;
            try {
                // Passa connector_id → backend injeta auth do connector automaticamente
                // (cookie, bearer, api_key, basic — tudo suportado).
                const r = await api.post('/api/v1/api-connectors/introspect', {
                    url: baseUrl, connector_id: connId, max_endpoints: 100,
                });
                if (r.found) {
                    this.epDiscoveredEndpoints = r.endpoints || [];
                    this.epDiscoveredFromConnId = connId;
                    showToast(this.epDiscoveredEndpoints.length + ' endpoint(s) descoberto(s)');
                } else {
                    this.epDiscoveredEndpoints = [];
                    showToast(r.hint || 'OpenAPI não encontrado nessa URL', 'error');
                }
            } catch(e) {
                this.epDiscoveredEndpoints = [];
                showToast('Erro: ' + e.message, 'error');
            }
            this.epDiscovering = false;
        },

        applyEpSuggestion(ep) {
            this.epForm.name = ep.name || this.epForm.name;
            this.epForm.method = (ep.method || 'GET').toUpperCase();
            this.epForm.path = ep.path || '';
            this.epForm.description = ep.description || this.epForm.description;
            this.epForm.category = ep.category || this.epForm.category || 'geral';
            // sample_body: só sobrescreve se vier algo útil
            if (ep.sample_body && ep.sample_body !== '{}') {
                this.epForm.sample_body = ep.sample_body;
            }
            showToast('Campos preenchidos de "' + (ep.name || ep.path) + '"');
        },
        async saveEndpoint() {
            if (!this.epForm.name.trim() || !this.epForm.path.trim()) { showToast('Nome e path obrigatorios', 'error'); return; }
            this.savingEp = true;
            try {
                if (this.editingEndpointId) { await api.put('/api/v1/api-connectors/' + this.editingConnIdForEp + '/endpoints/' + this.editingEndpointId, this.epForm); showToast('Endpoint atualizado'); }
                else { await api.post('/api/v1/api-connectors/' + this.editingConnIdForEp + '/endpoints', this.epForm); showToast('Endpoint criado'); }
                this.endpointFormOpen = false; await this.load();
            } catch(e) { showToast(e.message, 'error'); }
            this.savingEp = false;
        },
        async deleteEndpoint() {
            if (!this.selected || !this.selectedConnector || !confirm('Excluir endpoint "' + this.selected.name + '"?')) return;
            try { await api.del('/api/v1/api-connectors/' + this.selectedConnector.id + '/endpoints/' + this.selected.id); this.selected = null; await this.load(); showToast('Endpoint removido'); } catch { showToast('Erro', 'error'); }
        },
    }
}
</script>
{% endblock %}
