{% extends "layouts/base.html" %}

{% block content %}
<div x-data="apiConnectorsPage()" x-init="load()" class="flex gap-0 -m-4 lg:-m-6 h-[calc(100vh-3.5rem)]">

    <!-- ═══════ LEFT: Tree View ═══════ -->
    <div class="w-72 flex flex-col border-r border-surface-200 bg-white shrink-0">
        <div class="border-b border-surface-100 px-4 py-3">
            <div class="flex items-center justify-between">
                <h2 class="text-[14px] font-bold text-brand-900">API Connectors</h2>
                <button @click="openConnectorForm(null)" class="rounded-md bg-brand-50 p-1.5 text-brand-600 hover:bg-brand-100 transition-colors" title="Novo Conector">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                </button>
            </div>
            <p class="text-[10px] text-surface-400 mt-0.5" x-text="tree.length + ' conector(es) · ' + totalEndpoints + ' endpoints'"></p>
        </div>
        <!-- Search -->
        <div class="px-3 py-2 border-b border-surface-50">
            <input x-model="search" type="text" placeholder="Filtrar endpoints..."
                   class="w-full rounded-lg border border-surface-200 bg-surface-50 px-3 py-2 text-[12px] text-brand-900 placeholder:text-surface-300 outline-none focus:border-brand-400">
        </div>
        <!-- Tree -->
        <div class="flex-1 overflow-y-auto scrollbar-thin py-2 px-1">
            <template x-for="node in filteredTree" :key="node.id">
                <div class="mb-1">
                    <!-- Connector node -->
                    <div class="group flex items-center gap-2 px-2.5 py-2 rounded-xl transition-colors"
                         :class="selectedConnector?.id === node.id && !selected ? 'bg-brand-50 border border-brand-200' : 'hover:bg-surface-50'">
                        <button @click.stop="node._open = !node._open" type="button" class="shrink-0 p-0.5 rounded hover:bg-surface-100" title="Expandir">
                            <svg class="w-3.5 h-3.5 text-surface-400 transition-transform duration-150" :class="node._open ? 'rotate-90' : ''" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                        </button>
                        <button @click="selectConnectorOnly(node)" type="button" class="flex items-center gap-2 flex-1 min-w-0 text-left" title="Ver detalhes">
                            <div class="flex h-6 w-6 items-center justify-center rounded-lg text-[8px] font-bold text-white shrink-0" :class="node.color" x-text="node.icon"></div>
                            <span class="text-[12px] font-bold text-brand-900 truncate flex-1" x-text="node.name"></span>
                            <span class="rounded-full bg-surface-100 px-1.5 py-0.5 text-[9px] font-semibold text-surface-400 shrink-0" x-text="node.endpoint_count"></span>
                            <span class="h-2 w-2 rounded-full shrink-0" :class="healthMap[node.id] ? 'bg-emerald-400' : 'bg-surface-300'"></span>
                        </button>
                        <!-- Context menu ⋮ -->
                        <div class="relative shrink-0" x-data="{menuOpen:false}">
                            <button @click.stop="menuOpen=!menuOpen" type="button" class="p-1 rounded text-surface-400 hover:bg-surface-100 hover:text-brand-600 opacity-0 group-hover:opacity-100 transition-opacity" title="Ações">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 6.75a.75.75 0 110-1.5.75.75 0 010 1.5zm0 6a.75.75 0 110-1.5.75.75 0 010 1.5zm0 6a.75.75 0 110-1.5.75.75 0 010 1.5z"/></svg>
                            </button>
                            <div x-show="menuOpen" @click.away="menuOpen=false" x-transition
                                 class="absolute right-0 top-full mt-0.5 w-36 rounded-lg bg-white border border-surface-200 shadow-lg z-40 py-1">
                                <button @click="selectConnectorOnly(node); menuOpen=false" type="button" class="w-full flex items-center gap-2 px-3 py-1.5 text-left text-[11px] text-brand-900 hover:bg-surface-50">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    Ver detalhes
                                </button>
                                <button @click="openConnectorForm(node); menuOpen=false" type="button" class="w-full flex items-center gap-2 px-3 py-1.5 text-left text-[11px] text-brand-900 hover:bg-surface-50">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
                                    Editar
                                </button>
                                <button @click="openEndpointForm(node.id, null); menuOpen=false" type="button" class="w-full flex items-center gap-2 px-3 py-1.5 text-left text-[11px] text-brand-900 hover:bg-surface-50">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                                    Novo endpoint
                                </button>
                                <div class="border-t border-surface-100 my-1"></div>
                                <button @click="deleteConnectorById(node.id); menuOpen=false" type="button" class="w-full flex items-center gap-2 px-3 py-1.5 text-left text-[11px] text-rose-600 hover:bg-rose-50">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79"/></svg>
                                    Excluir
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- Categories -->
                    <div x-show="node._open" x-transition.duration.150ms class="ml-5 border-l border-surface-200 pl-1">
                        <template x-for="catName in Object.keys(node.categories).sort()" :key="catName">
                            <div class="mb-0.5">
                                <button @click="toggleCat(node.id, catName)" class="w-full flex items-center gap-2 px-2.5 py-1.5 rounded-lg hover:bg-surface-50 transition-colors text-left">
                                    <svg class="w-3 h-3 text-surface-300 transition-transform duration-150 shrink-0" :class="isCatOpen(node.id, catName) ? 'rotate-90' : ''" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                                    <span class="text-[11px] font-semibold text-surface-600 capitalize" x-text="catName"></span>
                                    <span class="ml-auto text-[9px] text-surface-300" x-text="filteredEndpoints(node.categories[catName]).length"></span>
                                </button>
                                <div x-show="isCatOpen(node.id, catName)" x-transition.duration.100ms class="ml-4 space-y-0.5 py-0.5">
                                    <template x-for="ep in filteredEndpoints(node.categories[catName])" :key="ep.id">
                                        <button @click="selectEndpoint(ep, node)" class="w-full text-left rounded-lg px-2.5 py-2 transition-all"
                                                :class="selected?.id === ep.id ? 'bg-brand-50 border border-brand-200' : 'hover:bg-surface-50'">
                                            <div class="flex items-center gap-1.5">
                                                <span class="rounded px-1 py-0.5 text-[8px] font-bold font-mono shrink-0" :class="methodColor(ep.method)" x-text="ep.method"></span>
                                                <span class="text-[10px] font-medium text-brand-800 truncate" x-text="ep.name"></span>
                                                <svg x-show="ep.is_favorite" class="w-3 h-3 text-amber-400 shrink-0 ml-auto" fill="currentColor" viewBox="0 0 24 24"><path d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                                            </div>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <!-- Add endpoint inside connector -->
                        <button @click="openEndpointForm(node.id, null)" class="w-full flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[10px] text-brand-500 hover:bg-brand-50 transition-colors mt-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                            Novo Endpoint
                        </button>
                    </div>
                </div>
            </template>
            <template x-if="tree.length === 0">
                <div class="px-4 py-8 text-center">
                    <svg class="w-10 h-10 text-surface-200 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m9.07-9.07l4.5-4.5a4.5 4.5 0 016.364 6.364l-1.757 1.757"/></svg>
                    <p class="text-[12px] text-surface-400">Registre APIs externas para seus agentes</p>
                    <button @click="openConnectorForm(null)" class="mt-3 rounded-lg bg-brand-500 px-4 py-2 text-[12px] font-semibold text-white hover:bg-brand-600 transition-colors">Novo Conector</button>
                </div>
            </template>
        </div>
    </div>

    <!-- ═══════ CENTER: Request Builder / Connector Detail ═══════ -->
    <div class="flex flex-1 flex-col min-w-0 bg-surface-50">
        <!-- Empty state -->
        <template x-if="!selected && !selectedConnector">
            <div class="flex-1 flex items-center justify-center text-center p-8">
                <div>
                    <div class="flex items-center justify-center gap-3 mb-5 flex-wrap">
                        <template x-for="n in tree.slice(0,5)" :key="n.id">
                            <div class="h-11 w-11 rounded-2xl flex items-center justify-center text-[13px] font-bold text-white" :class="n.color" x-text="n.icon"></div>
                        </template>
                    </div>
                    <p class="text-[14px] font-semibold text-brand-800">Clique em um conector para ver detalhes</p>
                    <p class="text-[12px] text-surface-400 mt-1">ou registre um novo conector de API</p>
                </div>
            </div>
        </template>

        <!-- ═ Connector detail view (quando connector selecionado sem endpoint) ═ -->
        <template x-if="selectedConnector && !selected">
            <div class="flex-1 flex flex-col overflow-hidden">
                <!-- Header -->
                <div class="border-b border-surface-200 bg-white px-6 py-4">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="flex h-10 w-10 items-center justify-center rounded-xl text-[13px] font-bold text-white shrink-0" :class="selectedConnector.color" x-text="selectedConnector.icon"></div>
                        <div class="min-w-0 flex-1">
                            <h3 class="text-[15px] font-bold text-brand-900 truncate" x-text="selectedConnector.name"></h3>
                            <div class="text-[11px] font-mono text-surface-500 truncate" x-text="selectedConnector.base_url"></div>
                        </div>
                        <span class="h-2.5 w-2.5 rounded-full shrink-0" :class="healthMap[selectedConnector.id] ? 'bg-emerald-400' : healthMap[selectedConnector.id] === false ? 'bg-rose-400' : 'bg-surface-300'"></span>
                        <button @click="testConnector()" :disabled="testing" type="button" class="rounded-lg border border-emerald-200 bg-emerald-50 px-2.5 py-1 text-[11px] font-medium text-emerald-700 hover:bg-emerald-100 disabled:opacity-50" title="Testar conexão">
                            <span x-text="testing ? '...' : '🧪 Testar'"></span>
                        </button>
                        <button @click="openConnectorForm(selectedConnector)" type="button" class="rounded-lg border border-surface-200 px-2.5 py-1 text-[11px] font-medium text-brand-700 hover:bg-surface-50" title="Editar conector">
                            ✏️ Editar
                        </button>
                        <button @click="deleteConnectorById(selectedConnector.id)" type="button" class="rounded-lg border border-rose-200 px-2.5 py-1 text-[11px] font-medium text-rose-600 hover:bg-rose-50" title="Excluir conector">
                            🗑️ Excluir
                        </button>
                    </div>
                    <!-- Config summary -->
                    <div class="flex flex-wrap items-center gap-x-4 gap-y-1 text-[10px] text-surface-500">
                        <span>auth: <strong class="font-mono text-brand-900" x-text="selectedConnector.auth_type || 'none'"></strong></span>
                        <span x-show="selectedConnector.auth_type !== 'none'">header: <strong class="font-mono text-brand-900" x-text="selectedConnector.auth_header || '—'"></strong></span>
                        <span x-show="selectedConnector.api_key">token: <strong class="font-mono text-brand-900">••••<span x-text="selectedConnector.api_key?.slice(-4)"></span></strong></span>
                        <span>timeout: <strong class="font-mono text-brand-900" x-text="(selectedConnector.timeout_ms || 30000) + 'ms'"></strong></span>
                        <span>health: <strong class="font-mono text-brand-900" x-text="selectedConnector.health_path || '/api/health'"></strong></span>
                    </div>
                </div>
                <!-- Body com endpoints -->
                <div class="flex-1 overflow-y-auto scrollbar-thin p-6 space-y-6">
                    <!-- ═ Seção: Endpoints cadastrados ═ -->
                    <section>
                        <div class="flex items-center justify-between mb-2">
                            <h4 class="text-[11px] font-bold text-brand-900 uppercase tracking-wider">
                                Endpoints cadastrados
                                <span class="ml-1 rounded-full bg-brand-100 text-brand-700 px-1.5 py-0.5 text-[9px]" x-text="connectorRegisteredEndpoints.length"></span>
                            </h4>
                            <button @click="openEndpointForm(selectedConnector.id, null)" type="button" class="inline-flex items-center gap-1 rounded-md bg-brand-500 px-2.5 py-1 text-[11px] font-semibold text-white hover:bg-brand-600">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                                Novo endpoint
                            </button>
                        </div>
                        <template x-if="connectorRegisteredEndpoints.length === 0">
                            <div class="rounded-lg border border-dashed border-surface-200 bg-white p-6 text-center">
                                <p class="text-[11px] text-surface-400">Nenhum endpoint cadastrado ainda.</p>
                                <p class="text-[10px] text-surface-400 mt-1">Use "Novo endpoint" acima ou descubra via OpenAPI abaixo.</p>
                            </div>
                        </template>
                        <div class="space-y-2">
                            <template x-for="ep in connectorRegisteredEndpoints" :key="ep.id">
                                <div class="rounded-lg border border-surface-200 bg-white p-3 hover:border-brand-200 transition-colors">
                                    <div class="flex items-start gap-2">
                                        <span class="rounded px-1.5 py-0.5 text-[9px] font-bold font-mono shrink-0 mt-0.5" :class="methodColor(ep.method)" x-text="ep.method"></span>
                                        <div class="min-w-0 flex-1">
                                            <div class="flex items-center gap-1.5">
                                                <span class="text-[12px] font-semibold text-brand-900 truncate" x-text="ep.name"></span>
                                                <svg x-show="ep.is_favorite" class="w-3 h-3 text-amber-400 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                                            </div>
                                            <div class="text-[10px] font-mono text-surface-500 truncate" x-text="ep.path"></div>
                                            <p x-show="ep.description" class="text-[10px] text-surface-600 mt-1" x-text="ep.description"></p>
                                        </div>
                                        <div class="flex items-center gap-0.5 shrink-0">
                                            <button @click="selectEndpoint(ep, selectedConnector)" type="button" class="inline-flex items-center gap-1 rounded-md bg-brand-500 px-2 py-1 text-[10px] font-semibold text-white hover:bg-brand-600" title="Abrir no Playground">
                                                ▶ Try-out
                                            </button>
                                            <button @click="openEndpointForm(selectedConnector.id, ep)" type="button" class="p-1 rounded text-surface-400 hover:bg-surface-100 hover:text-brand-600" title="Editar">
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
                                            </button>
                                            <button @click="deleteEndpointById(selectedConnector.id, ep)" type="button" class="p-1 rounded text-surface-400 hover:bg-rose-50 hover:text-rose-600" title="Excluir">
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </section>

                    <!-- ═ Seção: Descobertos via OpenAPI ═ -->
                    <section>
                        <div class="flex items-center justify-between mb-2">
                            <h4 class="text-[11px] font-bold text-brand-900 uppercase tracking-wider">
                                Descobertos no OpenAPI
                                <span x-show="connectorNotImportedEndpoints.length" class="ml-1 rounded-full bg-violet-100 text-violet-700 px-1.5 py-0.5 text-[9px]" x-text="connectorNotImportedEndpoints.length"></span>
                            </h4>
                            <button @click="discoverForCurrentConnector()" :disabled="epDiscovering" type="button" class="inline-flex items-center gap-1 rounded-md bg-gradient-to-r from-violet-50 to-fuchsia-50 border border-violet-200 px-2.5 py-1 text-[11px] font-medium text-violet-700 hover:from-violet-100 hover:to-fuchsia-100 disabled:opacity-50">
                                <svg x-show="!epDiscovering" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
                                <svg x-show="epDiscovering" class="animate-spin w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" opacity="0.3"/><path d="M22 12c0-5.523-4.477-10-10-10"/></svg>
                                <span x-text="epDiscovering ? 'Descobrindo...' : (epDiscoveredFromConnId === selectedConnector.id ? 'Recarregar' : 'Descobrir')"></span>
                            </button>
                        </div>
                        <template x-if="epDiscoveredFromConnId !== selectedConnector.id">
                            <div class="rounded-lg border border-dashed border-violet-200 bg-violet-50/30 p-4 text-center">
                                <p class="text-[11px] text-violet-700">Clique em "Descobrir" para listar os endpoints expostos pelo OpenAPI desta API.</p>
                            </div>
                        </template>
                        <template x-if="epDiscoveredFromConnId === selectedConnector.id && connectorNotImportedEndpoints.length === 0 && epDiscoveredEndpoints.length > 0">
                            <div class="rounded-lg border border-emerald-200 bg-emerald-50 p-3 text-center">
                                <p class="text-[11px] text-emerald-700">✓ Todos os endpoints descobertos já estão cadastrados.</p>
                            </div>
                        </template>
                        <div x-show="epDiscoveredFromConnId === selectedConnector.id" class="space-y-2">
                            <template x-for="(ep, idx) in connectorNotImportedEndpoints" :key="idx">
                                <div class="rounded-lg border border-violet-200 bg-white p-3 hover:border-violet-400 transition-colors">
                                    <div class="flex items-start gap-2">
                                        <span class="rounded px-1.5 py-0.5 text-[9px] font-bold font-mono shrink-0 mt-0.5" :class="methodColor(ep.method)" x-text="ep.method"></span>
                                        <div class="min-w-0 flex-1">
                                            <div class="text-[12px] font-semibold text-brand-900 truncate" x-text="ep.name"></div>
                                            <div class="text-[10px] font-mono text-violet-600 truncate" x-text="ep.path"></div>
                                            <p x-show="ep.description" class="text-[10px] text-surface-600 mt-1 line-clamp-2" x-text="ep.description"></p>
                                        </div>
                                        <div class="flex items-center gap-0.5 shrink-0">
                                            <button @click="tryOutDiscovered(ep)" type="button" class="inline-flex items-center gap-1 rounded-md border border-brand-200 bg-white px-2 py-1 text-[10px] font-semibold text-brand-700 hover:bg-brand-50" title="Testar sem cadastrar">
                                                ▶ Try-out
                                            </button>
                                            <button @click="importDiscovered(ep)" type="button" class="inline-flex items-center gap-1 rounded-md bg-violet-600 px-2 py-1 text-[10px] font-semibold text-white hover:bg-violet-700" title="Criar endpoint">
                                                + Importar
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </section>
                </div>
            </div>
        </template>

        <!-- Selected endpoint -->
        <template x-if="selected">
            <div class="flex-1 flex flex-col overflow-hidden">
                <!-- Header -->
                <div class="border-b border-surface-200 bg-white px-6 py-4">
                    <div class="flex items-center gap-3 mb-1.5">
                        <span class="rounded-lg px-2 py-0.5 text-[10px] font-bold text-white" :class="selectedConnector?.color || 'bg-brand-500'" x-text="selectedConnector?.icon || '??'"></span>
                        <span class="rounded-lg px-2.5 py-1 text-[11px] font-bold font-mono" :class="methodColor(selected.method)" x-text="selected.method"></span>
                        <h3 class="text-[15px] font-bold text-brand-900" x-text="selected.name"></h3>
                        <div class="flex-1"></div>
                        <button @click="toggleFav()" class="p-1.5 rounded-lg hover:bg-amber-50 transition-colors" :class="selected.is_favorite ? 'text-amber-400' : 'text-surface-300'">
                            <svg class="w-4 h-4" :fill="selected.is_favorite ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                        </button>
                        <button @click="openEndpointForm(selectedConnector?.id, selected)" class="p-1.5 rounded-lg text-surface-400 hover:bg-surface-100 hover:text-brand-600" title="Editar endpoint">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
                        </button>
                        <button @click="deleteEndpoint()" class="p-1.5 rounded-lg text-surface-400 hover:bg-rose-50 hover:text-rose-600" title="Excluir endpoint">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79"/></svg>
                        </button>
                    </div>
                    <p class="text-[11px] text-surface-400" x-text="selected.description"></p>
                    <div class="text-[10px] font-mono text-surface-500 mt-1" x-text="selected.path"></div>
                </div>
                <!-- Request form -->
                <div class="flex-1 overflow-y-auto scrollbar-thin p-6 space-y-4">
                    <!-- URL -->
                    <div>
                        <label class="block text-[11px] font-semibold text-brand-900 mb-1">URL</label>
                        <div class="flex gap-2">
                            <select x-model="reqMethod" class="rounded-xl border border-surface-200 bg-white px-3 py-2.5 text-[12px] font-bold font-mono outline-none w-24" :class="methodColor(reqMethod)">
                                <option value="GET">GET</option><option value="POST">POST</option><option value="PUT">PUT</option>
                                <option value="PATCH">PATCH</option><option value="DELETE">DELETE</option>
                            </select>
                            <input x-model="reqPath" class="flex-1 rounded-xl border border-surface-200 bg-white px-4 py-2.5 text-[13px] font-mono text-brand-900 outline-none focus:border-brand-400">
                            <button @click="executeRequest()" :disabled="executing" class="rounded-xl bg-brand-500 px-6 py-2.5 text-[13px] font-semibold text-white hover:bg-brand-600 disabled:opacity-50 transition-all shadow-sm">
                                <span x-text="executing ? 'Enviando...' : 'Enviar'"></span>
                            </button>
                        </div>
                    </div>
                    <!-- Headers -->
                    <div>
                        <button @click="showHeaders = !showHeaders" class="flex items-center gap-1.5 text-[11px] font-semibold text-surface-500 hover:text-brand-600">
                            <svg class="w-3 h-3 transition-transform" :class="showHeaders ? 'rotate-90' : ''" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                            Headers
                            <span class="text-[9px] text-surface-300" x-text="showHeaders ? '' : '(clique para expandir)'"></span>
                        </button>
                        <div x-show="showHeaders" x-transition class="mt-1.5">
                            <textarea x-model="reqHeaders" rows="3" placeholder='{"Authorization": "Bearer ..."}'
                                      class="w-full rounded-xl border border-surface-200 bg-white px-4 py-3 text-[12px] font-mono text-brand-900 outline-none focus:border-brand-400 resize-none"></textarea>
                        </div>
                    </div>
                    <!-- Body -->
                    <div x-show="reqMethod !== 'GET' && reqMethod !== 'DELETE'">
                        <label class="block text-[11px] font-semibold text-brand-900 mb-1">Body (JSON)</label>
                        <textarea x-model="reqBody" rows="8"
                                  class="w-full rounded-xl border border-surface-200 bg-white px-4 py-3 text-[12px] font-mono text-brand-900 outline-none focus:border-brand-400 resize-none"></textarea>
                    </div>
                    <!-- Response -->
                    <div x-show="response !== null">
                        <div class="flex items-center gap-3 mb-2">
                            <label class="text-[11px] font-semibold text-brand-900">Resposta</label>
                            <span class="rounded-full px-2.5 py-0.5 text-[10px] font-bold"
                                  :class="response?.status >= 200 && response?.status < 300 ? 'bg-emerald-100 text-emerald-700' : response?.status >= 400 ? 'bg-rose-100 text-rose-700' : 'bg-amber-100 text-amber-700'"
                                  x-text="'Status ' + (response?.status || '?')"></span>
                            <span class="text-[10px] font-mono text-surface-400" x-text="(response?.latency_ms || 0).toFixed(0) + 'ms'"></span>
                            <div class="flex-1"></div>
                            <button @click="copyResponse()" class="text-[10px] text-brand-500 hover:text-brand-700 font-medium">Copiar</button>
                        </div>
                        <pre class="rounded-xl bg-brand-950 text-brand-200 p-4 text-[12px] font-mono overflow-auto max-h-96 border border-brand-800 whitespace-pre-wrap"><code x-text="JSON.stringify(response?.data || response?.error, null, 2)"></code></pre>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- ═══════ RIGHT: Connector Detail / History ═══════ -->
    <aside x-show="selectedConnector && selected" x-transition.duration.200ms class="hidden xl:flex w-[300px] flex-col border-l border-surface-200 bg-white shrink-0 overflow-hidden">
        <div class="flex items-center justify-between border-b border-surface-100 px-4 py-2.5">
            <!-- Tabs -->
            <div class="flex rounded-lg border border-surface-200 overflow-hidden">
                <button @click="rightTab='connector'" class="px-3 py-1 text-[10px] font-medium transition-colors" :class="rightTab==='connector' ? 'bg-brand-500 text-white' : 'bg-white text-surface-500 hover:bg-surface-50'">Conector</button>
                <button @click="rightTab='history'" class="px-3 py-1 text-[10px] font-medium transition-colors" :class="rightTab==='history' ? 'bg-brand-500 text-white' : 'bg-white text-surface-500 hover:bg-surface-50'">Historico</button>
            </div>
            <div class="flex gap-1">
                <button @click="openConnectorForm(selectedConnector)" class="p-1 rounded hover:bg-surface-100 text-surface-400 hover:text-brand-600" title="Editar conector">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-4">
            <!-- Connector info tab -->
            <template x-if="rightTab === 'connector' && selectedConnector">
                <div class="space-y-4">
                    <div class="flex items-center gap-3">
                        <div class="flex h-10 w-10 items-center justify-center rounded-xl text-[14px] font-bold text-white" :class="selectedConnector.color" x-text="selectedConnector.icon"></div>
                        <div>
                            <div class="text-[13px] font-bold text-brand-900" x-text="selectedConnector.name"></div>
                            <div class="text-[10px] font-mono text-surface-400" x-text="selectedConnector.base_url"></div>
                        </div>
                    </div>
                    <!-- Health -->
                    <button @click="testConnector()" :disabled="testing" class="w-full rounded-xl border p-3 text-left transition-all"
                            :class="healthMap[selectedConnector.id] ? 'border-emerald-200 bg-emerald-50' : healthMap[selectedConnector.id] === false ? 'border-rose-200 bg-rose-50' : 'border-surface-200 bg-surface-50'">
                        <div class="flex items-center gap-2">
                            <span class="h-2.5 w-2.5 rounded-full" :class="healthMap[selectedConnector.id] ? 'bg-emerald-400' : healthMap[selectedConnector.id] === false ? 'bg-rose-400' : 'bg-surface-300'"></span>
                            <span class="text-[11px] font-semibold" :class="healthMap[selectedConnector.id] ? 'text-emerald-700' : healthMap[selectedConnector.id] === false ? 'text-rose-700' : 'text-surface-500'"
                                  x-text="testing ? 'Testando...' : (healthMap[selectedConnector.id] ? 'Online' : healthMap[selectedConnector.id] === false ? 'Offline' : 'Testar conexao')"></span>
                            <span x-show="healthLatency" class="ml-auto text-[10px] font-mono text-surface-400" x-text="healthLatency + 'ms'"></span>
                        </div>
                    </button>
                    <!-- Config -->
                    <div class="rounded-xl bg-surface-50 border border-surface-100 p-3.5 space-y-2 text-[11px]">
                        <div class="flex justify-between"><span class="text-surface-400">Autenticacao</span><span class="font-medium text-brand-900" x-text="selectedConnector.auth_type || 'none'"></span></div>
                        <div class="flex justify-between"><span class="text-surface-400">Header</span><span class="font-mono text-brand-900" x-text="selectedConnector.auth_header || '—'"></span></div>
                        <div class="flex justify-between"><span class="text-surface-400">API Key</span><span class="font-mono text-brand-900" x-text="selectedConnector.api_key ? '••••' + selectedConnector.api_key.slice(-4) : '—'"></span></div>
                        <div class="flex justify-between"><span class="text-surface-400">Timeout</span><span class="font-mono text-brand-900" x-text="(selectedConnector.timeout_ms || 30000) + 'ms'"></span></div>
                        <div class="flex justify-between"><span class="text-surface-400">Health Path</span><span class="font-mono text-brand-900" x-text="selectedConnector.health_path || '/api/health'"></span></div>
                        <div class="flex justify-between"><span class="text-surface-400">Endpoints</span><span class="font-medium text-brand-900" x-text="selectedConnector.endpoint_count || 0"></span></div>
                    </div>
                    <!-- Actions -->
                    <div class="space-y-2">
                        <button @click="deleteConnector()" class="w-full rounded-lg border border-rose-200 px-3 py-2 text-[11px] font-medium text-rose-600 hover:bg-rose-50 transition-colors">Excluir Conector</button>
                    </div>
                </div>
            </template>
            <!-- History tab -->
            <template x-if="rightTab === 'history'">
                <div class="space-y-2">
                    <button @click="loadHistory()" class="text-[10px] text-brand-500 font-medium hover:text-brand-700">Atualizar</button>
                    <template x-for="call in callHistory" :key="call.id">
                        <div class="rounded-lg border border-surface-100 p-2.5">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span class="rounded px-1 py-0.5 text-[8px] font-bold font-mono" :class="methodColor(call.method)" x-text="call.method"></span>
                                <span class="text-[10px] font-mono text-brand-800 truncate flex-1" x-text="call.url?.replace(selectedConnector?.base_url||'','') || '—'"></span>
                            </div>
                            <div class="flex items-center gap-3 text-[9px]">
                                <span class="rounded-full px-1.5 py-0.5 font-bold"
                                      :class="call.status_code >= 200 && call.status_code < 300 ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'"
                                      x-text="call.status_code"></span>
                                <span class="text-surface-400" x-text="call.latency_ms?.toFixed(0) + 'ms'"></span>
                                <span class="text-surface-300 ml-auto" x-text="call.created_at?.replace('T',' ').substring(0,16)"></span>
                            </div>
                        </div>
                    </template>
                    <template x-if="callHistory.length === 0">
                        <div class="text-center py-4 text-[11px] text-surface-400">Sem chamadas registradas</div>
                    </template>
                </div>
            </template>
        </div>
    </aside>

    <!-- ═══════ CONNECTOR FORM MODAL ═══════ -->
    <template x-if="connectorFormOpen">
        <div class="fixed inset-0 z-[9990] flex items-center justify-center p-4">
            <div class="fixed inset-0 bg-black/40" @click="connectorFormOpen = false"></div>
            <div class="relative z-10 w-full max-w-lg rounded-2xl bg-white shadow-2xl border border-surface-200 overflow-hidden">
                <div class="flex items-center justify-between border-b border-surface-100 px-6 py-4">
                    <h3 class="text-[15px] font-bold text-brand-900" x-text="editingConnectorId ? 'Editar Conector' : 'Novo Conector'"></h3>
                    <div class="flex items-center gap-2">
                        <button @click="introspectOpen = !introspectOpen"
                                class="inline-flex items-center gap-1.5 rounded-lg bg-gradient-to-r from-violet-500 to-fuchsia-500 px-3 py-1.5 text-[12px] font-semibold text-white shadow-sm hover:shadow-md hover:brightness-110 transition-all">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/></svg>
                            <span x-text="introspectOpen ? 'Fechar wizard' : 'IA, me ajude!'"></span>
                        </button>
                        <button @click="connectorFormOpen = false" class="p-1.5 rounded-lg hover:bg-surface-100 text-surface-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                    </div>
                </div>
                <div class="px-6 py-5 space-y-4 max-h-[70vh] overflow-y-auto">
                    <!-- ═══ WIZARD IA ═══ -->
                    <div x-show="introspectOpen" x-transition class="rounded-xl border border-violet-200 bg-gradient-to-br from-violet-50 to-fuchsia-50 p-4 space-y-3">
                        <p class="text-[12px] text-violet-800 leading-relaxed">
                            Cole a URL da API (docs, página inicial ou openapi.json direto). Eu tento descobrir
                            o base_url, auth e endpoints automaticamente.
                        </p>
                        <div>
                            <label class="block text-[11px] font-semibold text-violet-900 mb-1">URL da API</label>
                            <input x-model="introspectUrl" placeholder="https://api.exemplo.com ou https://api.exemplo.com/docs"
                                   class="w-full rounded-lg border border-violet-200 bg-white px-3 py-2 text-[12px] font-mono outline-none focus:border-violet-400">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-violet-900 mb-1">Token (opcional — se o openapi.json exige auth)</label>
                            <input x-model="introspectToken" type="password" placeholder="eyJhbGciOi..."
                                   class="w-full rounded-lg border border-violet-200 bg-white px-3 py-2 text-[12px] font-mono outline-none focus:border-violet-400">
                        </div>
                        <div class="flex items-center gap-2">
                            <button @click="runIntrospect()" :disabled="introspecting || !introspectUrl.trim()"
                                    class="inline-flex items-center gap-1.5 rounded-lg bg-gradient-to-r from-violet-500 to-fuchsia-500 px-4 py-2 text-[12px] font-semibold text-white hover:brightness-110 disabled:opacity-50">
                                <svg x-show="introspecting" class="animate-spin w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4.93 4.93l4.24 4.24M14.83 14.83l4.24 4.24M14.83 9.17l4.24-4.24M14.83 9.17l3.53-3.53M4.93 19.07l3.53-3.53"/></svg>
                                <span x-text="introspecting ? 'Descobrindo...' : 'Descobrir'"></span>
                            </button>
                            <span x-show="introspectStatus" x-text="introspectStatus" class="text-[11px] text-violet-700"></span>
                        </div>
                        <!-- Preview card -->
                        <div x-show="introspectResult && introspectResult.found" x-transition class="rounded-lg bg-white border border-violet-200 p-3 space-y-2">
                            <div class="text-[11px] text-violet-700 font-semibold">✓ OpenAPI encontrado em <span x-text="introspectResult?.spec_url" class="font-mono"></span></div>
                            <div class="text-[12px] text-brand-900">
                                <span class="font-semibold" x-text="introspectResult?.proposal?.name"></span> ·
                                v<span x-text="introspectResult?.meta?.api_version || '?'"></span> ·
                                <span x-text="introspectResult?.meta?.paths_count"></span> paths ·
                                auth: <span class="font-mono" x-text="introspectResult?.proposal?.auth_type"></span>
                            </div>
                            <div x-show="introspectResult?.endpoints?.length" class="text-[11px] text-surface-600">
                                <span x-text="introspectResult?.endpoints?.length"></span> endpoint(s) detectado(s).
                                Marque abaixo os que quer importar junto com o conector:
                            </div>
                            <div x-show="introspectResult?.endpoints?.length" class="max-h-40 overflow-y-auto space-y-1 pr-1">
                                <template x-for="(ep, i) in introspectResult?.endpoints || []" :key="i">
                                    <label class="flex items-center gap-2 text-[11px] cursor-pointer hover:bg-violet-50 rounded px-1 py-0.5">
                                        <input type="checkbox" x-model="introspectPicks[i]" class="rounded border-violet-300">
                                        <span class="font-mono rounded px-1.5 py-0.5 text-[9px] font-bold" :class="methodColor(ep.method)" x-text="ep.method"></span>
                                        <span class="font-mono text-surface-600 truncate" x-text="ep.path"></span>
                                        <span class="text-surface-400 truncate" x-text="ep.name"></span>
                                    </label>
                                </template>
                            </div>
                            <div class="flex items-center gap-2 pt-1">
                                <button @click="applyIntrospect()" type="button"
                                        class="rounded-lg bg-violet-600 px-3 py-1.5 text-[11px] font-semibold text-white hover:bg-violet-700">
                                    Aplicar ao formulário
                                </button>
                                <button @click="introspectResult = null" type="button"
                                        class="rounded-lg border border-violet-200 px-3 py-1.5 text-[11px] font-medium text-violet-700 hover:bg-violet-50">
                                    Descartar
                                </button>
                                <label class="flex items-center gap-1 text-[11px] text-surface-500 ml-auto">
                                    <input type="checkbox" x-model="introspectImportAll"> marcar todos
                                </label>
                            </div>
                        </div>
                        <div x-show="introspectResult && !introspectResult.found" x-transition class="rounded-lg bg-amber-50 border border-amber-200 p-3 text-[11px] text-amber-800">
                            <strong>Não encontrei o OpenAPI</strong><br>
                            <span x-text="introspectResult?.hint"></span>
                            <div x-show="introspectResult?.tried?.length" class="mt-2 text-surface-600">
                                <span class="font-semibold">Tentativas:</span>
                                <ul class="mt-1 space-y-0.5">
                                    <template x-for="t in introspectResult?.tried || []">
                                        <li class="font-mono">• <span x-text="t.url"></span> → HTTP <span x-text="t.status"></span></li>
                                    </template>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-brand-900 mb-1">Nome *</label>
                        <input x-model="connForm.name" placeholder="Ex: SupeRAG, Fale com Dados..." class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] outline-none focus:border-brand-400">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-brand-900 mb-1">Base URL *</label>
                        <input x-model="connForm.base_url" placeholder="https://api.exemplo.com" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] font-mono outline-none focus:border-brand-400">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-brand-900 mb-1">Descricao</label>
                        <textarea x-model="connForm.description" rows="2" placeholder="O que esta API faz..." class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] outline-none focus:border-brand-400 resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1">Icone (2 letras)</label>
                            <input x-model="connForm.icon" maxlength="2" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] font-bold text-center outline-none focus:border-brand-400">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1">Cor</label>
                            <select x-model="connForm.color" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] outline-none">
                                <option value="bg-brand-500">Azul</option>
                                <option value="bg-violet-500">Violeta</option>
                                <option value="bg-teal-500">Teal</option>
                                <option value="bg-emerald-600">Verde</option>
                                <option value="bg-amber-500">Amber</option>
                                <option value="bg-rose-500">Rosa</option>
                                <option value="bg-indigo-500">Indigo</option>
                                <option value="bg-orange-500">Laranja</option>
                            </select>
                        </div>
                    </div>
                    <!-- Auth -->
                    <div>
                        <label class="block text-[11px] font-semibold text-brand-900 mb-1.5">Autenticação</label>
                        <div class="grid grid-cols-5 gap-2">
                            <template x-for="at in ['none','api_key','bearer','basic','cookie']" :key="at">
                                <button @click="connForm.auth_type = at" type="button" class="rounded-lg border-2 px-2 py-2 text-center text-[10px] font-medium transition-all"
                                        :class="connForm.auth_type === at ? 'border-brand-400 bg-brand-50 text-brand-700' : 'border-surface-200 text-surface-500 hover:border-surface-300'" x-text="at === 'api_key' ? 'API Key' : at === 'bearer' ? 'Bearer' : at === 'basic' ? 'Basic' : at === 'cookie' ? 'Cookie' : 'Nenhuma'"></button>
                            </template>
                        </div>
                    </div>
                    <div x-show="connForm.auth_type !== 'none'" x-transition class="space-y-3">
                        <div x-show="connForm.auth_type === 'api_key' || connForm.auth_type === 'cookie'">
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1"
                                   x-text="connForm.auth_type === 'cookie' ? 'Nome do Cookie' : 'Header Name'"></label>
                            <input x-model="connForm.auth_header"
                                   :placeholder="connForm.auth_type === 'cookie' ? 'session, qi_session, connect.sid...' : 'X-API-Key'"
                                   class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] font-mono outline-none focus:border-brand-400">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1"
                                   x-text="connForm.auth_type === 'basic' ? 'user:password' : connForm.auth_type === 'cookie' ? 'Valor do Cookie' : 'Token / Key'"></label>
                            <input x-model="connForm.api_key" type="password"
                                   :placeholder="connForm.auth_type === 'cookie' ? 'abc123... ou name=value' : 'sk-...'"
                                   class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] font-mono outline-none focus:border-brand-400">
                        </div>
                        <!-- ═ Helper: Login → Cookie ═ -->
                        <div x-show="connForm.auth_type === 'cookie'" x-transition
                             class="rounded-lg border border-teal-200 bg-teal-50 p-3 space-y-2">
                            <button @click="loginHelperOpen = !loginHelperOpen" type="button"
                                    class="flex items-center gap-1.5 text-[12px] font-semibold text-teal-800 hover:text-teal-900">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>
                                <span x-text="loginHelperOpen ? '▼ Fechar ajudante de login' : '▶ Gerar cookie via login (auto)'"></span>
                            </button>
                            <div x-show="loginHelperOpen" x-transition class="space-y-2 pt-1">
                                <p class="text-[11px] text-teal-700 leading-relaxed">
                                    APIs cookie-based (como <code>fale-com-seus-dados</code>) só entregam o token no
                                    header <code>Set-Cookie</code>. Preencha abaixo e eu faço login pra você, extraio
                                    o cookie e colo no campo acima.
                                </p>
                                <div>
                                    <label class="block text-[10px] font-semibold text-teal-900 mb-1">Login URL (absoluta)</label>
                                    <input x-model="loginHelper.url" placeholder="https://.../api/auth/login"
                                           class="w-full rounded-lg border border-teal-200 bg-white px-2 py-1.5 text-[12px] font-mono">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-semibold text-teal-900 mb-1">Body JSON (ex: {"login":"...","password":"..."})</label>
                                    <textarea x-model="loginHelper.body" rows="2" placeholder='{"login":"","password":""}'
                                              class="w-full rounded-lg border border-teal-200 bg-white px-2 py-1.5 text-[11px] font-mono resize-none"></textarea>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button @click="runLoginHelper()" :disabled="loginHelper.running || !loginHelper.url" type="button"
                                            class="rounded-lg bg-teal-600 px-3 py-1.5 text-[11px] font-semibold text-white hover:bg-teal-700 disabled:opacity-50">
                                        <span x-text="loginHelper.running ? 'Logando...' : 'Fazer login e extrair cookie'"></span>
                                    </button>
                                    <span x-show="loginHelper.status" x-text="loginHelper.status" class="text-[11px]"
                                          :class="loginHelper.ok ? 'text-teal-700' : 'text-rose-700'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1">Health Path</label>
                            <input x-model="connForm.health_path" placeholder="/api/health" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] font-mono outline-none focus:border-brand-400">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-brand-900 mb-1">Timeout (ms)</label>
                            <input x-model.number="connForm.timeout_ms" type="number" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2.5 text-[13px] font-mono outline-none focus:border-brand-400">
                        </div>
                    </div>
                </div>
                <div class="border-t border-surface-100 px-6 py-4 flex items-center gap-3">
                    <!-- Test connection + result badge -->
                    <button @click="testInline()" :disabled="testingInline || !connForm.base_url" type="button"
                            class="inline-flex items-center gap-1.5 rounded-lg border border-emerald-300 bg-emerald-50 px-3 py-2 text-[12px] font-semibold text-emerald-700 hover:bg-emerald-100 disabled:opacity-40">
                        <svg x-show="!testingInline" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                        <svg x-show="testingInline" class="animate-spin w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" opacity="0.3"/><path d="M22 12c0-5.523-4.477-10-10-10"/></svg>
                        <span x-text="testingInline ? 'Testando...' : 'Testar conexão'"></span>
                    </button>
                    <div x-show="testResult" x-transition class="flex items-center gap-1.5 rounded-lg px-2.5 py-1.5 text-[11px] font-medium"
                         :class="testResult?.ok ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'">
                        <span x-text="testResult?.ok ? '✓' : '✗'"></span>
                        <span x-text="(testResult?.status ?? 0) + ' · ' + (testResult?.latency_ms ?? 0) + 'ms'"></span>
                        <span x-show="testResult?.hint || testResult?.error" :title="testResult?.hint || testResult?.error" class="underline decoration-dotted cursor-help">?</span>
                    </div>
                    <div class="flex-1"></div>
                    <button @click="connectorFormOpen = false" class="rounded-lg border border-surface-200 px-4 py-2 text-[13px] font-medium text-surface-500 hover:bg-surface-50">Cancelar</button>
                    <button @click="saveConnector()" :disabled="savingConn" class="rounded-lg bg-brand-500 px-5 py-2 text-[13px] font-semibold text-white hover:bg-brand-600 disabled:opacity-50">
                        <span x-text="savingConn ? 'Salvando...' : (editingConnectorId ? 'Atualizar' : 'Criar')"></span>
                    </button>
