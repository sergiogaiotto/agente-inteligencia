                                                    <button @click="insertScopeVar(v.name)" type="button" class="text-left rounded-md border border-indigo-200 bg-white hover:bg-indigo-50 px-2 py-1.5 transition-colors">
                                                        <div class="text-[11px] font-mono font-semibold text-indigo-900" x-text="v.name"></div>
                                                        <div class="text-[9px] text-indigo-600" x-text="v.type + ' · ' + v.desc"></div>
                                                    </button>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Tab 4: Simular (diff antes/depois + estimativa tokens) -->
                                <div x-show="scopeTab === 'simulate'" class="space-y-3">
                                    <div class="text-[11px] text-indigo-900">Cole um <strong>output de exemplo</strong> abaixo. O scope é aplicado em tempo real e mostra diff de tamanho + estimativa de tokens economizados.</div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-indigo-700 uppercase tracking-wider mb-1">output (texto do agente origem)</label>
                                        <textarea x-model="scopeSim.output" @input.debounce.400ms="runScopeSimulation()"
                                                  rows="3"
                                                  placeholder="Cole aqui um output de exemplo..."
                                                  class="w-full rounded-lg border border-indigo-300 bg-white px-3 py-2 text-[12px] text-brand-900 outline-none focus:border-indigo-500"></textarea>
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-indigo-700 uppercase tracking-wider mb-1">final_state (opcional)</label>
                                        <select x-model="scopeSim.final_state" @change="runScopeSimulation()" class="rounded-lg border border-indigo-300 bg-white px-3 py-1.5 text-[12px] text-brand-900">
                                            <option value="">(não definido)</option>
                                            <option value="Recommend">Recommend</option>
                                            <option value="Refuse">Refuse</option>
                                            <option value="Escalate">Escalate</option>
                                            <option value="LogAndClose">LogAndClose</option>
                                        </select>
                                    </div>
                                    <div class="rounded-lg border-2 p-3"
                                         :class="scopeSim.error ? 'border-rose-300 bg-rose-50' : (scopeSim.applied ? 'border-emerald-300 bg-emerald-50' : 'border-surface-200 bg-surface-50')">
                                        <div class="flex items-center justify-between mb-2">
                                            <span class="text-[11px] font-bold uppercase tracking-wider"
                                                  :class="scopeSim.error ? 'text-rose-700' : (scopeSim.applied ? 'text-emerald-700' : 'text-surface-500')">
                                                Resultado
                                            </span>
                                            <span x-show="scopeSim.loading" class="text-[10px] text-indigo-600">aplicando…</span>
                                        </div>
                                        <div x-show="!scopeSim.loading && scopeSim.error" class="text-[12px] font-mono text-rose-800" x-text="scopeSim.error"></div>
                                        <template x-if="!scopeSim.loading && !scopeSim.error && scopeSim.applied">
                                            <div class="space-y-2">
                                                <div class="grid grid-cols-3 gap-2 text-[10px]">
                                                    <div class="rounded bg-white border border-emerald-200 px-2 py-1.5">
                                                        <div class="font-bold text-emerald-700 uppercase tracking-wider">Antes</div>
                                                        <div class="font-mono text-brand-900" x-text="scopeSim.chars_before + ' chars'"></div>
                                                    </div>
                                                    <div class="rounded bg-white border border-emerald-200 px-2 py-1.5">
                                                        <div class="font-bold text-emerald-700 uppercase tracking-wider">Depois</div>
                                                        <div class="font-mono text-brand-900" x-text="scopeSim.chars_after + ' chars'"></div>
                                                    </div>
                                                    <div class="rounded bg-white border border-emerald-200 px-2 py-1.5">
                                                        <div class="font-bold text-emerald-700 uppercase tracking-wider">Redução</div>
                                                        <div class="font-mono text-brand-900" x-text="scopeSim.reduction_pct + '%'"></div>
                                                    </div>
                                                </div>
                                                <div class="text-[10px] text-emerald-700 italic">Tokens estimados: <span class="font-mono font-bold" x-text="Math.ceil(scopeSim.chars_before/4) + ' → ' + Math.ceil(scopeSim.chars_after/4)"></span> (4 chars/token aprox)</div>
                                                <div>
                                                    <div class="text-[10px] font-bold text-emerald-700 uppercase tracking-wider mb-0.5">Output filtrado</div>
                                                    <pre class="rounded bg-white border border-emerald-200 p-2 text-[11px] font-mono text-brand-900 max-h-32 overflow-auto whitespace-pre-wrap" x-text="scopeSim.output_filtered || '(vazio — modo isolated)'"></pre>
                                                </div>
                                            </div>
                                        </template>
                                        <div x-show="!scopeSim.loading && !scopeSim.error && !scopeSim.applied" class="text-[11px] italic text-surface-500">preencha um output exemplo para simular</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer fixo -->
                <div class="border-t border-surface-100 px-6 py-4 flex items-center justify-end gap-3 bg-white">
                    <button @click="connEditorOpen = false" class="rounded-lg border border-surface-200 px-4 py-2 text-[13px] font-medium text-surface-500 hover:bg-surface-50">Cancelar</button>
                    <button @click="saveConnection()" :disabled="savingConn" class="rounded-lg bg-brand-500 px-5 py-2 text-[13px] font-semibold text-white hover:bg-brand-600 disabled:opacity-50">
                        <span x-text="savingConn ? 'Salvando...' : (editingConnId ? 'Atualizar' : 'Criar Conexão')"></span>
                    </button>
                </div>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function meshPage() {
    return {
        topology: { nodes: [], edges: [] },
        showGroupForm: false, connsCollapsed: false,
        groups: [], newGroupName: '', newGroupColor: 'blue', ungroupedCollapsed: false,
        connEditorOpen: false, editingConnId: null, savingConn: false,
        connForm: { source_agent_id: '', target_agent_id: '', connection_type: 'sequential', condition_expr: '' },
        // Wizard 2026-06-01 — só ativa quando connection_type='conditional'.
        // Breadcrumb + resumo na tab "Contexto" usam o getter `currentEdgeContext`
        // (definido perto de activeNodes), reativo a connForm.source_agent_id /
        // target_agent_id — funciona tanto em Editar Conexão (vem pré-preenchido)
        // quanto em Nova Conexão (atualiza enquanto user escolhe os comboboxes).
        condTab: 'context',                 // 'context'|'pattern'|'refine'|'simulate'
        conditionalVars: [],                // populado de GET /conditional-vars
        sim: { output: '', final_state: '', result: null, error: '', loading: false },
        // ── Context Scope Wizard (2026-06-01) — eixo ortogonal ao type ──
        // Controla o QUE do output anterior vira contexto: inherit/scoped/isolated.
        // Persistido em config.context_scope. Coexiste com expr (conditional).
        scopeOpen: false,                   // header collapsível (default: fechado)
        scopeTab: 'mode',                   // 'mode'|'pattern'|'refine'|'simulate'
        scopeForm: { mode: 'inherit', template: '', max_chars: null },
        scopeVars: [],                      // populado de GET /context-scope-vars
        scopeModes: [],                     // [{id,label,desc}] do mesmo endpoint
        connTypeHelp: {},                   // {id:{label,what,when}} de GET /connection-types (popover ?)
        scopeSim: {
            output: '', final_state: '',
            loading: false, error: '',
            applied: false,                 // true quando temos resultado válido pra mostrar
            output_filtered: '',
            chars_before: 0, chars_after: 0, reduction_pct: 0,
        },
        chainNames: {}, collapsedChains: {},
        renamingChainId: null, renameChainValue: '',
        // ── Detail panel state ──
        detailOpen: false, detailRootId: null, detailName: '',
        detailChain: [], detailConnections: [],
        // ── Agent details cache ──
        _agentDetails: {},
        _skillMap: {},

        groupColors: [
            {id:'blue',bg:'#dbeafe'},{id:'red',bg:'#fee2e2'},{id:'teal',bg:'#ccfbf1'},{id:'amber',bg:'#fef3c7'},
            {id:'rose',bg:'#ffe4e6'},{id:'emerald',bg:'#d1fae5'},{id:'sky',bg:'#e0f2fe'},{id:'orange',bg:'#ffedd5'},
        ],
        getGroupColor(id) {
            const m = {blue:{bg:'#dbeafe',border:'#93c5fd',text:'#1e40af'},red:{bg:'#fee2e2',border:'#fca5a5',text:'#991b1b'},teal:{bg:'#ccfbf1',border:'#5eead4',text:'#0f766e'},amber:{bg:'#fef3c7',border:'#fcd34d',text:'#92400e'},rose:{bg:'#ffe4e6',border:'#fda4af',text:'#9f1239'},emerald:{bg:'#d1fae5',border:'#6ee7b7',text:'#065f46'},sky:{bg:'#e0f2fe',border:'#7dd3fc',text:'#0369a1'},orange:{bg:'#ffedd5',border:'#fdba74',text:'#9a3412'}};
            return m[id]||m.blue;
        },

        get activeNodes() { return this.topology.nodes.filter(n => n.status === 'active'); },
        // currentEdgeContext (2026-06-01): getter reativo que segue
        // connForm.source_agent_id e target_agent_id em tempo real.
        // Substituiu o field estático `editingEdgeContext` (que só era
        // populado em edit). Agora funciona também em Nova Conexão — o
        // breadcrumb do header e a tab "Contexto" do wizard condicional
        // acompanham o usuário enquanto ele escolhe nos comboboxes.
        // Retorna null quando NENHUM dos IDs está setado (esconde o
        // breadcrumb via x-show).
        get currentEdgeContext() {
            const sid = this.connForm.source_agent_id;
            const tid = this.connForm.target_agent_id;
            if (!sid && !tid) return null;
            const sn = sid ? this.topology.nodes.find(n => n.id === sid) : null;
            const tn = tid ? this.topology.nodes.find(n => n.id === tid) : null;
            return {
                sourceName: sn?.name || (sid ? sid.substring(0,8) : '—'),
                sourceKind: sn?.kind || (sid ? '?' : ''),
                targetName: tn?.name || (tid ? tid.substring(0,8) : '—'),
                targetKind: tn?.kind || (tid ? '?' : ''),
            };
        },
        get unassignedNodes() { const a=new Set(); for(const g of this.groups) for(const id of g.agent_ids) a.add(id); return this.topology.nodes.filter(n => !a.has(n.id)); },
        get detailPassthroughCount() { return this.detailChain.filter(a => a._passthrough).length; },
        get detailActiveCount() { return this.detailChain.filter(a => !a._passthrough).length; },

        get hierarchicalEdges() {
            const edges = this.topology.edges;
            if (!edges.length) return [];
            const children = {};
            const targetSet = new Set();
            for (const e of edges) { if (!children[e.source]) children[e.source] = []; children[e.source].push(e); targetSet.add(e.target); }
            let roots = [...new Set(edges.map(e => e.source))].filter(s => !targetSet.has(s));
            if (!roots.length) roots = [...new Set(edges.map(e => e.source))];
            const result = []; const visited = new Set();
            function dfs(sourceId, prefix, depth, rootId) {
                const childEdges = children[sourceId] || [];
                childEdges.forEach((edge, idx) => {
                    const num = prefix + '.' + (idx + 1);
                    if (visited.has(edge.id)) return;
                    visited.add(edge.id);
                    result.push({ type: 'edge', edge, number: num, depth, rootId });
                    dfs(edge.target, num, depth + 1, rootId);
                });
            }
            let rootIdx = 0;
            for (const rootId of roots) {
                const rootEdges = children[rootId] || [];
                if (!rootEdges.length) continue;
                rootIdx++;
                const headerIdx = result.length;
                result.push({ type: 'header', rootIdx, rootId, edgeCount: 0, edge: null });
                rootEdges.forEach((edge, idx) => {
                    if (visited.has(edge.id)) return;
                    visited.add(edge.id);
                    result.push({ type: 'edge', edge, number: rootIdx + '.' + (idx + 1), depth: 1, rootId });
                    dfs(edge.target, rootIdx + '.' + (idx + 1), 2, rootId);
                });
                result[headerIdx].edgeCount = result.length - headerIdx - 1;
            }
            for (const e of edges) { if (!visited.has(e.id)) result.push({ type: 'edge', edge: e, number: '—', depth: 0, rootId: null }); }
            return result;
        },

        // ── Passthrough detection ──
        _isPassthrough(agent) {
            if (!agent) return false;
            if (agent.skill_id) return false;
            const sp = (agent.system_prompt || '').trim();
            if (!sp || sp.length < 50) return true;
            if (sp.length < 200) {
                const lower = sp.toLowerCase();
                const markers = ['você é um agente inteligente','you are an intelligent agent','você é um assistente','you are an assistant','você é um agente especializado'];
                if (markers.some(m => lower.includes(m))) return true;
            }
            return false;
        },

        // ── Skill exec mode inference ──
        _inferExecMode(raw) {
            if (!raw) return '';
            if (raw.includes('## Execution Profile')) {
                const m = raw.match(/## Execution Profile[\s\S]*?(?:mode|modo):\s*(fast|standard|rigorous)/i);
                return m ? m[1].toLowerCase() : 'standard';
            }
            const hasEv = /## Evidence Policy\s*\n[^\n#]{20,}/.test(raw);
            const hasGr = /## Guardrails\s*\n[^\n#]{50,}/.test(raw);
            if (hasEv && hasGr) return 'rigorous';
            if (hasEv || hasGr) return 'standard';
            return 'fast';
        },

        // ── Detail panel ──
        async openPipelineDetail(rootId, edgeCount) {
            this.detailRootId = rootId;
            this.detailName = this.chainNames[rootId] || this.nodeName(rootId);
            this.detailOpen = true;

            // Resolve chain BFS
            const edges = this.topology.edges;
            const chain = [rootId]; const visited = new Set([rootId]); const queue = [rootId];
            while (queue.length) {
                const c = queue.shift();
                for (const e of edges) {
                    if (e.source === c && !visited.has(e.target)) { visited.add(e.target); chain.push(e.target); queue.push(e.target); }
                }
            }

            // Connections for this pipeline
            this.detailConnections = edges.filter(e => visited.has(e.source) && visited.has(e.target));

            // Load full agent details
            const detailAgents = [];
            for (const agId of chain) {
                let ag = this._agentDetails[agId];
                if (!ag) {
                    try { ag = await api.get('/api/v1/agents/' + agId); this._agentDetails[agId] = ag; } catch { ag = this.topology.nodes.find(n => n.id === agId) || {id: agId, name: '?'}; }
                }
                // Enrich with skill data
                let skillName = null, skillVersion = null, skillPurpose = null, skillExecMode = null;
                if (ag.skill_id && !this._skillMap[ag.skill_id]) {
                    try { const sk = await api.get('/api/v1/skills/' + ag.skill_id); this._skillMap[ag.skill_id] = sk; } catch {}
                }
                const sk = this._skillMap[ag.skill_id];
                if (sk) {
                    skillName = sk.name; skillVersion = sk.version; skillPurpose = sk.purpose;
                    skillExecMode = this._inferExecMode(sk.raw_content);
                }
                detailAgents.push({
                    ...ag,
                    _passthrough: this._isPassthrough(ag),
                    _skill_name: skillName,
                    _skill_version: skillVersion,
                    _skill_purpose: skillPurpose,
                    _skill_exec_mode: skillExecMode,
                });
            }
            this.detailChain = detailAgents;
        },

        groupAgents(g) { return g.agent_ids.map(id => this.topology.nodes.find(n => n.id === id)).filter(Boolean); },
        nodeName(id) { return this.topology.nodes.find(n => n.id === id)?.name || id?.substring(0,8) || '?'; },
        nodeKind(id) { const n=this.topology.nodes.find(x=>x.id===id); return n ? n.kind : ''; },
        nodeKindColor(id) { const k=this.topology.nodes.find(x=>x.id===id)?.kind; return k==='aobd'?'bg-rose-500':k==='router'?'bg-orange-500':'bg-teal-500'; },

        openConnEditor(edge) {
            // Reset wizard state — não vazar entre aberturas
            this.condTab = 'context';
            this.sim = { output: '', final_state: '', result: null, error: '', loading: false };
            // Reset scope wizard também — não vazar entre aberturas
            this.scopeTab = 'mode';
            this.scopeForm = { mode: 'inherit', template: '', max_chars: null };
            this.scopeSim = {
                output: '', final_state: '',
                loading: false, error: '', applied: false, output_filtered: '',
                chars_before: 0, chars_after: 0, reduction_pct: 0,
            };
            this.scopeOpen = false;

            if (edge) {
                this.editingConnId = edge.id;
                let cfg = {};
                if (edge.config) {
                    if (typeof edge.config === 'string') {
                        try {
                            cfg = JSON.parse(edge.config);
                        } catch (e) {
                            // Config inválido em edge.config — log pra troubleshooting
                            // no DevTools. Não bloqueia o operador: cai pra cfg={}.
                            console.error('[mesh] edge.config JSON inválido', { edgeId: edge.id, raw: edge.config, error: e });
                            cfg = {};
                        }
                    } else if (typeof edge.config === 'object') {
                        cfg = edge.config;
                    }
                }
                this.connForm = {
                    source_agent_id: edge.source,
                    target_agent_id: edge.target,
                    connection_type: edge.type,
                    condition_expr: cfg.expr || '',
                };
                // Carrega scope do config.context_scope se existir.
                // Mantém defaults seguros caso o objeto seja malformado.
                const cs = (cfg && typeof cfg === 'object') ? cfg.context_scope : null;
                if (cs && typeof cs === 'object') {
                    this.scopeForm = {
                        mode: (cs.mode || 'inherit'),
                        template: (cs.template || ''),
                        max_chars: (typeof cs.max_chars === 'number' ? cs.max_chars : null),
                    };
                    // Auto-expand quando há config não-default — operador vê o estado atual
                    if (this.scopeForm.mode !== 'inherit') this.scopeOpen = true;
                }
                // Scroll para o item editado no listing (pulsando para destacar).
                // Defer para o próximo tick — DOM precisa estar com o modal renderizado.
                this.$nextTick(() => {
                    const el = document.getElementById('conn-' + edge.id);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                });
            } else {
                this.editingConnId = null;
                this.connForm = { source_agent_id: '', target_agent_id: '', connection_type: 'sequential', condition_expr: '' };
            }
            this.connEditorOpen = true;
            // Workaround conhecido do Alpine: <template x-if> com <select x-model>
            // contendo <template x-for> perde a reatividade do x-model na primeira
            // render. O valor inicial do connForm é setado ANTES do template ser
            // montado, então os <option>s ainda não existem quando o x-model lê
            // o value. Re-aplicar os IDs no próximo tick (depois das options
            // serem renderizadas) faz os selects pegarem o valor correto.
            if (edge) {
                this.$nextTick(() => {
                    this.connForm.source_agent_id = edge.source;
                    this.connForm.target_agent_id = edge.target;
                });
            }
            // Garante que vars panel está populado antes do user chegar na tab "Refinar"
            if (!this.conditionalVars.length) this.loadConditionalVars();
            if (!this.scopeVars.length) this.loadScopeVars();
        },
        addConnectionToChain(rootId) {
            const chainEdges = this.hierarchicalEdges.filter(i => i.type === 'edge' && i.rootId === rootId);
            let sourceId = rootId;
            if (chainEdges.length) { const deepest = chainEdges.reduce((a, b) => (b.depth||0) > (a.depth||0) ? b : a); sourceId = deepest.edge.target; }
            this.connForm = { source_agent_id: sourceId, target_agent_id: '', connection_type: 'sequential', condition_expr: '' };
            this.editingConnId = null;
            this.condTab = 'context';
            this.sim = { output: '', final_state: '', result: null, error: '', loading: false };
            // Reset scope para defaults — nova conexão começa em inherit
            this.scopeTab = 'mode';
            this.scopeForm = { mode: 'inherit', template: '', max_chars: null };
            this.scopeSim = {
                output: '', final_state: '',
                loading: false, error: '', applied: false, output_filtered: '',
                chars_before: 0, chars_after: 0, reduction_pct: 0,
            };
            this.scopeOpen = false;
            this.connEditorOpen = true;
            // Workaround Alpine x-if + x-model + x-for — vide openConnEditor.
            // Re-aplicar source_agent_id no próximo tick faz o <select> exibir
            // o agente origem pré-selecionado (em vez de "Selecione...").
            this.$nextTick(() => {
                this.connForm.source_agent_id = sourceId;
            });
            if (!this.conditionalVars.length) this.loadConditionalVars();
            if (!this.scopeVars.length) this.loadScopeVars();
        },
        // ─── Wizard conditional ────────────────────────────────
        async loadConditionalVars() {
            try {
                const d = await api.get('/api/v1/mesh/conditional-vars');
                this.conditionalVars = d.vars || [];
            } catch (e) {
                // Backend offline ou endpoint quebrado — log pra troubleshooting
                // no DevTools. UI continua funcional (vars panel fica vazio).
                console.error('[mesh] loadConditionalVars falhou', e);
                this.conditionalVars = [];
            }
        },
        applyPattern(name) {
            // Templates iniciais — operador refina na tab seguinte
            const templates = {
                keyword: "'imagem' in output_lower",
                state: "final_state == 'Recommend'",
                length: "output_length > 200",
                custom: "",
            };
            if (name in templates) {
                this.connForm.condition_expr = templates[name];
                this.connForm.connection_type = 'conditional'; // garante
                this.condTab = 'refine';
            }
        },
        insertVar(varname) {
            // Insere o nome da var no fim do textarea (com espaço antes se preciso)
            const cur = (this.connForm.condition_expr || '').trimEnd();
            this.connForm.condition_expr = cur ? (cur + ' ' + varname) : varname;
        },
        async runSimulation() {
            const expr = (this.connForm.condition_expr || '').trim();
            if (!expr) {
                this.sim.result = null;
                this.sim.error = 'Sem expressão para avaliar (volte ao passo Refinar).';
                return;
            }
            if (!this.sim.output && !this.sim.final_state) {
                this.sim.result = null;
                this.sim.error = '';
                return;
            }
            this.sim.loading = true;
            this.sim.error = '';
            try {
                const r = await api.post('/api/v1/mesh/connections/test-conditional', {
                    expr,
                    output: this.sim.output,
                    final_state: this.sim.final_state,
                });
                if (r.error) {
                    this.sim.result = null;
                    this.sim.error = r.error;
                } else {
                    this.sim.result = !!r.result;
                    this.sim.error = '';
                }
            } catch (e) {
                this.sim.result = null;
                this.sim.error = 'Falha na chamada: ' + (e?.message || 'desconhecida');
            }
            this.sim.loading = false;
        },
        async saveConnection() {
            if (!this.connForm.source_agent_id || !this.connForm.target_agent_id) { showToast('Selecione origem e destino', 'error'); return; }
            if (this.connForm.source_agent_id === this.connForm.target_agent_id) { showToast('Origem e destino devem ser diferentes', 'error'); return; }
            this.savingConn = true;
            // Monta o payload. `config` é um único JSON que carrega DOIS eixos
            // ortogonais: `expr` (conditional routing, só quando type=conditional)
            // e `context_scope` (sempre, independente do type). Operador pode
            // ter um sem o outro, os dois ou nenhum.
            const payload = {
                source_agent_id: this.connForm.source_agent_id,
                target_agent_id: this.connForm.target_agent_id,
                connection_type: this.connForm.connection_type,
            };
            const cfg = {};
            if (this.connForm.connection_type === 'conditional') {
                const expr = (this.connForm.condition_expr || '').trim();
                if (expr) cfg.expr = expr;
            }
            // Context scope — só inclui no config se não é o default (inherit
            // vazio). Inherit puro NÃO precisa ser persistido — economiza
            // bytes e mantém configs simples enxutas.
            const scopePayload = this.buildScopePayload();
            if (scopePayload) cfg.context_scope = scopePayload;
            payload.config = JSON.stringify(cfg);
            try {
                if (this.editingConnId) { await api.put('/api/v1/mesh/connections/' + this.editingConnId, payload); showToast('Conexão atualizada'); }
                else { await api.post('/api/v1/mesh/connections', payload); showToast('Conexão criada'); }
                this.connEditorOpen = false; await this.load();
            } catch(e) { showToast(e.message, 'error'); }
            this.savingConn = false;
        },
        // ─── Wizard context scope ──────────────────────────────────────
        async loadScopeVars() {
            try {
                const d = await api.get('/api/v1/mesh/context-scope-vars');
                this.scopeVars = d.vars || [];
                this.scopeModes = d.modes || [];
            } catch (e) {
                // Backend offline ou endpoint quebrado — log pra troubleshooting
                // no DevTools. UI continua funcional (modo selector fica vazio
                // até reload, vars panel idem).
                console.error('[mesh] loadScopeVars falhou', e);
                this.scopeVars = [];
                this.scopeModes = [];
            }
            // Help dos tipos de conexão (popover ?) — fonte única no backend.
            try {
                const ct = await api.get('/api/v1/mesh/connection-types');
                this.connTypeHelp = Object.fromEntries((ct.types || []).map(t => [t.id, t]));
            } catch (e) {
                console.error('[mesh] loadConnectionTypes falhou', e);
                this.connTypeHelp = {};
            }
        },
        applyScopePattern(name) {
            // Templates iniciais para o modo `scoped` — operador refina depois
            const templates = {
                truncate:    { template: '',                              max_chars: 500 },
                first_line:  { template: "output.split('\\n')[0]",        max_chars: null },
                json_only:   { template: "output[output.find('{'):output.rfind('}')+1] if '{' in output and '}' in output else output", max_chars: null },
                custom:      { template: '',                              max_chars: null },
            };
            if (!(name in templates)) return;
            const t = templates[name];
            this.scopeForm.mode = 'scoped';
            this.scopeForm.template = t.template;
            this.scopeForm.max_chars = t.max_chars;
            this.scopeTab = 'refine';
        },
        insertScopeVar(varname) {
            // Insere no fim do template (com espaço antes se preciso)
            const cur = (this.scopeForm.template || '').trimEnd();
            this.scopeForm.template = cur ? (cur + ' ' + varname) : varname;
        },
        buildScopePayload() {
            // Retorna o objeto a salvar em config.context_scope, OU null se
            // está em estado default (inherit sem nada) — para não poluir
            // configs com chaves redundantes.
            const m = this.scopeForm.mode;
            if (!m || m === 'inherit') return null;
            if (m === 'isolated') return { mode: 'isolated' };
            // scoped — só serializa se há regra; senão equivale a inherit
            const obj = { mode: 'scoped' };
            const tpl = (this.scopeForm.template || '').trim();
            if (tpl) obj.template = tpl;
            if (typeof this.scopeForm.max_chars === 'number' && this.scopeForm.max_chars > 0) {
                obj.max_chars = this.scopeForm.max_chars;
            }
            // scoped sem template nem max_chars = na prática inherit; não persistir
            if (!obj.template && !obj.max_chars) return null;
            return obj;
        },
        scopeStatusLine() {
            // Texto curto exibido no header collapsível do bloco
            const m = this.scopeForm.mode;
            if (m === 'isolated') return 'Isolated — próximo agente NÃO recebe contexto do anterior';
            if (m === 'scoped') {
                const tpl = (this.scopeForm.template || '').trim();
                if (tpl) return 'Scoped (template Jinja): ' + (tpl.length > 60 ? tpl.slice(0, 60) + '…' : tpl);
                if (this.scopeForm.max_chars) return 'Scoped — truncar em ' + this.scopeForm.max_chars + ' chars';
                return 'Scoped (sem regra — equivale a inherit)';
            }
            return 'Inherit (padrão) — output completo do anterior vira contexto';
        },
        async runScopeSimulation() {
            // Sem input → reseta o painel de resultado sem erro
            if (!this.scopeSim.output && !this.scopeSim.final_state) {
                this.scopeSim.applied = false;
                this.scopeSim.error = '';
                return;
            }
            this.scopeSim.loading = true;
            this.scopeSim.error = '';
            try {
                const body = {
                    mode: this.scopeForm.mode,
                    template: this.scopeForm.template || '',
                    max_chars: (typeof this.scopeForm.max_chars === 'number' ? this.scopeForm.max_chars : undefined),
                    output: this.scopeSim.output,
                    final_state: this.scopeSim.final_state,
                };
                const r = await api.post('/api/v1/mesh/connections/test-context-scope', body);
                if (r.error) {
                    this.scopeSim.error = r.error;
                    this.scopeSim.applied = false;
                } else {
                    this.scopeSim.output_filtered = r.output || '';
                    this.scopeSim.chars_before = r.chars_before || 0;
                    this.scopeSim.chars_after = r.chars_after || 0;
                    this.scopeSim.reduction_pct = r.reduction_pct || 0;
                    this.scopeSim.applied = true;
                }
            } catch (e) {
                this.scopeSim.error = 'Falha na chamada: ' + (e?.message || 'desconhecida');
                this.scopeSim.applied = false;
            }
            this.scopeSim.loading = false;
        },
        async deleteConnection(id) {
            if (!confirm('Remover esta conexão?')) return;
            try {
                await api.del('/api/v1/mesh/connections/' + id);
                await this.load();
                showToast('Conexão removida');
            } catch (e) {
                // Backend rejeitou DELETE — pode ser 404 (já removida) ou
                // 500 (erro). Log no DevTools + toast genérico ao operador.
                console.error('[mesh] deleteConnection falhou', { connId: id, error: e });
                showToast('Erro', 'error');
            }
        },

        addGroup() { if(!this.newGroupName.trim()){showToast('Nome obrigatório','error');return;} this.groups.push({id:Date.now().toString(),name:this.newGroupName.trim(),color:this.newGroupColor,agent_ids:[],collapsed:false}); this.newGroupName=''; this.showGroupForm=false; this.persistGroups(); showToast('Grupo criado'); },
        renameGroup(g) { const n=prompt('Novo nome:',g.name); if(n&&n.trim()){g.name=n.trim();this.persistGroups();} },
        removeGroup(gid) { if(!confirm('Remover grupo?'))return; this.groups=this.groups.filter(g=>g.id!==gid); this.persistGroups(); showToast('Grupo removido'); },
        assignToGroup(gid,aid) { if(!aid)return; for(const g of this.groups) g.agent_ids=g.agent_ids.filter(id=>id!==aid); const g=this.groups.find(x=>x.id===gid); if(g){g.agent_ids.push(aid);this.persistGroups();} },
        unassignFromGroup(gid,aid) { const g=this.groups.find(x=>x.id===gid); if(g){g.agent_ids=g.agent_ids.filter(id=>id!==aid);this.persistGroups();} },
        async persistGroups() {
            try {
                await api.put('/api/v1/settings', { mesh_groups: JSON.stringify(this.groups.map(g => ({id: g.id, name: g.name, color: g.color, agent_ids: g.agent_ids}))) });
            } catch (e) {
                // Persist falhou — UI ainda mostra a mudança em memória, mas
                // não vai sobreviver ao reload. Log pra troubleshooting; user
                // verá o estado revertido se recarregar.
                console.error('[mesh] persistGroups falhou', e);
            }
        },
        async loadGroups() {
            try {
                const d = await api.get('/api/v1/settings');
                const r = d.settings?.mesh_groups;
                if (r) this.groups = JSON.parse(r).map(g => ({...g, collapsed: false}));
                const cn = d.settings?.mesh_chain_names;
                if (cn) this.chainNames = JSON.parse(cn);
            } catch (e) {
                // /api/v1/settings offline ou JSON malformado em mesh_groups/
                // mesh_chain_names. Grupos/nomes ficam como estavam. Log pra
                // troubleshooting no DevTools.
                console.error('[mesh] loadGroups falhou', e);
            }
        },
        async persistChainNames() {
            try {
                await api.put('/api/v1/settings', { mesh_chain_names: JSON.stringify(this.chainNames) });
            } catch (e) {
                console.error('[mesh] persistChainNames falhou', e);
            }
        },
        startRenameChain(rootId, currentName) { this.renamingChainId=rootId; this.renameChainValue=currentName||''; },
        confirmRenameChain(rootId) { this.chainNames[rootId]=this.renameChainValue.trim(); this.renamingChainId=null; this.persistChainNames(); if(this.renameChainValue.trim()) showToast('Pipeline renomeado'); },

        async load() {
            try {
                this.topology = await api.get('/api/v1/mesh/topology');
            } catch (e) {
                // Topology offline → UI mostra mesh vazio. Log pra DevTools;
                // sem topology, nada renderiza (estado conhecido pelo user).
                console.error('[mesh] load topology falhou', e);
            }
            await this.loadGroups();
        },
    }
}
</script>
