{% extends "layouts/base.html" %}

{% block content %}
<div x-data="meshPage()" x-init="load()" class="flex gap-0 -m-4 lg:-m-6 h-[calc(100vh-3.5rem)]">

    <!-- ══ MAIN CONTENT ══ -->
    <div class="flex-1 overflow-y-auto scrollbar-thin p-4 lg:p-6">

    <div class="flex items-center justify-between mb-5">
        <p class="text-[12px] text-surface-400">Topologia de conexões entre agentes no AI Mesh</p>
        <div class="flex gap-2">
            <button @click="showGroupForm = true" class="inline-flex items-center gap-2 rounded-lg border border-brand-200 bg-brand-50 px-3 py-2 text-[12px] font-medium text-brand-700 hover:bg-brand-100 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2.25 7.125C2.25 6.504 2.754 6 3.375 6h6c.621 0 1.125.504 1.125 1.125v3.75c0 .621-.504 1.125-1.125 1.125h-6a1.125 1.125 0 01-1.125-1.125v-3.75z"/></svg>
                Novo Grupo
            </button>
            <button @click="openConnEditor(null)" class="inline-flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2 text-[13px] font-semibold text-white shadow-sm hover:bg-brand-600 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                Nova Conexão
            </button>
        </div>
    </div>

    <!-- New group form -->
    <div x-show="showGroupForm" x-transition class="rounded-xl border border-red-200 bg-red-50/50 p-4 mb-5">
        <div class="flex items-end gap-3">
            <div class="flex-1"><label class="block text-[11px] font-semibold text-surface-500 mb-1">Nome do Grupo</label>
            <input x-model="newGroupName" placeholder="Ex: Atendimento Nível 1" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2 text-[13px] outline-none focus:border-brand-400"></div>
            <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Cor</label>
            <div class="flex gap-1.5"><template x-for="c in groupColors" :key="c.id"><button @click="newGroupColor = c.id" class="h-8 w-8 rounded-lg border-2 transition-all" :class="newGroupColor === c.id ? 'border-brand-500 scale-110 shadow-md' : 'border-transparent'" :style="'background:' + c.bg"></button></template></div></div>
            <button @click="addGroup()" class="rounded-lg bg-red-500 px-4 py-2 text-[12px] font-semibold text-white hover:bg-red-600">Criar Grupo</button>
            <button @click="showGroupForm = false" class="rounded-lg border border-surface-200 px-3 py-2 text-[12px] text-surface-500 hover:bg-surface-50">Cancelar</button>
        </div>
    </div>

    <!-- ══ CONEXÕES ══ -->
    <div class="rounded-xl border border-surface-200 bg-white mb-5">
        <div class="flex items-center justify-between px-5 py-3 border-b border-surface-100 cursor-pointer select-none" @click="connsCollapsed = !connsCollapsed">
            <div class="flex items-center gap-3">
                <svg class="w-4 h-4 text-brand-500 transition-transform duration-200" :class="connsCollapsed ? '-rotate-90' : ''" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                <span class="text-[13px] font-bold text-brand-900">Conexões</span>
                <span class="rounded-full bg-brand-50 px-2.5 py-0.5 text-[10px] font-semibold text-brand-600" x-text="topology.edges.length"></span>
            </div>
        </div>
        <div x-show="!connsCollapsed" x-transition.duration.200ms>
            <template x-if="topology.edges.length === 0">
                <div class="px-5 py-8 text-center">
                    <div class="flex items-center justify-center gap-4 mb-3 opacity-30">
                        <div class="h-10 w-10 rounded-full bg-red-200"></div>
                        <svg class="w-6 h-6 text-surface-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
                        <div class="h-10 w-10 rounded-full bg-teal-200"></div>
                    </div>
                    <p class="text-[12px] text-surface-400">Conecte seus agentes para formar pipelines de processamento</p>
                </div>
            </template>
            <div class="py-2">
                <template x-for="item in hierarchicalEdges" :key="item.edge?.id || ('h'+item.rootIdx)">
                    <div>
                    <!-- Chain header -->
                    <div x-show="item.type === 'header'" class="flex items-center gap-3 px-5 py-2 bg-surface-50/80 border-b border-surface-100 cursor-pointer select-none" @click="collapsedChains[item.rootId] = !collapsedChains[item.rootId]">
                        <span class="text-[14px] font-bold text-brand-600 min-w-[30px]" x-text="item.rootIdx + '.'"></span>
                        <svg class="w-4 h-4 text-brand-400 transition-transform duration-200 shrink-0" :class="collapsedChains[item.rootId] ? '-rotate-90' : ''" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                        <!-- Normal mode -->
                        <div x-show="renamingChainId !== item.rootId" class="flex items-center gap-2 flex-1">
                            <span class="text-[13px] font-bold text-brand-900" x-text="chainNames[item.rootId] || 'Pipeline ' + item.rootIdx"></span>
                            <span class="text-[10px] text-surface-400">via</span>
                            <span class="text-[11px] font-medium text-surface-500" x-text="nodeName(item.rootId)"></span>
                            <span class="rounded-full bg-brand-100 px-2 py-0.5 text-[9px] font-semibold text-brand-600" x-text="item.edgeCount + ' conexão(ões)'"></span>
                            <button @click.stop="startRenameChain(item.rootId, chainNames[item.rootId]||'')" class="p-1 rounded hover:bg-brand-100 text-surface-300 hover:text-brand-600 transition-colors" title="Renomear">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
                            </button>
                        </div>
                        <!-- Rename mode -->
                        <div x-show="renamingChainId === item.rootId" @click.stop class="flex items-center gap-2 flex-1">
                            <input x-model="renameChainValue" @keydown.enter="confirmRenameChain(item.rootId)" @keydown.escape="renamingChainId = null"
                                   placeholder="Nome do pipeline..." class="flex-1 max-w-xs rounded-lg border border-brand-300 bg-white px-2.5 py-1 text-[13px] font-semibold text-brand-900 outline-none focus:ring-2 focus:ring-brand-100">
                            <button @click="confirmRenameChain(item.rootId)" class="rounded bg-brand-500 px-2.5 py-1 text-[10px] font-semibold text-white hover:bg-brand-600">Salvar</button>
                            <button @click="renamingChainId = null" class="rounded bg-surface-100 px-2.5 py-1 text-[10px] font-medium text-surface-500">Cancelar</button>
                        </div>
                        <!-- Pipeline actions -->
                        <button @click.stop="openPipelineDetail(item.rootId, item.edgeCount)" class="shrink-0 inline-flex items-center gap-1 rounded-lg border border-surface-200 bg-white px-2.5 py-1 text-[10px] font-medium text-brand-600 hover:bg-brand-50 transition-colors" title="Detalhes do pipeline">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            Detalhes
                        </button>
                        <a @click.stop :href="'/workspace?agent=' + item.rootId + '&mode=pipeline'" class="shrink-0 inline-flex items-center gap-1 rounded-lg bg-emerald-500 px-2.5 py-1 text-[10px] font-medium text-white hover:bg-emerald-600 transition-colors" title="Testar pipeline">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>
                            Testar
                        </a>
                        <button @click.stop="addConnectionToChain(item.rootId)" class="shrink-0 inline-flex items-center gap-1 rounded-lg border border-brand-200 bg-white px-2.5 py-1 text-[10px] font-medium text-brand-600 hover:bg-brand-50 transition-colors" title="Adicionar conexão">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4.5v15m7.5-7.5h-15"/></svg>
                            Adicionar
                        </button>
                    </div>
                    <!-- Fan-out hint (3b): roteador escolhe UM destino; encadear se um precisa do resultado de outro -->
                    <div x-show="item.type === 'header' && (topology.fanout_roots||[]).includes(item.rootId) && !collapsedChains[item.rootId]"
                         class="flex items-start gap-2 px-5 py-2 bg-amber-50 border-b border-amber-100 text-[11px] leading-snug text-amber-800">
                        <svg class="w-3.5 h-3.5 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
                        <span><b>Fan-out:</b> o roteador escolhe <b>um</b> destino entre estes. Se um destino precisa do <b>resultado</b> de outro (ex.: buscar a partir do endereço resolvido), encadeie-os em <b>sequência</b> (A → B) — não como irmãos do roteador.</span>
                    </div>
                    <!-- Edge row -->
                    <div x-show="item.edge && item.type === 'edge' && !collapsedChains[item.rootId]" x-transition.duration.150ms
                         :id="item.edge?.id ? ('conn-' + item.edge.id) : null"
                         class="group flex items-center gap-3 px-5 py-2.5 hover:bg-surface-50/50 transition-colors"
                         :class="editingConnId === item.edge?.id && connEditorOpen ? 'mesh-conn-editing ring-2 ring-amber-400 bg-amber-50/70' : ''"
                         :style="'padding-left:' + (20 + (item.depth||0) * 28) + 'px'">
                        <span class="text-[12px] font-mono font-bold shrink-0 min-w-[50px]"
                              :class="(item.depth||0)<=1?'text-brand-600':(item.depth||0)===2?'text-red-500':'text-teal-500'"
                              x-text="item.number"></span>
                        <template x-if="(item.depth||0) > 1">
                            <div class="flex items-center shrink-0">
                                <div class="w-3 h-px" :class="(item.depth||0)===2?'bg-red-200':'bg-teal-200'"></div>
                                <div class="w-1.5 h-1.5 rounded-full" :class="(item.depth||0)===2?'bg-red-300':'bg-teal-300'"></div>
                                <div class="w-2 h-px" :class="(item.depth||0)===2?'bg-red-200':'bg-teal-200'"></div>
                            </div>
                        </template>
                        <div class="flex h-7 w-7 items-center justify-center rounded-full text-[8px] font-bold text-white shrink-0"
                             :class="nodeKindColor(item.edge?.source)" x-text="nodeName(item.edge?.source).substring(0,2).toUpperCase()"></div>
                        <div class="min-w-0 max-w-[140px]">
                            <div class="text-[11px] font-semibold text-brand-900 truncate" x-text="nodeName(item.edge?.source)"></div>
                        </div>
                        <div class="flex items-center gap-1.5 shrink-0">
                            <svg class="w-6 h-2.5 text-surface-300" viewBox="0 0 24 10"><line x1="0" y1="5" x2="18" y2="5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,2"/><polygon points="18,1 24,5 18,9" fill="currentColor"/></svg>
                            <span class="rounded-full px-2 py-0.5 text-[8px] font-bold uppercase tracking-wider"
                                  :class="item.edge?.type==='sequential'?'bg-brand-50 text-brand-600':item.edge?.type==='parallel'?'bg-red-50 text-red-600':'bg-amber-50 text-amber-600'"
                                  x-text="item.edge?.type"></span>
                            <svg class="w-4 h-2.5 text-surface-300" viewBox="0 0 16 10"><line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,2"/><polygon points="10,1 16,5 10,9" fill="currentColor"/></svg>
                        </div>
                        <div class="flex h-7 w-7 items-center justify-center rounded-full text-[8px] font-bold text-white shrink-0"
                             :class="nodeKindColor(item.edge?.target)" x-text="nodeName(item.edge?.target).substring(0,2).toUpperCase()"></div>
                        <div class="min-w-0 max-w-[140px]">
                            <div class="text-[11px] font-semibold text-brand-900 truncate" x-text="nodeName(item.edge?.target)"></div>
                        </div>
                        <div class="flex-1"></div>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                            <button @click="openConnEditor(item.edge)" class="p-1 rounded-md hover:bg-brand-50 text-surface-400 hover:text-brand-600" title="Editar">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>
                            </button>
                            <button @click="deleteConnection(item.edge?.id)" class="p-1 rounded-md hover:bg-rose-50 text-surface-400 hover:text-rose-600" title="Excluir">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- ══ GROUPS ══ -->
    <div class="space-y-4">
        <template x-for="group in groups" :key="group.id">
            <div class="rounded-xl border overflow-hidden transition-all" :style="'border-color:' + getGroupColor(group.color).border">
                <div class="flex items-center justify-between px-4 py-3 cursor-pointer select-none" :style="'background:' + getGroupColor(group.color).bg" @click="group.collapsed = !group.collapsed">
                    <div class="flex items-center gap-3">
                        <svg class="w-4 h-4 transition-transform duration-200" :class="group.collapsed ? '-rotate-90' : ''" :style="'color:' + getGroupColor(group.color).text" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                        <span class="text-[13px] font-bold" :style="'color:' + getGroupColor(group.color).text" x-text="group.name"></span>
                        <span class="rounded-full px-2 py-0.5 text-[10px] font-medium bg-white/60" :style="'color:' + getGroupColor(group.color).text" x-text="groupAgents(group).length + ' agente(s)'"></span>
                    </div>
                    <div class="flex items-center gap-1" @click.stop>
                        <select @change="assignToGroup(group.id, $event.target.value); $event.target.value=''" class="rounded-lg border border-white/40 bg-white/50 px-2 py-1 text-[10px] outline-none max-w-[150px]" :style="'color:' + getGroupColor(group.color).text">
                            <option value="">+ Agente</option>
                            <template x-for="n in unassignedNodes" :key="n.id"><option :value="n.id" x-text="n.name"></option></template>
                        </select>
                        <button @click="renameGroup(group)" class="p-1 rounded hover:bg-white/30" :style="'color:' + getGroupColor(group.color).text"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg></button>
                        <button @click="removeGroup(group.id)" class="p-1 rounded hover:bg-white/30" :style="'color:' + getGroupColor(group.color).text"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                    </div>
                </div>
                <div x-show="!group.collapsed" x-transition.duration.200ms class="bg-white p-4">
                    <template x-if="groupAgents(group).length === 0"><div class="text-center py-4 text-[12px] text-surface-400">Use "+ Agente" para adicionar</div></template>
                    <div class="flex flex-wrap gap-3">
                        <template x-for="node in groupAgents(group)" :key="node.id">
                            <div class="flex items-center gap-2.5 rounded-xl border border-surface-200 bg-white px-3.5 py-2.5 shadow-sm hover:shadow-md transition-shadow">
                                <div class="flex h-9 w-9 items-center justify-center rounded-full text-[10px] font-bold text-white shrink-0" :class="node.kind==='aobd'?'bg-rose-500':node.kind==='router'?'bg-orange-500':'bg-teal-500'" x-text="node.name?.substring(0,2).toUpperCase()"></div>
                                <div><div class="text-[12px] font-semibold text-brand-900" x-text="node.name"></div><div class="text-[9px] text-surface-400" x-text="node.kind+' · '+node.model+' · v'+(node.version||'1.0.0')"></div></div>
                                <button @click="unassignFromGroup(group.id, node.id)" class="ml-1 p-0.5 rounded text-surface-300 hover:text-rose-500"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
        <!-- Ungrouped -->
        <template x-if="unassignedNodes.length > 0">
            <div class="rounded-xl border border-dashed border-surface-300 overflow-hidden">
                <div class="flex items-center justify-between px-4 py-3 bg-surface-50 cursor-pointer select-none" @click="ungroupedCollapsed = !ungroupedCollapsed">
                    <div class="flex items-center gap-3">
                        <svg class="w-4 h-4 text-surface-400 transition-transform duration-200" :class="ungroupedCollapsed ? '-rotate-90' : ''" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                        <span class="text-[13px] font-semibold text-surface-500">Sem Grupo</span>
                        <span class="rounded-full bg-surface-200 px-2 py-0.5 text-[10px] font-medium text-surface-500" x-text="unassignedNodes.length + ' agente(s)'"></span>
                    </div>
                </div>
                <div x-show="!ungroupedCollapsed" x-transition.duration.200ms class="bg-white p-4">
                    <div class="flex flex-wrap gap-3">
                        <template x-for="node in unassignedNodes" :key="node.id">
                            <div class="flex items-center gap-2.5 rounded-xl border border-dashed border-surface-200 bg-surface-50 px-3.5 py-2.5">
                                <div class="flex h-9 w-9 items-center justify-center rounded-full text-[10px] font-bold text-white shrink-0" :class="node.kind==='aobd'?'bg-rose-500':node.kind==='router'?'bg-orange-500':'bg-teal-500'" x-text="node.name?.substring(0,2).toUpperCase()"></div>
                                <div><div class="text-[12px] font-semibold text-brand-900" x-text="node.name"></div><div class="text-[9px] text-surface-400" x-text="node.kind+' · '+node.model+' · v'+(node.version||'1.0.0')"></div></div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>

    </div><!-- end main content -->

    <!-- ══════════════════════════════════════════════════ -->
    <!-- RIGHT: Pipeline Detail Panel                      -->
    <!-- ══════════════════════════════════════════════════ -->
    <aside x-show="detailOpen" x-transition.duration.200ms class="hidden lg:flex w-[380px] flex-col border-l border-surface-200 bg-white shrink-0 overflow-hidden">
        <div class="flex items-center justify-between border-b border-surface-100 px-5 py-3">
            <div class="flex items-center gap-2 min-w-0">
                <svg class="w-4 h-4 text-brand-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M8 7.5l3 8m5-8l-3 8M7.5 5h9"/></svg>
                <span class="text-[12px] font-semibold text-brand-900 truncate" x-text="detailName || 'Pipeline'"></span>
            </div>
            <div class="flex items-center gap-1">
                <a :href="'/workspace?agent=' + detailRootId + '&mode=pipeline'" class="p-1.5 rounded-md hover:bg-emerald-50 text-surface-400 hover:text-emerald-600" title="Testar pipeline">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>
                </a>
                <button @click="detailOpen=false" class="p-1.5 rounded-md hover:bg-surface-100 text-surface-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto scrollbar-thin p-5 space-y-4">
            <!-- Summary -->
            <div class="rounded-xl bg-brand-50 border border-brand-100 p-4">
                <div class="grid grid-cols-3 gap-3 text-center">
                    <div><div class="text-[18px] font-bold text-brand-900" x-text="detailChain.length"></div><div class="text-[9px] text-brand-500 uppercase">Agentes</div></div>
                    <div><div class="text-[18px] font-bold text-brand-900" x-text="detailPassthroughCount"></div><div class="text-[9px] text-amber-500 uppercase">Pass-through</div></div>
                    <div><div class="text-[18px] font-bold text-brand-900" x-text="detailActiveCount"></div><div class="text-[9px] text-emerald-500 uppercase">Ativos (LLM)</div></div>
                </div>
            </div>

            <!-- Chain agents -->
            <div>
                <h3 class="text-[11px] font-bold text-brand-900 uppercase tracking-wider mb-3">Cadeia de Execução</h3>
                <div class="space-y-0">
                    <template x-for="(ag, i) in detailChain" :key="ag.id">
                        <div class="flex gap-3">
                            <div class="flex flex-col items-center">
                                <div class="flex h-8 w-8 items-center justify-center rounded-full text-[9px] font-bold shrink-0"
                                     :class="ag._passthrough ? 'bg-amber-100 text-amber-700 border-2 border-dashed border-amber-300' : (ag.kind==='aobd'?'bg-rose-100 text-rose-700':ag.kind==='router'?'bg-orange-100 text-orange-700':'bg-teal-100 text-teal-700')"
                                     x-text="i+1"></div>
                                <div x-show="i < detailChain.length - 1" class="w-px flex-1 min-h-[16px]" :class="ag._passthrough ? 'bg-amber-200 border-l border-dashed border-amber-300' : 'bg-surface-200'"></div>
                            </div>
                            <div class="pb-4 flex-1 min-w-0">
                                <!-- Agent header -->
                                <div class="flex items-center gap-1.5 flex-wrap">
                                    <span class="text-[12px] font-semibold text-brand-900" x-text="ag.name"></span>
                                    <span class="rounded-full px-1.5 py-0.5 text-[9px] font-bold uppercase"
                                          :class="ag.kind==='aobd'?'bg-rose-50 text-rose-600':ag.kind==='router'?'bg-orange-50 text-orange-600':'bg-teal-50 text-teal-600'"
                                          x-text="ag.kind==='aobd'?'AOBD':ag.kind==='router'?'AR':'SA'"></span>
                                    <span x-show="ag._passthrough" class="rounded-full bg-amber-50 px-1.5 py-0.5 text-[8px] font-bold text-amber-600">PASS-THROUGH</span>
                                </div>
                                <!-- Config -->
                                <div class="rounded-lg bg-surface-50 border border-surface-100 p-2.5 mt-2 space-y-1.5 text-[10px]">
                                    <div class="flex justify-between"><span class="text-surface-400">Modelo</span><span class="font-mono font-medium text-brand-900" x-text="ag.model || '—'"></span></div>
                                    <div class="flex justify-between"><span class="text-surface-400">Versão</span><span class="font-mono text-brand-900" x-text="'v' + (ag.version||'1.0.0')"></span></div>
                                    <div x-show="ag.domain" class="flex justify-between"><span class="text-surface-400">Domínio</span><span class="text-brand-900" x-text="ag.domain"></span></div>
                                    <div class="flex justify-between">
                                        <span class="text-surface-400">Pipeline</span>
                                        <span class="font-medium" :class="ag._passthrough ? 'text-amber-600' : 'text-emerald-600'" x-text="ag._passthrough ? 'Pass-through (0ms)' : 'Execução ativa'"></span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-surface-400">Evidência</span>
                                        <span class="font-medium" :class="ag.require_evidence ? 'text-emerald-600' : 'text-surface-400'" x-text="ag.require_evidence ? 'Sim' : 'Não'"></span>
                                    </div>
                                </div>
                                <!-- Skill -->
                                <div x-show="ag._skill_name" class="rounded-lg border border-teal-100 bg-teal-50/30 p-2.5 mt-2">
                                    <div class="flex items-center gap-1.5">
                                        <span class="text-[10px] font-semibold text-teal-800" x-text="ag._skill_name"></span>
                                        <span class="rounded-full bg-teal-100 px-1.5 py-0.5 text-[8px] font-mono text-teal-600" x-text="'v' + (ag._skill_version||'?')"></span>
                                    </div>
                                    <div x-show="ag._skill_exec_mode" class="flex items-center gap-1 mt-1">
                                        <svg class="w-3 h-3" :class="ag._skill_exec_mode==='fast'?'text-emerald-500':ag._skill_exec_mode==='rigorous'?'text-amber-500':'text-brand-500'" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
                                        <span class="text-[9px] font-semibold" :class="ag._skill_exec_mode==='fast'?'text-emerald-700':ag._skill_exec_mode==='rigorous'?'text-amber-700':'text-brand-700'" x-text="'Exec: ' + ag._skill_exec_mode"></span>
                                    </div>
                                    <p x-show="ag._skill_purpose" class="text-[9px] text-surface-500 mt-1 leading-relaxed" x-text="ag._skill_purpose?.substring(0,150)"></p>
                                </div>
                                <div x-show="!ag._skill_name && !ag._passthrough" class="text-[9px] text-surface-400 mt-1.5">Sem skill vinculada</div>
                                <!-- Passthrough explanation -->
                                <div x-show="ag._passthrough" class="text-[9px] text-amber-600 mt-1.5 leading-relaxed">
                                    Sem SKILL.md + prompt genérico — ignorado em runtime, input propagado ao próximo agente.
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Connections -->
            <div>
                <h3 class="text-[11px] font-bold text-brand-900 uppercase tracking-wider mb-2">Conexões</h3>
                <div class="space-y-1.5">
                    <template x-for="conn in detailConnections" :key="conn.id">
                        <div class="flex items-center gap-2 rounded-lg bg-surface-50 px-3 py-2 text-[10px]">
                            <span class="font-semibold text-brand-900 truncate max-w-[90px]" x-text="nodeName(conn.source)"></span>
                            <span class="rounded-full px-1.5 py-0.5 text-[8px] font-bold uppercase shrink-0"
                                  :class="conn.type==='sequential'?'bg-brand-50 text-brand-600':conn.type==='parallel'?'bg-red-50 text-red-600':'bg-amber-50 text-amber-600'"
                                  x-text="conn.type"></span>
                            <span class="font-semibold text-brand-900 truncate max-w-[90px]" x-text="nodeName(conn.target)"></span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- System Prompts summary -->
            <div>
                <h3 class="text-[11px] font-bold text-brand-900 uppercase tracking-wider mb-2">System Prompts</h3>
                <div class="space-y-2">
                    <template x-for="ag in detailChain" :key="'sp-'+ag.id">
                        <div class="rounded-lg border border-surface-100 overflow-hidden">
                            <div class="flex items-center justify-between bg-surface-50 px-3 py-1.5">
                                <span class="text-[10px] font-semibold text-brand-900" x-text="ag.name"></span>
                                <span class="text-[9px] font-mono text-surface-300" x-text="(ag.system_prompt||'').length + ' chars'"></span>
                            </div>
                            <pre class="px-3 py-2 text-[9px] font-mono text-surface-600 whitespace-pre-wrap max-h-20 overflow-y-auto scrollbar-thin bg-white" x-text="ag.system_prompt?.substring(0, 300) || '—'"></pre>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </aside>

    <!-- ══ CONNECTION EDITOR MODAL (Wizard 2026-06-01) ══
         Modal redesenhado em 2 modos:
         - "basic": sequential/parallel — form direto (paridade UX legada)
         - "conditional": tabs Contexto/Padrão/Refinar/Simular com vars panel
           e simulador em tempo real chamando /test-conditional.
         Header com breadcrumb da origem→destino quando isEdit. -->
    <template x-if="connEditorOpen">
        <div class="fixed inset-0 z-[9990] flex items-center justify-center p-4">
            <div class="fixed inset-0 bg-black/40" @click="connEditorOpen = false"></div>
            <div class="relative z-10 w-full max-w-3xl rounded-2xl bg-white shadow-2xl border border-surface-200 fade-in overflow-hidden max-h-[90vh] flex flex-col">
                <!-- Header com breadcrumb -->
                <div class="border-b border-surface-100 px-6 py-4 flex items-center justify-between gap-4">
                    <div class="min-w-0">
                        <h3 class="text-[15px] font-bold text-brand-900" x-text="editingConnId ? 'Editar Conexão' : 'Nova Conexão'"></h3>
                        <div x-show="currentEdgeContext" class="mt-1 flex items-center gap-2 text-[11px] text-surface-500 truncate">
                            <span x-text="currentEdgeContext?.sourceName || '?'"></span>
                            <span class="rounded bg-surface-100 px-1.5 py-0.5 text-[9px] font-mono uppercase" x-text="currentEdgeContext?.sourceKind || ''"></span>
                            <svg class="w-3 h-3 text-surface-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                            <span x-text="currentEdgeContext?.targetName || '?'"></span>
                            <span class="rounded bg-surface-100 px-1.5 py-0.5 text-[9px] font-mono uppercase" x-text="currentEdgeContext?.targetKind || ''"></span>
                        </div>
                    </div>
                    <button @click="connEditorOpen = false" class="p-1.5 rounded-lg hover:bg-surface-100 text-surface-400 shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                </div>

                <!-- Body (scrollable) -->
                <div class="px-6 py-5 space-y-5 overflow-y-auto flex-1">
                    <!-- Origem/Destino -->
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <label class="block text-[11px] font-semibold text-surface-500 mb-1.5">Agente Origem</label>
                            <select x-model="connForm.source_agent_id" class="w-full rounded-xl border-2 border-surface-200 bg-white px-3 py-3 text-[13px] text-brand-900 outline-none focus:border-brand-400">
                                <option value="">Selecione...</option>
                                <template x-for="node in activeNodes" :key="node.id"><option :value="node.id" x-text="node.name + ' (' + node.kind + ')'"></option></template>
                            </select>
                        </div>
                        <div class="flex flex-col items-center pt-5 shrink-0">
                            <svg class="w-10 h-6 text-brand-400" viewBox="0 0 40 24"><line x1="2" y1="12" x2="30" y2="12" stroke="currentColor" stroke-width="2.5" stroke-dasharray="5,3"/><polygon points="30,6 40,12 30,18" fill="currentColor"/></svg>
                        </div>
                        <div class="flex-1">
                            <label class="block text-[11px] font-semibold text-surface-500 mb-1.5">Agente Destino</label>
                            <select x-model="connForm.target_agent_id" class="w-full rounded-xl border-2 border-surface-200 bg-white px-3 py-3 text-[13px] text-brand-900 outline-none focus:border-brand-400">
                                <option value="">Selecione...</option>
                                <template x-for="node in activeNodes" :key="node.id"><option :value="node.id" x-text="node.name + ' (' + node.kind + ')'"></option></template>
                            </select>
                        </div>
                    </div>

                    <!-- Tipo de Conexão -->
                    <div>
                        <label class="block text-[11px] font-semibold text-surface-500 mb-2">Tipo de Conexão</label>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="relative">
                                <button @click="connForm.connection_type = 'sequential'" type="button" class="w-full rounded-xl border-2 p-3 text-center transition-all" :class="connForm.connection_type==='sequential' ? 'border-brand-400 bg-brand-50 ring-2 ring-brand-100' : 'border-surface-200 hover:border-surface-300'">
                                    <svg class="w-6 h-6 mx-auto mb-1.5" :class="connForm.connection_type==='sequential'?'text-brand-600':'text-surface-400'" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
                                    <div class="text-[12px] font-semibold" :class="connForm.connection_type==='sequential'?'text-brand-900':'text-surface-500'">Sequencial</div>
                                </button>
                                <span x-data="{o:false}" @click.outside="o=false" class="absolute top-1.5 right-1.5">
                                    <button type="button" @click.stop="o=!o" title="O que é / quando usar" class="flex h-4 w-4 items-center justify-center rounded-full bg-surface-100 text-[10px] font-bold leading-none text-surface-500 hover:bg-surface-200 hover:text-surface-700">?</button>
                                    <div x-show="o" x-transition @click.stop class="absolute right-0 z-30 mt-1 w-56 rounded-lg border border-surface-200 bg-white p-3 text-left shadow-lg">
                                        <div class="text-[11px] font-bold text-brand-900" x-text="connTypeHelp['sequential']?.label || 'Sequencial'"></div>
                                        <div class="mt-1.5 text-[9px] font-bold uppercase tracking-wide text-surface-400">O que é</div>
                                        <div class="text-[11px] leading-snug text-surface-600" x-text="connTypeHelp['sequential']?.what || '—'"></div>
                                        <div class="mt-1.5 text-[9px] font-bold uppercase tracking-wide text-surface-400">Quando usar</div>
                                        <div class="text-[11px] leading-snug text-surface-600" x-text="connTypeHelp['sequential']?.when || '—'"></div>
                                    </div>
                                </span>
                            </div>
                            <div class="relative">
                                <button @click="connForm.connection_type = 'parallel'" type="button" class="w-full rounded-xl border-2 p-3 text-center transition-all" :class="connForm.connection_type==='parallel' ? 'border-red-400 bg-red-50 ring-2 ring-red-100' : 'border-surface-200 hover:border-surface-300'">
                                    <svg class="w-6 h-6 mx-auto mb-1.5" :class="connForm.connection_type==='parallel'?'text-red-600':'text-surface-400'" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
                                    <div class="text-[12px] font-semibold" :class="connForm.connection_type==='parallel'?'text-red-900':'text-surface-500'">Paralelo</div>
                                </button>
                                <span x-data="{o:false}" @click.outside="o=false" class="absolute top-1.5 right-1.5">
                                    <button type="button" @click.stop="o=!o" title="O que é / quando usar" class="flex h-4 w-4 items-center justify-center rounded-full bg-surface-100 text-[10px] font-bold leading-none text-surface-500 hover:bg-surface-200 hover:text-surface-700">?</button>
                                    <div x-show="o" x-transition @click.stop class="absolute right-0 z-30 mt-1 w-56 rounded-lg border border-surface-200 bg-white p-3 text-left shadow-lg">
                                        <div class="text-[11px] font-bold text-brand-900" x-text="connTypeHelp['parallel']?.label || 'Paralelo'"></div>
                                        <div class="mt-1.5 text-[9px] font-bold uppercase tracking-wide text-surface-400">O que é</div>
                                        <div class="text-[11px] leading-snug text-surface-600" x-text="connTypeHelp['parallel']?.what || '—'"></div>
                                        <div class="mt-1.5 text-[9px] font-bold uppercase tracking-wide text-surface-400">Quando usar</div>
                                        <div class="text-[11px] leading-snug text-surface-600" x-text="connTypeHelp['parallel']?.when || '—'"></div>
                                    </div>
                                </span>
                            </div>
                            <div class="relative">
                                <button @click="connForm.connection_type = 'conditional'" type="button" class="w-full rounded-xl border-2 p-3 text-center transition-all" :class="connForm.connection_type==='conditional' ? 'border-amber-400 bg-amber-50 ring-2 ring-amber-100' : 'border-surface-200 hover:border-surface-300'">
                                    <svg class="w-6 h-6 mx-auto mb-1.5" :class="connForm.connection_type==='conditional'?'text-amber-600':'text-surface-400'" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/></svg>
                                    <div class="text-[12px] font-semibold" :class="connForm.connection_type==='conditional'?'text-amber-900':'text-surface-500'">Condicional</div>
                                </button>
                                <span x-data="{o:false}" @click.outside="o=false" class="absolute top-1.5 right-1.5">
                                    <button type="button" @click.stop="o=!o" title="O que é / quando usar" class="flex h-4 w-4 items-center justify-center rounded-full bg-surface-100 text-[10px] font-bold leading-none text-surface-500 hover:bg-surface-200 hover:text-surface-700">?</button>
                                    <div x-show="o" x-transition @click.stop class="absolute right-0 z-30 mt-1 w-56 rounded-lg border border-surface-200 bg-white p-3 text-left shadow-lg">
                                        <div class="text-[11px] font-bold text-brand-900" x-text="connTypeHelp['conditional']?.label || 'Condicional'"></div>
                                        <div class="mt-1.5 text-[9px] font-bold uppercase tracking-wide text-surface-400">O que é</div>
                                        <div class="text-[11px] leading-snug text-surface-600" x-text="connTypeHelp['conditional']?.what || '—'"></div>
                                        <div class="mt-1.5 text-[9px] font-bold uppercase tracking-wide text-surface-400">Quando usar</div>
                                        <div class="text-[11px] leading-snug text-surface-600" x-text="connTypeHelp['conditional']?.when || '—'"></div>
                                    </div>
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- ─── Wizard (só quando type=conditional) ─── -->
                    <div x-show="connForm.connection_type === 'conditional'" x-transition class="rounded-xl border-2 border-amber-200 bg-amber-50/30">
                        <!-- Tabs -->
                        <div class="flex border-b border-amber-200 bg-amber-100/40">
                            <template x-for="t in ['context','pattern','refine','simulate']" :key="t">
                                <button @click="condTab = t" type="button"
                                        class="flex-1 px-3 py-2.5 text-[11px] font-semibold transition-colors"
                                        :class="condTab === t ? 'bg-amber-50 text-amber-900 border-b-2 border-amber-500' : 'text-amber-600 hover:bg-amber-50/60'">
                                    <span x-show="t==='context'">1. Contexto</span>
                                    <span x-show="t==='pattern'">2. Padrão</span>
                                    <span x-show="t==='refine'">3. Refinar</span>
                                    <span x-show="t==='simulate'">4. Simular</span>
                                </button>
                            </template>
                        </div>
                        <div class="p-4 space-y-3">
                            <!-- Tab 1: Contexto -->
                            <div x-show="condTab === 'context'" class="space-y-3 text-[12px] text-amber-900">
                                <div class="text-[11px] leading-relaxed">
                                    Conexões condicionais funcionam como <strong>gate de continuação</strong>:
                                    a regra é avaliada contra o output do agente <strong>origem</strong> antes de executar o
                                    <strong>destino</strong>. Quando verdadeira → executa. Quando falsa → pula
                                    (passthrough — output do origem segue adiante).
                                </div>
                                <div class="rounded-lg bg-white border border-amber-200 p-3 text-[11px] space-y-1.5">
                                    <div class="flex gap-2"><span class="text-amber-600 font-semibold w-16 shrink-0">Origem:</span><span x-text="(currentEdgeContext?.sourceName||'—') + ' (' + (currentEdgeContext?.sourceKind||'?') + ')'"></span></div>
                                    <div class="flex gap-2"><span class="text-amber-600 font-semibold w-16 shrink-0">Destino:</span><span x-text="(currentEdgeContext?.targetName||'—') + ' (' + (currentEdgeContext?.targetKind||'?') + ')'"></span></div>
                                </div>
                                <div class="text-[10px] italic text-amber-700">
                                    <strong>Kind do agente</strong> ajuda a escolher a regra: <code class="bg-amber-100 px-1">aobd</code> (orquestrador) costuma ter output estruturado; <code class="bg-amber-100 px-1">router</code> uma decisão; <code class="bg-amber-100 px-1">subagent</code> uma resposta livre.
                                </div>
                                <button @click="condTab = 'pattern'" type="button" class="text-[11px] font-semibold text-amber-700 hover:text-amber-900 inline-flex items-center gap-1">
                                    Próximo: escolher padrão →
                                </button>
                            </div>

                            <!-- Tab 2: Padrão (4 cards de template) -->
                            <div x-show="condTab === 'pattern'" class="space-y-3">
                                <div class="text-[11px] text-amber-900">Escolha um <strong>padrão de regra</strong>. Os cards pré-preenchem o textarea no passo seguinte; você pode refinar depois.</div>
                                <div class="grid grid-cols-2 gap-2">
                                    <button @click="applyPattern('keyword')" type="button" class="rounded-lg border border-amber-300 bg-white hover:bg-amber-50 p-3 text-left transition-all">
                                        <div class="text-[12px] font-semibold text-amber-900">Contém palavra-chave</div>
                                        <div class="text-[10px] text-amber-700 mt-0.5">Ex.: <code class="bg-amber-100 px-1">'imagem' in output_lower</code></div>
                                    </button>
                                    <button @click="applyPattern('state')" type="button" class="rounded-lg border border-amber-300 bg-white hover:bg-amber-50 p-3 text-left transition-all">
                                        <div class="text-[12px] font-semibold text-amber-900">Estado final do FSM</div>
                                        <div class="text-[10px] text-amber-700 mt-0.5">Ex.: <code class="bg-amber-100 px-1">final_state == 'Recommend'</code></div>
                                    </button>
                                    <button @click="applyPattern('length')" type="button" class="rounded-lg border border-amber-300 bg-white hover:bg-amber-50 p-3 text-left transition-all">
                                        <div class="text-[12px] font-semibold text-amber-900">Tamanho do output</div>
                                        <div class="text-[10px] text-amber-700 mt-0.5">Ex.: <code class="bg-amber-100 px-1">output_length &gt; 200</code></div>
                                    </button>
                                    <button @click="applyPattern('custom')" type="button" class="rounded-lg border border-amber-300 bg-white hover:bg-amber-50 p-3 text-left transition-all">
                                        <div class="text-[12px] font-semibold text-amber-900">Expressão livre (Jinja)</div>
                                        <div class="text-[10px] text-amber-700 mt-0.5">Comece do zero e use o vars panel</div>
                                    </button>
                                </div>
                            </div>

                            <!-- Tab 3: Refinar (textarea + vars panel) -->
                            <div x-show="condTab === 'refine'" class="space-y-3">
                                <div>
                                    <label class="block text-[11px] font-semibold text-amber-900 mb-1.5">Regra (expressão Jinja booleana)</label>
                                    <textarea x-model="connForm.condition_expr"
                                              rows="3"
                                              placeholder="'imagem' in output_lower"
                                              class="w-full rounded-lg border border-amber-300 bg-white px-3 py-2 text-[12px] font-mono text-brand-900 outline-none focus:border-amber-500 placeholder:text-amber-400/70"></textarea>
                                </div>
                                <div>
                                    <div class="text-[10px] font-bold text-amber-700 uppercase tracking-wider mb-1.5">Variáveis disponíveis (clique para inserir)</div>
                                    <div class="grid grid-cols-2 gap-1 max-h-56 overflow-y-auto pr-1">
                                        <template x-for="v in conditionalVars" :key="v.name">
                                            <button @click="insertVar(v.name)" type="button" class="text-left rounded-md border border-amber-200 bg-white hover:bg-amber-50 px-2 py-1.5 transition-colors">
                                                <div class="text-[11px] font-mono font-semibold text-amber-900" x-text="v.name"></div>
                                                <div class="text-[9px] text-amber-600" x-text="v.type + ' · ' + v.desc"></div>
                                            </button>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <!-- Tab 4: Simular -->
                            <div x-show="condTab === 'simulate'" class="space-y-3">
                                <div class="text-[11px] text-amber-900">Cole um <strong>output de exemplo</strong> abaixo. A regra é avaliada em tempo real contra esse contexto — você sabe se vai passar ou pular antes de salvar.</div>
                                <div>
                                    <label class="block text-[10px] font-bold text-amber-700 uppercase tracking-wider mb-1">output (texto do agente origem)</label>
                                    <textarea x-model="sim.output" @input.debounce.400ms="runSimulation()"
                                              rows="3"
                                              placeholder="Cole aqui um output de exemplo..."
                                              class="w-full rounded-lg border border-amber-300 bg-white px-3 py-2 text-[12px] text-brand-900 outline-none focus:border-amber-500"></textarea>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-amber-700 uppercase tracking-wider mb-1">final_state</label>
                                    <select x-model="sim.final_state" @change="runSimulation()" class="rounded-lg border border-amber-300 bg-white px-3 py-1.5 text-[12px] text-brand-900">
                                        <option value="">(não definido)</option>
                                        <option value="Recommend">Recommend</option>
                                        <option value="Refuse">Refuse</option>
                                        <option value="Escalate">Escalate</option>
                                        <option value="LogAndClose">LogAndClose</option>
                                    </select>
                                </div>
                                <div class="rounded-lg border-2 p-3"
                                     :class="sim.error ? 'border-rose-300 bg-rose-50' : (sim.result === true ? 'border-emerald-300 bg-emerald-50' : (sim.result === false ? 'border-amber-300 bg-amber-50' : 'border-surface-200 bg-surface-50'))">
                                    <div class="flex items-center justify-between">
                                        <span class="text-[11px] font-bold uppercase tracking-wider"
                                              :class="sim.error ? 'text-rose-700' : (sim.result === true ? 'text-emerald-700' : (sim.result === false ? 'text-amber-700' : 'text-surface-500'))">
                                            Resultado
                                        </span>
                                        <span x-show="sim.loading" class="text-[10px] text-amber-600">avaliando…</span>
                                    </div>
                                    <div class="mt-1">
                                        <span x-show="!sim.loading && sim.error" class="text-[12px] font-mono text-rose-800" x-text="sim.error"></span>
                                        <span x-show="!sim.loading && !sim.error && sim.result === true" class="text-[14px] font-bold text-emerald-700">✓ verdadeiro — destino EXECUTA</span>
                                        <span x-show="!sim.loading && !sim.error && sim.result === false" class="text-[14px] font-bold text-amber-700">✗ falso — destino é PULADO</span>
                                        <span x-show="!sim.loading && !sim.error && sim.result === null" class="text-[11px] italic text-surface-500">preencha um output exemplo para simular</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ─── Context Scope Wizard (2026-06-01) — independente do tipo de conexão.
                         Controla o QUE do output anterior vira contexto do próximo:
                         inherit (cru) / scoped (filtra via Jinja) / isolated (zero contexto).
                         Funciona ortogonalmente ao conditional (que decide SE executa). -->
                    <div class="rounded-xl border-2 border-indigo-200 bg-indigo-50/30">
                        <button @click="scopeOpen = !scopeOpen" type="button" class="w-full flex items-center justify-between px-4 py-3 hover:bg-indigo-50/60 transition-colors">
                            <div class="flex items-center gap-3 min-w-0">
                                <svg class="w-5 h-5 text-indigo-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7M3 7l9-4 9 4M3 7l9 4m0 0l9-4m-9 4v10"/></svg>
                                <div class="text-left min-w-0">
                                    <div class="text-[13px] font-bold text-indigo-900">Escopo de Contexto</div>
                                    <div class="text-[10px] text-indigo-700 truncate" x-text="scopeStatusLine()"></div>
                                </div>
                            </div>
                            <svg class="w-4 h-4 text-indigo-500 transition-transform shrink-0" :class="scopeOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                        </button>

                        <div x-show="scopeOpen" x-transition class="border-t border-indigo-200">
                            <!-- Tabs -->
                            <div class="flex border-b border-indigo-200 bg-indigo-100/40">
                                <template x-for="t in ['mode','pattern','refine','simulate']" :key="t">
                                    <button @click="scopeTab = t" type="button"
                                            class="flex-1 px-3 py-2.5 text-[11px] font-semibold transition-colors"
                                            :class="scopeTab === t ? 'bg-indigo-50 text-indigo-900 border-b-2 border-indigo-500' : 'text-indigo-600 hover:bg-indigo-50/60'">
                                        <span x-show="t==='mode'">1. Modo</span>
                                        <span x-show="t==='pattern'">2. Padrão</span>
                                        <span x-show="t==='refine'">3. Refinar</span>
                                        <span x-show="t==='simulate'">4. Simular</span>
                                    </button>
                                </template>
                            </div>
                            <div class="p-4 space-y-3">
                                <!-- Tab 1: Modo (3 cards visuais) -->
                                <div x-show="scopeTab === 'mode'" class="space-y-3">
                                    <div class="text-[11px] leading-relaxed text-indigo-900">
                                        O escopo controla <strong>o que do output do agente anterior</strong> vira contexto do próximo, em complemento ao tipo da conexão (sequencial/condicional). Útil para economizar tokens, isolar SAs atômicos ou aplicar governança de informação.
                                    </div>
                                    <div class="grid grid-cols-3 gap-2">
                                        <template x-for="m in scopeModes" :key="m.id">
                                            <button @click="scopeForm.mode = m.id" type="button"
                                                    class="rounded-lg border-2 p-3 text-left transition-all"
                                                    :class="scopeForm.mode === m.id ? 'border-indigo-400 bg-indigo-50 ring-2 ring-indigo-100' : 'border-surface-200 hover:border-surface-300 bg-white'">
                                                <div class="text-[12px] font-semibold" :class="scopeForm.mode === m.id ? 'text-indigo-900' : 'text-surface-600'" x-text="m.label"></div>
                                                <div class="text-[10px] mt-1 leading-snug" :class="scopeForm.mode === m.id ? 'text-indigo-700' : 'text-surface-500'" x-text="m.desc"></div>
                                            </button>
                                        </template>
                                    </div>
                                    <button @click="scopeTab = (scopeForm.mode === 'scoped' ? 'pattern' : 'simulate')" type="button" class="text-[11px] font-semibold text-indigo-700 hover:text-indigo-900 inline-flex items-center gap-1">
                                        Próximo: <span x-text="scopeForm.mode === 'scoped' ? 'escolher padrão' : 'simular efeito'"></span> →
                                    </button>
                                </div>

                                <!-- Tab 2: Padrão (cards de filtragem para scoped) -->
                                <div x-show="scopeTab === 'pattern'" class="space-y-3">
                                    <div x-show="scopeForm.mode !== 'scoped'" class="text-[11px] italic text-indigo-700">
                                        Padrões de filtragem só se aplicam ao modo <strong>scoped</strong>. Volte ao passo 1 para escolher esse modo.
                                    </div>
                                    <div x-show="scopeForm.mode === 'scoped'" class="space-y-3">
                                        <div class="text-[11px] text-indigo-900">Escolha um padrão de filtragem. Os cards pré-preenchem o template/max_chars; refine no passo seguinte.</div>
                                        <div class="grid grid-cols-2 gap-2">
                                            <button @click="applyScopePattern('truncate')" type="button" class="rounded-lg border border-indigo-300 bg-white hover:bg-indigo-50 p-3 text-left transition-all">
                                                <div class="text-[12px] font-semibold text-indigo-900">Truncar em N chars</div>
                                                <div class="text-[10px] text-indigo-700 mt-0.5">Atalho via <code class="bg-indigo-100 px-1">max_chars</code></div>
                                            </button>
                                            <button @click="applyScopePattern('first_line')" type="button" class="rounded-lg border border-indigo-300 bg-white hover:bg-indigo-50 p-3 text-left transition-all">
                                                <div class="text-[12px] font-semibold text-indigo-900">Só primeira linha</div>
                                                <div class="text-[10px] text-indigo-700 mt-0.5"><code class="bg-indigo-100 px-1">output.split('\n')[0]</code></div>
                                            </button>
                                            <button @click="applyScopePattern('json_only')" type="button" class="rounded-lg border border-indigo-300 bg-white hover:bg-indigo-50 p-3 text-left transition-all">
                                                <div class="text-[12px] font-semibold text-indigo-900">Só bloco JSON</div>
                                                <div class="text-[10px] text-indigo-700 mt-0.5">Extrai <code class="bg-indigo-100 px-1">{...}</code> do texto</div>
                                            </button>
                                            <button @click="applyScopePattern('custom')" type="button" class="rounded-lg border border-indigo-300 bg-white hover:bg-indigo-50 p-3 text-left transition-all">
                                                <div class="text-[12px] font-semibold text-indigo-900">Expressão livre (Jinja)</div>

                                </div>

                                <!-- Tab 3: Refinar (template + max_chars + vars panel) -->
                                <div x-show="scopeTab === 'refine'" class="space-y-3">
                                    <div x-show="scopeForm.mode !== 'scoped'" class="text-[11px] italic text-indigo-700">

                                    </div>

                                            <label class="block text-[11px] font-semibold text-indigo-900 mb-1.5">Template Jinja (expressão que retorna o output filtrado)</label>
                                            <textarea x-model="scopeForm.template" rows="2"
                                                      placeholder="output[:500]"
                                                      class="w-full rounded-lg border border-indigo-300 bg-white px-3 py-2 text-[12px] font-mono text-brand-900 outline-none focus:border-indigo-500 placeholder:text-indigo-400/70"></textarea>
                                            <div class="text-[10px] text-indigo-600 mt-1 italic">Se preenchido, ganha precedência sobre <code class="bg-indigo-100 px-1">max_chars</code> abaixo.</div>
                                        </div>
                                        <div>
                                            <label class="block text-[11px] font-semibold text-indigo-900 mb-1.5">Ou apenas <code class="bg-indigo-100 px-1 text-[10px]">max_chars</code> (atalho — vira <code class="bg-indigo-100 px-1 text-[10px]">output[:N]</code>)</label>
                                            <input type="number" x-model.number="scopeForm.max_chars" min="1" max="100000" placeholder="500"
                                                   class="w-32 rounded-lg border border-indigo-300 bg-white px-3 py-2 text-[12px] text-brand-900 outline-none focus:border-indigo-500" />
                                        </div>
                                        <div>
                                            <div class="text-[10px] font-bold text-indigo-700 uppercase tracking-wider mb-1.5">Variáveis disponíveis (clique para inserir no template)</div>
                                            <div class="grid grid-cols-2 gap-1 max-h-48 overflow-y-auto pr-1">
