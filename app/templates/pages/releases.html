{% extends "layouts/base.html" %}
{% block content %}
<div x-data="releasesPage()" x-init="load()">
    <p class="text-[12px] text-surface-400 mb-6">Version Registry §18 — composição de artefatos (modelo + prompt + índice + policy)</p>
    <div class="flex items-center justify-between mb-6">
        <div class="flex gap-2">
            <template x-for="env in ['staging','canary','production']">
                <button @click="filterEnv=filterEnv===env?null:env;load()" class="rounded-full px-3 py-1 text-[11px] font-medium transition-colors"
                        :class="filterEnv===env?'bg-brand-500 text-white':'bg-surface-100 text-surface-500 hover:bg-surface-200'" x-text="env"></button>
            </template>
        </div>
        <button @click="showForm=!showForm" class="inline-flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2 text-[13px] font-semibold text-white hover:bg-brand-600">+ Nova Release</button>
    </div>
    <div x-show="showForm" x-transition class="rounded-xl border border-brand-200 bg-brand-50/50 p-5 mb-6 space-y-3">
        <div class="grid sm:grid-cols-2 gap-3">
            <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Nome</label>
            <input x-model="form.name" placeholder="release-2026.04-v1" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2 text-[12px] outline-none"></div>
            <div><label class="block text-[11px] font-semibold text-surface-500 mb-1">Ambiente</label>
            <select x-model="form.environment" class="w-full rounded-lg border border-surface-200 bg-white px-3 py-2 text-[12px] outline-none">
                <option value="staging">Staging</option><option value="canary">Canary</option><option value="production">Production</option>
            </select></div>
        </div>
        <button @click="createRelease()" class="rounded-lg bg-brand-500 px-4 py-2 text-[12px] font-semibold text-white hover:bg-brand-600">Criar Release</button>
    </div>
    <div class="space-y-3">
        <template x-for="r in releases" :key="r.id">
            <div class="rounded-xl border border-surface-200 bg-white p-5 hover:shadow-sm transition-all">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2">
                        <h3 class="text-[14px] font-semibold text-brand-900" x-text="r.name || r.id.substring(0,12)"></h3>
                        <span class="rounded-full px-2 py-0.5 text-[10px] font-semibold"
                              :class="{'bg-surface-100 text-surface-500':r.environment==='staging','bg-amber-50 text-amber-700':r.environment==='canary','bg-emerald-50 text-emerald-700':r.environment==='production'}"
                              x-text="r.environment"></span>
                        <span class="rounded-full bg-brand-50 px-2 py-0.5 text-[10px] text-brand-600 font-medium" x-text="r.status"></span>
                    </div>
                    <div class="flex gap-1">
                        <button @click="promote(r.id,'canary')" x-show="r.environment==='staging'" class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-1 text-[11px] font-medium text-amber-700 hover:bg-amber-100">→ Canary</button>
                        <button @click="promote(r.id,'production')" x-show="r.environment==='canary'" class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-1 text-[11px] font-medium text-emerald-700 hover:bg-emerald-100">→ Production</button>
                    </div>
                </div>
                <div class="text-[11px] text-surface-400" x-text="'Criada: ' + (r.created_at?.replace('T',' ').substring(0,16)||'')"></div>
            </div>
        </template>
    </div>
    <template x-if="releases.length===0"><div class="text-center py-12 text-[13px] text-surface-400">Nenhuma release criada</div></template>
</div>
{% endblock %}
{% block scripts %}
<script>
function releasesPage(){return{
    releases:[],showForm:false,filterEnv:null,
    form:{name:'',environment:'staging',model_config_data:'{}',prompt_config:'{}',index_config:'{}',policy_config:'{}'},
    async load(){const params=this.filterEnv?`?environment=${this.filterEnv}`:'';try{this.releases=(await api.get('/api/v1/releases'+params)).releases||[]}catch{}},
    async createRelease(){if(!this.form.name.trim()){showToast('Nome obrigatório','error');return}
    try{await api.post('/api/v1/releases',this.form);showToast('Release criada');this.showForm=false;await this.load()}catch(e){showToast(e.message,'error')}},
    async promote(id,env){try{await api.put(`/api/v1/releases/${id}/promote?target_env=${env}`);showToast(`Promovida para ${env}`);await this.load()}catch(e){showToast(e.message,'error')}},
}}
</script>
{% endblock %}
