# ══════════════════════════════════════════════════════════════════
# AgenteInteligência-AI — docker-compose (VPS Hostinger ready)
#
# Profiles:
#   - minimal (default): app + postgres + redis + qdrant   (~1.5 GB RAM)
#   - full              : adiciona opa + tempo + loki + grafana (Onda 2)
#
# Como subir:
#   docker compose up -d                 # minimal (default)
#   docker compose --profile full up -d  # full (após Onda 2)
#
# Persistência: volumes nomeados (sobrevivem a recreate). Backups em
# infra/scripts/backup.sh. Logs com rotação (max 10MB x 3 arquivos).
# Apenas a porta 7000 do app fica exposta na host — postgres/redis/qdrant
# ficam na rede privada `aimesh`.
# ══════════════════════════════════════════════════════════════════

services:

  # ─── App (FastAPI + LangGraph) ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: agente-inteligencia:local
    container_name: agente_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agente}:${POSTGRES_PASSWORD:-agente}@postgres:5432/${POSTGRES_DB:-agente_inteligencia}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      # Onda 2: o usuário liga OTEL_ENABLED via .env. Se ligado E profile=full estiver
      # ativo, o app exporta traces para tempo:4317. Sem profile=full, OTLP exporter
      # falha em conectar mas app continua (graceful degradation em init_otel).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      # Onda 4b: AI Gateway. App fala com LiteLLM em vez do upstream direto quando
      # LLM_GATEWAY_ENABLED=true (lido do .env). URL aqui é o nome interno do compose.
      LLM_GATEWAY_URL: http://litellm:4000
    ports:
      - "${APP_PORT_HOST:-7000}:7000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      # Onda 4b: app depende de litellm started (não healthy), pois o app pode
      # subir antes do gateway ficar pronto e segue funcionando em modo direto.
      litellm:
        condition: service_started
      # Onda 4a: igual ao litellm — started suficiente, app trata fallback.
      opa:
        condition: service_started
    networks:
      - aimesh
    volumes:
      - app_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agente_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agente}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agente}
      POSTGRES_DB: ${POSTGRES_DB:-agente_inteligencia}
      # Tuning leve para VPS — ajustar conforme RAM disponível
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aimesh
    # Não expõe na host por default — desbloqueie só para debug local
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agente} -d ${POSTGRES_DB:-agente_inteligencia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis (cache de contexto + rate-limit) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: agente_redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--save"
      - "60"
      - "1000"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      - redis_data:/data
    networks:
      - aimesh
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Qdrant (Vector DB) ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: agente_qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: WARN
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aimesh
    # Onda 3: porta exposta em 127.0.0.1 para permitir ingestão e diagnóstico
    # do host (curl, dashboard Qdrant em http://localhost:6333/dashboard).
    # Em produção, fechar de novo (Qdrant é alcançado via rede `aimesh` pelo app).
    ports:
      - "127.0.0.1:6333:6333"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── OPA (Policy Engine — Onda 4a) ───────────────────────────────
  # Open Policy Agent em modo server. Carrega políticas Rego de
  # infra/opa/policies/ no startup. Endpoint /v1/data/<package>/<rule>
  # retorna decisão JSON. Latência típica ~1-3ms local.
  opa:
    image: openpolicyagent/opa:1.0.0
    container_name: agente_opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=error"
      - "--log-format=json"
      - "/policies"
    volumes:
      - ./infra/opa/policies:/policies:ro
    networks:
      - aimesh
    ports:
      - "127.0.0.1:8181:8181"     # loopback para curl direto / dashboard
    healthcheck:
      # Imagem rootless não tem curl/wget. Usa o próprio binário OPA com
      # --bundles para validar que o servidor responde — simples ping HTTP via Go.
      test: ["CMD", "/opa", "version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── LiteLLM (AI Gateway — Onda 4b) ──────────────────────────────
  # Proxy OpenAI-compatible que roteia para Azure / OpenAI / Maritaca / Ollama.
  # Sobe sempre, mas só é usado pelo app se LLM_GATEWAY_ENABLED=true.
  # Configuração em infra/litellm/config.yaml (montado read-only).
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: agente_litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      LITELLM_MASTER_KEY: ${LLM_GATEWAY_MASTER_KEY:-sk-disabled}
      LITELLM_LOG: WARN
      # Repassa keys upstream — o config.yaml referencia ${VAR} via os.environ/.
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MARITACA_API_KEY: ${MARITACA_API_KEY:-}
      OLLAMA_API_BASE: ${OLLAMA_API_URL:-http://ollama:11434}
      # LangFuse: se as keys estiverem populadas, gateway envia trace de cada call.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    networks:
      - aimesh
    ports:
      # Exposta em loopback para debug/admin local. Em produção: fechar.
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════
  # Onda 2 — Observabilidade self-hosted (profile: full)
  # Não sobem com `docker compose up -d` (default = perfil vazio).
  # Subir tudo: `docker compose --profile full up -d`
  # ════════════════════════════════════════════════════════════════

  # ─── Tempo (backend de traces OTLP) ──────────────────────────────
  tempo:
    image: grafana/tempo:2.6.0
    container_name: agente_tempo
    profiles: ["full"]
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - aimesh
    # Portas internas (não expostas na host):
    #   3200  HTTP API (search, query)
    #   4317  OTLP gRPC (recebe spans do app)
    #   4318  OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Loki (agregador de logs) ────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: agente_loki
    profiles: ["full"]
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - aimesh
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Promtail (tail dos logs do Docker → Loki) ────────────────────
  promtail:
    image: grafana/promtail:3.2.0
    container_name: agente_promtail
    profiles: ["full"]
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - aimesh
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Grafana (UI: dashboards + Explore) ──────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: agente_grafana
    profiles: ["full"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT_HOST:-3000}:3000"
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - aimesh
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ══════════════════════════════════════════════════════════════════
# Volumes nomeados — sobrevivem a `docker compose down` (sem -v)
# ══════════════════════════════════════════════════════════════════
volumes:
  app_data:
    name: agente_app_data
  postgres_data:
    name: agente_postgres_data
  redis_data:
    name: agente_redis_data
  qdrant_data:
    name: agente_qdrant_data
  # Onda 2 — observabilidade (criados sob demanda quando profile=full)
  tempo_data:
    name: agente_tempo_data
  loki_data:
    name: agente_loki_data
  grafana_data:
    name: agente_grafana_data

# ══════════════════════════════════════════════════════════════════
# Network privada interna do AI Mesh
# ══════════════════════════════════════════════════════════════════
networks:
  aimesh:
    name: agente_aimesh
    driver: bridge
