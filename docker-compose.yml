# ══════════════════════════════════════════════════════════════════
# Maestro — docker-compose (VPS Hostinger ready)
#
# Profiles:
#   - minimal (default): app + postgres + redis + qdrant   (~1.5 GB RAM)
#   - full              : adiciona opa + tempo + loki + grafana (Onda 2)
#
# Como subir:
#   docker compose up -d                 # minimal (default)
#   docker compose --profile full up -d  # full (após Onda 2)
#
# Persistência: volumes nomeados (sobrevivem a recreate). Backups em
# infra/scripts/backup.sh. Logs com rotação (max 10MB x 3 arquivos).
# Apenas a porta 7000 do app fica exposta na host — postgres/redis/qdrant
# ficam na rede privada `aimesh`.
# ══════════════════════════════════════════════════════════════════

services:

  # ─── App (FastAPI + LangGraph) ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: agente-inteligencia:local
    container_name: agente_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agente}:${POSTGRES_PASSWORD:-agente}@postgres:5432/${POSTGRES_DB:-agente_inteligencia}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      # Onda 2: o usuário liga OTEL_ENABLED via .env. Se ligado E profile=full estiver
      # ativo, o app exporta traces para tempo:4317. Sem profile=full, OTLP exporter
      # falha em conectar mas app continua (graceful degradation em init_otel).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    ports:
      # Bind em 127.0.0.1: app fica acessível só do host (debug local), NÃO da
      # internet pública. Em produção, Caddy é a única porta exposta (80/443).
      # Docker bypassa UFW — sem o loopback explícito, "7000:7000" abre na WAN
      # mesmo com firewall fechado. Acesso direto debug: `ssh -L 7000:127.0.0.1:7000`.
      - "127.0.0.1:${APP_PORT_HOST:-7000}:7000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      # Onda 4a: started suficiente, app trata fallback (failsafe configurável).
      opa:
        condition: service_started
    networks:
      - aimesh
    volumes:
      # APP_DATA_DIR=/var/lib/agente-persist/app pra persistir uploads/evidências em VPS.
      - ${APP_DATA_DIR:-app_data}:/app/data
      # APP_LOGS_DIR=/var/lib/agente-persist/logs em prod; volume nomeado em dev.
      # Sem este mount, /app/logs/*.log somia em cada `docker restart` e a UI
      # de Manutenção de Logs mostrava sempre "0 B em disco" (bug 2026-05-27).
      # Retenção de 7d é aplicada pelo TimedRotatingFileHandler (backupCount),
      # não pelo Docker — o volume só garante que o arquivo sobrevive a restart.
      - ${APP_LOGS_DIR:-app_logs}:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── PostgreSQL (com extensão pgvector) ──────────────────────────
  # Imagem oficial pgvector/pgvector pré-instala a extensão `vector`.
  # Drop-in replacement do postgres:16-alpine — mesmo PG_DATA layout,
  # mesma versão do Postgres 16. Volumes existentes funcionam sem migração.
  # Onda RAG v3: pgvector substitui Qdrant como backend de embedding.
  # Compat: enquanto Settings.rag_vector_backend=qdrant, esta extensão
  # fica disponível mas ociosa. Migration `CREATE EXTENSION IF NOT EXISTS
  # vector` em database.py é idempotente.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agente_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agente}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agente}
      POSTGRES_DB: ${POSTGRES_DB:-agente_inteligencia}
      # Tuning leve para VPS — ajustar conforme RAM disponível
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      # Aceita tanto nome de volume Docker (default — dev local) quanto path
      # absoluto/relativo (produção). VPS Hostinger apaga volumes Docker entre
      # deploys — setar PG_DATA_DIR=/var/lib/agente-persist/postgres no .env real
      # pra dados sobreviverem a redeploy. Veja DEPLOY.md.
      - ${PG_DATA_DIR:-postgres_data}:/var/lib/postgresql/data
    networks:
      - aimesh
    # Não expõe na host por default — desbloqueie só para debug local
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agente} -d ${POSTGRES_DB:-agente_inteligencia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis (cache de contexto + rate-limit) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: agente_redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--save"
      - "60"
      - "1000"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      # REDIS_DATA_DIR=/var/lib/agente-persist/redis pra persistir em VPS.
      - ${REDIS_DATA_DIR:-redis_data}:/data
    networks:
      - aimesh
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Qdrant (Vector DB) ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: agente_qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: WARN
    volumes:
      # QDRANT_DATA_DIR=/var/lib/agente-persist/qdrant pra persistir em VPS.
      - ${QDRANT_DATA_DIR:-qdrant_data}:/qdrant/storage
    networks:
      - aimesh
    # Onda 3: porta exposta em 127.0.0.1 para permitir ingestão e diagnóstico
    # do host (curl, dashboard Qdrant em http://localhost:6333/dashboard).
    # Em produção, fechar de novo (Qdrant é alcançado via rede `aimesh` pelo app).
    ports:
      - "127.0.0.1:6333:6333"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Caddy (Reverse proxy + TLS público — Onda 4c) ───────────────
  # Em paralelo com a porta :7000 do app (mantida para back-compat).
  # Caddy reverse proxy (HTTP[S] público).
  # Portas HOST configuráveis via TLS_HTTP_PORT_HOST / TLS_HTTPS_PORT_HOST.
  # Defaults: 8080/8443 (compatível com Windows/Mac sem privilégio + Linux
  # rootless). Para deploy em produção setar explicitamente no .env real:
  #   TLS_HTTP_PORT_HOST=80
  #   TLS_HTTPS_PORT_HOST=443
  # Sintoma se a 80 estiver reservada no host (Windows + Hyper-V/IIS):
  #   "Ports are not available: ... bind: An attempt was made to access a
  #    socket in a way forbidden by its access permissions."
  # Diagnóstico: `netsh int ipv4 show excludedportrange protocol=tcp`.
  # As portas DENTRO do container (80/443) são fixas — Caddy escuta nelas;
  # `TLS_SITE` no Caddyfile usa `:80` independente do mapping host.
  # Modo prod com TLS automático: TLS_SITE=meudominio.com +
  # CADDY_GLOBAL='email admin@meudominio.com' (sem 'auto_https off').
  caddy:
    # Build local com Caddyfile embutido — evita bind mount frágil em deploys
    # tipo Hostinger que não copiam arquivos avulsos do repo pro project dir.
    build:
      context: ./infra/caddy
    image: agente-caddy:local
    container_name: agente_caddy
    restart: unless-stopped
    ports:
      - "${TLS_HTTP_PORT_HOST:-8080}:80"
      - "${TLS_HTTPS_PORT_HOST:-8443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Compose usa ${VAR:-default}. Caddyfile interno usa {$VAR::default} (nativo Caddy).
      # Os defaults aqui são repassados intactos para o container; Caddy aplica seus
      # próprios defaults se a env vier vazia.
      TLS_SITE: ${TLS_SITE:-:80}
      # Em prod, CADDY_GLOBAL deve incluir 'email admin@dominio.com' (sem 'auto_https off')
      # para Caddy obter cert Let's Encrypt. Em dev, deixe 'auto_https off'.
      CADDY_GLOBAL: ${CADDY_GLOBAL:-auto_https off}
    networks:
      - aimesh
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── OPA (Policy Engine — Onda 4a) ───────────────────────────────
  # Open Policy Agent em modo server. Carrega políticas Rego de
  # infra/opa/policies/ no startup. Endpoint /v1/data/<package>/<rule>
  # retorna decisão JSON. Latência típica ~1-3ms local.
  opa:
    build:
      context: ./infra/opa
    image: agente-opa:local
    container_name: agente_opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=error"
      - "--log-format=json"
      - "/policies"
    networks:
      - aimesh
    ports:
      - "127.0.0.1:8181:8181"     # loopback para curl direto / dashboard
    healthcheck:
      # Imagem rootless não tem curl/wget. Usa o próprio binário OPA com
      # --bundles para validar que o servidor responde — simples ping HTTP via Go.
      test: ["CMD", "/opa", "version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════
  # Onda 2 — Observabilidade self-hosted (profile: full)
  # Não sobem com `docker compose up -d` (default = perfil vazio).
  # Subir tudo: `docker compose --profile full up -d`
  # ════════════════════════════════════════════════════════════════

  # ─── Tempo (backend de traces OTLP) ──────────────────────────────
  tempo:
    build:
      context: ./infra/tempo
    image: agente-tempo:local
    container_name: agente_tempo
    profiles: ["full"]
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo_data:/var/tempo
    networks:
      - aimesh
    # Portas internas (não expostas na host):
    #   3200  HTTP API (search, query)
    #   4317  OTLP gRPC (recebe spans do app)
    #   4318  OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Loki (agregador de logs) ────────────────────────────────────
  loki:
    build:
      context: ./infra/loki
    image: agente-loki:local
    container_name: agente_loki
    profiles: ["full"]
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki_data:/loki
    networks:
      - aimesh
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Promtail (tail dos logs do Docker → Loki) ────────────────────
  promtail:
    build:
      context: ./infra/promtail
    image: agente-promtail:local
    container_name: agente_promtail
    profiles: ["full"]
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      # Bind mounts de SISTEMA (paths absolutos do host) — sempre existem,
      # não sofrem com o bug de "diretório vazio criado pelo daemon".
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - aimesh
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Grafana (UI: dashboards + Explore) ──────────────────────────
  grafana:
    build:
      context: ./infra/grafana
    image: agente-grafana:local
    container_name: agente_grafana
    profiles: ["full"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Permite embed via iframe (página /infra do app embeda Grafana num panel).
      # Sem isso, browser bloqueia o iframe por X-Frame-Options DENY do Grafana.
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Anonymous viewer permite que o iframe carregue sem login. Em prod com dados
      # sensíveis, troque pra cookie sharing ou auth proxy via Caddy. Em dev, OK.
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANON_ENABLED:-true}
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # ── Subpath atrás do Caddy (mesma origin) ───────────────────
      # Caddy faz reverse_proxy /grafana/* → grafana:3000. Grafana precisa
      # de root_url ABSOLUTO pra gerar redirects/assets corretos.
      #
      # IMPORTANTE: placeholders %(domain)s/%(protocol)s SÓ funcionam em
      # grafana.ini, NÃO em env var. Aqui valor é literal.
      #
      # Default 'http://localhost:8080/grafana/' atende dev local com Caddy
      # na 8080. Em prod, SEMPRE setar GRAFANA_ROOT_URL no .env com o
      # domínio público real (ex: http://meudominio.com:8080/grafana/ ou
      # https://meudominio.com/grafana/ se TLS).
      #
      # Sintoma de configuração errada: clicar "Abrir UI" do Grafana redireciona
      # pra http://localhost:3000/ — significa que root_url está com default
      # interno do Grafana porque o env var foi literal sem fazer parse.
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:8080/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GRAFANA_SUB_PATH:-true}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      # Loopback bind: Grafana é interface admin, não deve ficar público.
      # Acesso em prod: ssh -L 3000:127.0.0.1:3000, OU expor via Caddy
      # com auth na frente (futuro).
      - "127.0.0.1:${GRAFANA_PORT_HOST:-3000}:3000"
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - aimesh
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ══════════════════════════════════════════════════════════════════
# Volumes nomeados — sobrevivem a `docker compose down` (sem -v)
# ══════════════════════════════════════════════════════════════════
volumes:
  app_data:
    name: agente_app_data
  app_logs:
    name: agente_app_logs
  postgres_data:
    name: agente_postgres_data
  redis_data:
    name: agente_redis_data
  qdrant_data:
    name: agente_qdrant_data
  # Onda 4c — TLS público (Caddy persiste certs Let's Encrypt aqui).
  # Volume sobrevive a `down` (sem -v) — evita re-emitir cert e bater rate-limit do LE.
  caddy_data:
    name: agente_caddy_data
  caddy_config:
    name: agente_caddy_config
  # Onda 2 — observabilidade (criados sob demanda quando profile=full)
  tempo_data:
    name: agente_tempo_data
  loki_data:
    name: agente_loki_data
  grafana_data:
    name: agente_grafana_data

# ══════════════════════════════════════════════════════════════════
# Network privada interna do AI Mesh
# ══════════════════════════════════════════════════════════════════
networks:
  aimesh:
    name: agente_aimesh
    driver: bridge
